    <!-- PWA 离线缓存 -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E5%BA%97%E9%93%BA%E5%AE%A3%E4%BC%A0%22%2C%22short_name%22%3A%22Shop%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f7fb%22%2C%22theme_color%22%3A%22%233b5c7a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data:image/svg+xml%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%233b5c7a%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2270%22%20font-size%3D%2260%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%3E%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

    <style>
        /* ===== CSS 变量 ===== */
        :root {
            --bg-color: #f5f7fb;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-bg-solid: #ffffffd6;
            --text-primary: #1e2b3a;
            --text-secondary: #4b5f73;
            --icon-color: #54708f;
            --accent-color: #3b5c7a;
            --border-color: rgba(0,0,0,0.03);
            --avatar-bg: linear-gradient(145deg, #e0e5ec, #ffffff);
            --badge-bg: #e9ecf2;
            --shadow-color: rgba(0,0,0,0.1);
            --map-bg: #eef2f6;
            --wifi-bg: #f2f5f9;
            --review-bg: #f0f4fa;
            --btn-bg: #4a637b;
            --btn-text: white;
            --footer-text: #9aaebf;
            --error-bg: #ffeeee;
            --error-text: #cc3333;
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
            --info-bg: #e3f2fd;
            --info-text: #1976d2;
            --hand-drawn: #d4c5b2;
            --hand-drawn-line: #8b7a62;
        }

        /* 主题2: 暖阳拿铁 */
        body.theme2 {
            --bg-color: #fae9dd;
            --card-bg: rgba(255, 245, 235, 0.9);
            --card-bg-solid: #fff5ebd6;
            --text-primary: #4a3729;
            --text-secondary: #7b5f4b;
            --icon-color: #b46f40;
            --accent-color: #b46f40;
            --border-color: rgba(180, 111, 64, 0.1);
            --avatar-bg: #f3d5b5;
            --badge-bg: #f3d5b5;
            --shadow-color: rgba(180, 111, 64, 0.15);
            --map-bg: #f3e1d2;
            --wifi-bg: #f3e1d2;
            --review-bg: #f3e1d2;
            --btn-bg: #b46f40;
            --hand-drawn: #e6d2bc;
            --hand-drawn-line: #9b7e5e;
        }

        /* 主题3: 深夜食堂 (深色) */
        body.theme3 {
            --bg-color: #2b3a4a;
            --card-bg: rgba(35, 45, 55, 0.9);
            --card-bg-solid: #2a3a48d6;
            --text-primary: #e2eaf1;
            --text-secondary: #b0c4d9;
            --icon-color: #8bb3d1;
            --accent-color: #8bb3d1;
            --border-color: rgba(255,255,255,0.05);
            --avatar-bg: #405b6e;
            --badge-bg: #405b6e;
            --shadow-color: rgba(0,0,0,0.3);
            --map-bg: #2f4050;
            --wifi-bg: #2f4050;
            --review-bg: #2f4050;
            --btn-bg: #5f7a94;
            --error-bg: #442222;
            --error-text: #ff8888;
            --info-bg: #1a3a4a;
            --info-text: #7fc1e0;
            --hand-drawn: #3a4a5a;
            --hand-drawn-line: #8b9aae;
        }

        /* 主题4: 莫兰迪绿 */
        body.theme4 {
            --bg-color: #d4dbd0;
            --card-bg: #edf3ead9;
            --card-bg-solid: #e5efe0d9;
            --text-primary: #2c4238;
            --text-secondary: #4d6659;
            --icon-color: #5f8b74;
            --accent-color: #5f8b74;
            --border-color: rgba(95, 139, 116, 0.1);
            --avatar-bg: #b7cdac;
            --badge-bg: #b7cdac;
            --shadow-color: rgba(95, 139, 116, 0.15);
            --map-bg: #cbd9c4;
            --wifi-bg: #cbd9c4;
            --review-bg: #cbd9c4;
            --btn-bg: #5f8b74;
            --hand-drawn: #cad5bf;
            --hand-drawn-line: #6a8b74;
        }

        /* 主题5: 浪漫粉彩 */
        body.theme5 {
            --bg-color: #ffe7f0;
            --card-bg: #fff3f8f0;
            --card-bg-solid: #ffeef5f0;
            --text-primary: #6b3e4f;
            --text-secondary: #8f6173;
            --icon-color: #d45f8c;
            --accent-color: #d45f8c;
            --border-color: rgba(212, 95, 140, 0.1);
            --avatar-bg: #ffd9e8;
            --badge-bg: #ffd9e8;
            --shadow-color: rgba(212, 95, 140, 0.15);
            --map-bg: #ffe2ef;
            --wifi-bg: #ffe2ef;
            --review-bg: #ffe2ef;
            --btn-bg: #d45f8c;
            --hand-drawn: #ffe4f0;
            --hand-drawn-line: #b2809a;
        }

        /* 暗黑模式 */
        @media (prefers-color-scheme: dark) {
            body:not(.theme3) {
                --bg-color: #1a1e24;
                --card-bg: rgba(30, 35, 42, 0.95);
                --card-bg-solid: #262d36e6;
                --text-primary: #e8edf2;
                --text-secondary: #b8c5d4;
                --icon-color: #7f9fbb;
                --accent-color: #7f9fbb;
                --border-color: rgba(255,255,255,0.05);
                --avatar-bg: #36424f;
                --badge-bg: #36424f;
                --shadow-color: rgba(0,0,0,0.5);
                --map-bg: #2d3843;
                --wifi-bg: #2d3843;
                --review-bg: #2d3843;
                --btn-bg: #5d748b;
                --footer-text: #8f9fb0;
                --error-bg: #442222;
                --error-text: #ff8888;
                --info-bg: #1a3a4a;
                --info-text: #7fc1e0;
                --hand-drawn: #2d3843;
                --hand-drawn-line: #8f9fb0;
            }
        }

        /* 应用变量 */
        body {
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 16px 12px 60px;
        }

        .page-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            border-radius: 36px;
            overflow: hidden;
            padding: 24px 20px 32px;
        }

        .shop-avatar {
            background: var(--avatar-bg);
            color: var(--text-primary);
            width: 70px;
            height: 70px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -8px var(--shadow-color);
            font-size: 32px;
        }

        .shop-name {
            background: linear-gradient(135deg, var(--text-primary), var(--icon-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .shop-badge {
            background: var(--badge-bg);
            color: var(--text-secondary);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-block;
            font-weight: 500;
        }

        .info-grid, .feature-card, .review-wall {
            background: var(--card-bg-solid);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 18px 16px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .info-row:last-child { border-bottom: none; }

        .info-icon { width: 24px; color: var(--icon-color); }
        .info-content { flex: 1; color: var(--text-primary); font-size: 0.95rem; word-break: break-word; }
        .info-label { color: var(--text-secondary); font-weight: 500; margin-right: 6px; }

        .feature-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 14px;
            color: var(--text-primary);
        }
        .feature-header i { color: var(--icon-color); }

        /* 地图容器 */
        .map-container {
            border-radius: 20px;
            overflow: hidden;
            height: 220px;
            width: 100%;
            border: 1px solid var(--border-color);
            position: relative;
            background: var(--map-bg);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .map-container:active {
            transform: scale(0.99);
        }
        
        #amapContainer, #baiduContainer {
            width: 100%;
            height: 100%;
            display: none;
        }
        
        .static-map {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        /* 手绘地图样式 */
        .hand-drawn-map {
            width: 100%;
            height: 100%;
            background: var(--hand-drawn);
            position: relative;
            overflow: hidden;
        }
        
        .hand-drawn-map svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .hand-drawn-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 30px 12px 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .hand-drawn-overlay i { color: #ff6b6b; }
        
        .hand-drawn-pin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            z-index: 2;
            pointer-events: none;
        }
        
        .hand-drawn-text {
            position: absolute;
            top: 30%;
            left: 0;
            right: 0;
            text-align: center;
            color: var(--hand-drawn-line);
            font-size: 0.8rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
            z-index: 2;
            pointer-events: none;
        }

        .map-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 30px 12px 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .map-overlay i { color: #ff6b6b; }

        .map-error {
            width: 100%;
            height: 100%;
            background: var(--error-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--error-text);
            gap: 10px;
            padding: 20px;
            text-align: center;
        }
        .map-error i { font-size: 2rem; }
        .map-error button {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }

        .map-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            backdrop-filter: blur(5px);
            z-index: 10;
            pointer-events: none;
        }

        .map-retry-bar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .map-retry-btn {
            background: var(--info-bg);
            color: var(--info-text);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .map-retry-btn:hover {
            opacity: 0.8;
        }
        .map-retry-btn i {
            margin-right: 4px;
        }

        /* WiFi模块 */
        .wifi-item {
            background: var(--wifi-bg);
            border-radius: 18px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .wifi-value {
            background: var(--card-bg-solid);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
        }
        .wifi-pwd-hidden {
            filter: blur(4px);
            user-select: none;
            padding: 6px 14px;
            border-radius: 30px;
            background: var(--wifi-bg);
        }

        /* 按钮样式 */
        .btn-small, .wechat-btn, .nav-btn, .retry-btn {
            background: var(--btn-bg);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.1s;
        }
        .btn-small:active, .wechat-btn:active, .nav-btn:active, .retry-btn:active {
            opacity: 0.7;
            transform: scale(0.97);
        }
        .wechat-btn { width: 100%; padding: 12px; justify-content: center; margin: 12px 0; }
        .nav-btn { width: 100%; margin-top: 10px; justify-content: center; }

        /* 评论墙 */
        .review-wall { max-height: 260px; overflow: hidden; }
        .review-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .review-marquee {
            height: 180px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }
        .review-track {
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: scrollReviews 25s linear infinite;
            padding: 4px 6px;
        }
        .review-item {
            background: var(--review-bg);
            border-radius: 24px;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .review-avatar {
            width: 38px;
            height: 38px;
            background: var(--icon-color);
            border-radius: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }
        .review-text { flex: 1; font-size: 0.9rem; line-height: 1.3; }
        .review-stars { color: #f5b342; font-size: 0.7rem; margin-top: 3px; letter-spacing: 2px; }
        @keyframes scrollReviews {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(-100% + 160px)); }
        }

        /* 微信弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card-bg-solid);
            border-radius: 32px;
            padding: 30px 24px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .modal-content i { font-size: 4rem; color: #2b8635; margin-bottom: 16px; }
        .modal-content p {
            background: var(--wifi-bg);
            padding: 12px;
            border-radius: 12px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
        }

        /* 浮动按钮 */
        .float-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }
        .float-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg-solid);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--shadow-color);
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .float-btn:active { transform: scale(0.9); }

        /* 缓存指示器 */
        .cache-indicator {
            position: fixed;
            top: 10px;
            left: 10px;
            background: var(--card-bg-solid);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hidden-module { display: none !important; }
        .clickable { cursor: pointer; }
        
        /* 分享按钮 */
        .share-icon {
            float: right;
            background: var(--badge-bg);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .share-icon:active { transform: scale(0.9); }
        
        .shop-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            clear: both;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--icon-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .map-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .map-status i {
            color: var(--icon-color);
        }

        /* 分享提示弹窗 */
        .share-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg-solid);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 40px;
            box-shadow: 0 10px 30px var(--shadow-color);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            z-index: 3000;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }
        .share-toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .share-toast i {
            color: var(--icon-color);
            font-size: 1.2rem;
        }
        .share-toast .fa-ellipsis-h {
            color: var(--text-secondary);
            margin: 0 4px;
        }
    </style>
</head>
<body class="theme1" id="bodyTheme">
    <!-- 缓存指示器 -->
    <div class="cache-indicator" id="cacheIndicator">
        <i class="fas fa-database"></i> <span id="cacheStatus">已缓存</span>
    </div>

            function showHandDrawnMap() {
                mapContainer.innerHTML = `
                    <div class="hand-drawn-map">
                        <svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
                            <!-- 手绘风格的陆地轮廓 -->
                            <path d="M50,30 Q80,10 120,20 Q160,30 200,25 Q240,20 280,35 Q320,50 350,40 Q370,30 380,50 Q390,70 370,90 Q350,110 320,120 Q280,130 240,125 Q200,120 160,130 Q120,140 80,135 Q50,130 40,100 Q30,70 50,30" 
                                  fill="var(--hand-drawn)" stroke="var(--hand-drawn-line)" stroke-width="3" stroke-dasharray="5,3" />
                            
                            <!-- 手绘风格的海洋波浪线 -->
                            <path d="M20,60 L60,55 L100,65 L140,55 L180,65 L220,55 L260,65 L300,55 L340,65 L380,55" 
                                  stroke="var(--hand-drawn-line)" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.5" />
                            <path d="M30,90 L70,85 L110,95 L150,85 L190,95 L230,85 L270,95 L310,85 L350,95 L380,90" 
                                  stroke="var(--hand-drawn-line)" stroke-width="1.5" fill="none" stroke-dasharray="4,4" opacity="0.5" />
                            
                            <!-- 手绘风格的山脉 -->
                            <path d="M100,100 L120,60 L140,100" stroke="var(--hand-drawn-line)" stroke-width="2" fill="none" />
                            <path d="M160,100 L180,70 L200,100" stroke="var(--hand-drawn-line)" stroke-width="2" fill="none" />
                            <path d="M220,100 L240,65 L260,100" stroke="var(--hand-drawn-line)" stroke-width="2" fill="none" />
                            
                            <!-- 手绘风格的云朵 -->
                            <circle cx="80" cy="40" r="8" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                            <circle cx="95" cy="35" r="10" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                            <circle cx="110" cy="40" r="7" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                            
                            <circle cx="280" cy="30" r="6" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                            <circle cx="295" cy="25" r="8" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                            <circle cx="310" cy="28" r="5" fill="none" stroke="var(--hand-drawn-line)" stroke-width="1.5" />
                        </svg>
                        <div class="hand-drawn-pin">
                            <i class="fas fa-map-pin"></i>
                        </div>
                        <div class="hand-drawn-text">
                            🌍 世界那么大，快来店里坐坐
                        </div>
                        <div class="hand-drawn-overlay">
                            <i class="fas fa-map-pin"></i> ${address || '点击手动导航'}
                        </div>
                    </div>
                `;
                mapProvider.innerText = '手绘地图';
                mapStatus.innerHTML = '<i class="fas fa-pencil-alt" style="color:var(--info-text);"></i> 使用手绘地图，点击可导航';
                trackEvent('地图', '加载成功', '手绘地图');
            }

            function showMapError(message) {
                mapContainer.innerHTML = `
                    <div class="map-error">
                        <i class="fas fa-map-marked-alt"></i>
                        <p>${message}</p>
                        <p>📍 ${address || '位置'}</p>
                        <p>纬度: ${lat}, 经度: ${lng}</p>
                        <button class="retry-btn" onclick="handleMapClick()">
                            <i class="fas fa-directions"></i> 手动导航
                        </button>
                        <button class="retry-btn" style="margin-top:10px;" onclick="retryMap('handdrawn')">
                            <i class="fas fa-pencil-alt"></i> 查看手绘地图
                        </button>
                    </div>
                `;
                mapProvider.innerText = '加载失败';
                mapStatus.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 地图加载失败，请点击手动导航';
                trackEvent('地图', '加载失败', message);
            }

            window.retryMap = function(type) {
                if (!lat || !lng) return;
                mapLoadAttempts++;
                loadMapByType(type);
            };

            function detectAvailableMap() {
                return new Promise((resolve) => {
                    if (typeof AMap !== 'undefined' && AMap) {
                        mapProvider.innerText = '高德地图';
                        mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 已连接高德地图';
                        resolve('amap');
                        return;
                    }
                    
                    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                        mapProvider.innerText = '苹果地图';
                        mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 已切换到苹果地图';
                        resolve('apple');
                        return;
                    }
                    
                    if (/Android/i.test(navigator.userAgent)) {
                        mapProvider.innerText = '百度地图';
                        mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 已切换到百度地图';
                        resolve('baidu');
                        return;
                    }
                    
                    mapProvider.innerText = '手绘地图';
                    mapStatus.innerHTML = '<i class="fas fa-pencil-alt" style="color:var(--info-text);"></i> 使用手绘地图';
                    resolve('handdrawn');
                });
            }

            function loadMapByType(type) {
                if (!lat || !lng) return;
                
                mapContainer.innerHTML = '';
                mapContainer.appendChild(mapLoading);
                mapLoading.style.display = 'block';
                amapContainer.style.display = 'none';
                baiduContainer.style.display = 'none';
                
                if (type === 'amap') {
                    try {
                        if (typeof AMap !== 'undefined') {
                            setTimeout(() => {
                                mapContainer.innerHTML = '';
                                amapContainer.style.display = 'block';
                                mapContainer.appendChild(amapContainer);
                                
                                if (!amapInstance) {
                                    amapInstance = new AMap.Map('amapContainer', {
                                        zoom: 16,
                                        center: [parseFloat(lng), parseFloat(lat)],
                                        resizeEnable: true
                                    });
                                    new AMap.Marker({
                                        position: [parseFloat(lng), parseFloat(lat)],
                                        map: amapInstance
                                    });
                                }
                                mapLoading.style.display = 'none';
                                mapProvider.innerText = '高德地图';
                                mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 高德地图加载成功';
                                trackEvent('地图', '加载成功', '高德地图');
                            }, 100);
                        } else {
                            throw new Error('高德地图API未加载');
                        }
                    } catch (e) {
                        if (type === 'amap') {
                            detectAvailableMap().then(newType => {
                                loadMapByType(newType);
                            });
                        } else {
                            loadMapByType('handdrawn');
                        }
                    }
                }
                else if (type === 'baidu') {
                    mapProvider.innerText = '百度地图';
                    const baiduMapUrl = `https://api.map.baidu.com/staticimage/v2?ak=您的百度密钥&center=${lng},${lat}&markers=${lng},${lat}&zoom=16&width=400&height=200`;
                    
                    const img = new Image();
                    img.onload = function() {
                        mapContainer.innerHTML = '';
                        mapContainer.appendChild(img);
                        const overlay = document.createElement('div');
                        overlay.className = 'map-overlay';
                        overlay.innerHTML = '<i class="fas fa-map-pin"></i> ' + (address || '点击导航');
                        mapContainer.appendChild(overlay);
                        mapLoading.style.display = 'none';
                        mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 百度地图加载成功';
                        trackEvent('地图', '加载成功', '百度地图');
                    };
                    img.onerror = function() {
                        loadMapByType('handdrawn');
                    };
                    img.src = baiduMapUrl;
                    img.className = 'static-map';
                }
                else if (type === 'apple') {
                    mapProvider.innerText = '苹果地图';
                    const appleMapUrl = `https://dev.virtualearth.net/REST/v1/Imagery/Map/Road/${lat},${lng}/16?mapSize=400,200&pp=${lat},${lng};66&key=AiTkfzKqoQJzJQqQJzJQqQJzJQqQJzJQ`;
                    
                    const img = new Image();
                    img.onload = function() {
                        mapContainer.innerHTML = '';
                        mapContainer.appendChild(img);
                        const overlay = document.createElement('div');
                        overlay.className = 'map-overlay';
                        overlay.innerHTML = '<i class="fas fa-map-pin"></i> ' + (address || '点击导航');
                        mapContainer.appendChild(overlay);
                        mapLoading.style.display = 'none';
                        mapStatus.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success-text);"></i> 苹果地图加载成功';
                        trackEvent('地图', '加载成功', '苹果地图');
                    };
                    img.onerror = function() {
                        loadMapByType('handdrawn');
                    };
                    img.src = appleMapUrl;
                    img.className = 'static-map';
                }
                else {
                    showHandDrawnMap();
                    mapLoading.style.display = 'none';
                }
            }

            if (lat && lng) {
                mapModule.classList.remove('hidden-module');
                
                detectAvailableMap().then(type => {
                    loadMapByType(type);
                }).catch(() => {
                    showHandDrawnMap();
                });

                if (address) {
                    navBtn.classList.remove('hidden-module');
                    navBtn.onclick = function(e){
                        e.stopPropagation();
                        handleMapClick();
                    };
                }
            } else {
                mapModule.classList.add('hidden-module');
            }

            // ==================== WiFi模块 ====================
            if (wifiSsid && wifiPwd) {
                document.getElementById('wifiModule').classList.remove('hidden-module');
                document.getElementById('wifiSsid').innerText = wifiSsid;
                const pwdSpan = document.getElementById('wifiPwdSpan');
                
                document.getElementById('unlockWifiBtn').onclick = function() {
                    if (pwdSpan.classList.contains('wifi-pwd-hidden')) {
                        pwdSpan.innerText = wifiPwd;
                        pwdSpan.classList.remove('wifi-pwd-hidden');
                        pwdSpan.classList.add('wifi-value');
                        this.innerHTML = '<i class="fas fa-check"></i> 密码已显示';
                        trackEvent('WiFi', '密码显示', wifiSsid);
                    } else {
                        pwdSpan.innerText = '********';
                        pwdSpan.classList.add('wifi-pwd-hidden');
                        pwdSpan.classList.remove('wifi-value');
                        this.innerHTML = '<i class="fas fa-heart"></i> 加关注领密码';
                    }
                };
            }

            // ==================== 评论墙 ====================
            const reviewData = reviewLibrary[reviewType] || reviewLibrary['1'];
            document.getElementById('reviewTypeTitle').innerText = reviewData.name;
            
            const track = document.getElementById('reviewTrack');
            track.innerHTML = '';
            const allReviews = [...reviewData.reviews, ...reviewData.reviews.slice(0,6)];
            allReviews.forEach(r => {
                const stars = '★'.repeat(r.stars) + '☆'.repeat(5 - r.stars);
                track.innerHTML += `
                    <div class="review-item">
                        <div class="review-avatar">${r.name[0]}</div>
                        <div class="review-text">
                            <strong>${r.name}</strong>
                            <div class="review-stars">${stars}</div>
                            <div>${r.comment}</div>
                        </div>
                    </div>
                `;
            });

            // ==================== 交互事件 ====================
            if (phone) {
                document.getElementById('phoneRow').classList.add('clickable');
                document.getElementById('phoneRow').onclick = () => {
                    window.location.href = `tel:${phone}`;
                    trackEvent('电话', '点击拨打', phone);
                };
            }
            
            if (address) {
                document.getElementById('addressRow').classList.add('clickable');
                document.getElementById('addressRow').onclick = () => {
                    navigator.clipboard?.writeText(address).then(() => {
                        alert('地址已复制');
                        trackEvent('地址', '复制', address);
                    });
                };
            }

            document.getElementById('shareBtn').addEventListener('click', function(){
                if (navigator.share) {
                    navigator.share({ 
                        title: shopName, 
                        text: `快来逛逛 ${shopName}${address ? ' - ' + address : ''}`, 
                        url: location.href 
                    }).then(() => {
                        trackEvent('分享', '成功', shopName);
                        showShareToast();
                    });
                } else { 
                    navigator.clipboard?.writeText(location.href);
                    alert('链接已复制: ' + location.href);
                    trackEvent('分享', '复制链接', location.href);
                    showShareToast();
                }
            });

            document.getElementById('backToTop').addEventListener('click', function(){
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            if (!desc) document.getElementById('descText').style.opacity = '0.6';

            trackEvent('页面', '访问', shopName);
        })();
    </script>

    
</body>
</html>
