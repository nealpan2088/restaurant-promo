<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥔 土豆人冒险 - 土豆玛丽</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            background: linear-gradient(145deg, #1a3f5a, #0d2b3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 10px;
        }
        
        .game-container {
            max-width: 900px;
            width: 100%;
            background: #2d5a2d;
            border-radius: 40px 40px 20px 20px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 0 0 4px #8b6e4b, inset 0 0 0 8px #c09b6b;
            border: 2px solid #e8b87b;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3a281c;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border: 3px solid #b88a5b;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 -3px 0 #5f3f28;
        }
        
        .score-box {
            background: #1e3b4a;
            padding: 8px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid gold;
        }
        
        .score-box span:first-child {
            font-size: 1.8rem;
        }
        
        .lives-box {
            background: #5f2e1a;
            padding: 8px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #ff8a5c;
        }
        
        .level-box {
            background: #4a3b2a;
            padding: 8px 25px;
            border-radius: 40px;
            border: 2px solid #a8e6cf;
        }
        
        /* 游戏画布 */
        .canvas-wrapper {
            position: relative;
            background: #87CEEB;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 -10px 0 #4a7a4a, 0 15px 20px rgba(0,0,0,0.4);
            border: 5px solid #7a5a3a;
        }
        
        canvas {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16/9;
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 70%, #7ec850 70%, #6b8e4b 100%);
            cursor: pointer;
            touch-action: none;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .dpad-row {
            display: flex;
            gap: 5px;
        }
        
        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(50, 50, 50, 0.9);
            border: 4px solid #f0b400;
            color: white;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 0 #7a4d1a, 0 10px 20px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            transition: 0.05s linear;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .ctrl-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7a4d1a, 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .jump-btn {
            background: rgba(220, 120, 40, 0.95);
            border-color: #ffe66d;
            font-size: 2rem;
        }
        
        @media (min-width: 768px) {
            .mobile-controls {
                display: none;
            }
        }
        
        /* 游戏结束/胜利弹窗 */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #fdebb3;
            padding: 40px;
            border-radius: 70px;
            text-align: center;
            border: 8px solid #c09b5e;
            box-shadow: 0 20px 30px black;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h2 {
            font-size: 3rem;
            color: #a55233;
            margin-bottom: 20px;
        }
        
        .modal-content p {
            font-size: 2rem;
            margin: 20px 0;
            color: #3f2b1c;
        }
        
        .modal-btn {
            background: #f9b83c;
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #2d1508;
            box-shadow: 0 8px 0 #9f5e20;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.05s;
        }
        
        .modal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9f5e20;
        }
        
        .hidden {
            display: none;
        }
        
        /* 提示 */
        .key-hint {
            color: #f0e6d2;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
        }
        
        .key-hint span {
            background: #3a281c;
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid #b88a5b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏头部信息 -->
        <div class="game-header">
            <div class="lives-box">
                <span>🥔</span>
                <span id="livesDisplay">×3</span>
            </div>
            <div class="score-box">
                <span>🪙</span>
                <span id="scoreDisplay">0</span>
            </div>
            <div class="level-box">
                <span id="levelDisplay">关卡 1-1</span>
            </div>
        </div>
        
        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1024" height="576"></canvas>
        </div>
        
        <!-- 移动端控制按钮 -->
        <div class="mobile-controls">
            <div class="dpad">
                <div class="dpad-row">
                    <button class="ctrl-btn" id="btnLeft" touch-action="manipulation">←</button>
                    <button class="ctrl-btn" id="btnRight" touch-action="manipulation">→</button>
                </div>
            </div>
            <div class="action-btns">
                <button class="ctrl-btn jump-btn" id="btnJump" touch-action="manipulation">🦘</button>
                <button class="ctrl-btn" id="btnRestart" touch-action="manipulation">↻</button>
            </div>
        </div>
        
        <!-- 键盘提示 (仅桌面显示) -->
        <div class="key-hint">
            <span>←→/AD 移动 | W/空格 跳跃 | R 重试</span>
        </div>
    </div>
    
    <!-- 游戏结束/胜利模态框 -->
    <div id="gameModal" class="game-modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">🥔</h2>
            <p id="modalMessage"></p>
            <button class="modal-btn" id="modalBtn">再来一局</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 游戏配置 ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // 显示元素
            const livesSpan = document.getElementById('livesDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const levelSpan = document.getElementById('levelDisplay');
            const modal = document.getElementById('gameModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMsg = document.getElementById('modalMessage');
            const modalBtn = document.getElementById('modalBtn');
            
            // 按钮
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const btnRestart = document.getElementById('btnRestart');
            
            // ---------- 游戏常量 ----------
            const GRAVITY = 0.5;
            const JUMP_FORCE = -12;
            const MOVE_SPEED = 3.8;
            const MAX_SPEED = 5;
            const FRICTION = 0.7;
            
            // ---------- 游戏状态 ----------
            let gameState = {
                currentLevel: 1,
                lives: 3,
                score: 0,
                gameActive: true,
                gameOver: false,
                levelComplete: false
            };
            
            // ---------- 玩家对象 ----------
            let player = {
                x: 200,
                y: 400,
                width: 32,
                height: 40,
                vx: 0,
                vy: 0,
                grounded: false,
                facing: 1, // 1=右, -1=左
                animFrame: 0,
                invincible: 0, // 无敌帧
                potatoType: 0 // 0=普通, 1=开心, 2=惊吓
            };
            
            // ---------- 关卡数据 ----------
            let platforms = [];
            let enemies = [];
            let coins = [];
            let exit = null;
            let movingPlatforms = [];
            
            // 输入状态
            const keys = {
                left: false,
                right: false,
                jump: false,
                jumpPressed: false
            };
            
            // 触摸控制状态
            let touchLeft = false;
            let touchRight = false;
            let touchJump = false;
            
            // 摄像头偏移
            let cameraX = 0;
            
            // ---------- 加载关卡 ----------
            function loadLevel(level) {
                // 清空旧数据
                platforms = [];
                enemies = [];
                coins = [];
                movingPlatforms = [];
                exit = null;
                
                // 重置玩家位置
                player.x = 200;
                player.y = 300;
                player.vx = 0;
                player.vy = 0;
                
                // 根据关卡加载不同配置
                if (level === 1) {
                    // 关卡1-1：新手教学
                    platforms = [
                        { x: 0, y: 500, w: 300, h: 30 },  // 地面
                        { x: 400, y: 500, w: 300, h: 30 },
                        { x: 750, y: 500, w: 300, h: 30 },
                        { x: 200, y: 400, w: 100, h: 20 },  // 台阶
                        { x: 500, y: 350, w: 100, h: 20 },
                        { x: 800, y: 300, w: 100, h: 20 },
                        { x: 600, y: 200, w: 80, h: 20 }    // 高台
                    ];
                    
                    enemies = [
                        { x: 450, y: 470, w: 28, h: 28, vx: 1, range: 100, startX: 450, type: 'slime' },
                        { x: 820, y: 470, w: 28, h: 28, vx: 1.5, range: 120, startX: 820, type: 'slime' }
                    ];
                    
                    coins = [
                        { x: 250, y: 350, collected: false, value: 10 },
                        { x: 550, y: 300, collected: false, value: 10 },
                        { x: 850, y: 250, collected: false, value: 10 },
                        { x: 650, y: 150, collected: false, value: 20 },
                        { x: 300, y: 450, collected: false, value: 10 }
                    ];
                    
                    exit = { x: 950, y: 450, w: 40, h: 60 };
                    
                    levelSpan.innerText = '关卡 1-1';
                } 
                else if (level === 2) {
                    // 关卡1-2：更多移动平台
                    platforms = [
                        { x: 0, y: 500, w: 250, h: 30 },
                        { x: 300, y: 500, w: 250, h: 30 },
                        { x: 600, y: 500, w: 250, h: 30 },
                        { x: 900, y: 500, w: 200, h: 30 },
                        { x: 150, y: 400, w: 80, h: 20 },
                        { x: 400, y: 320, w: 80, h: 20 },
                        { x: 650, y: 380, w: 80, h: 20 },
                        { x: 800, y: 250, w: 80, h: 20 }
                    ];
                    
                    // 移动平台
                    movingPlatforms = [
                        { x: 250, y: 300, w: 80, h: 20, vx: 1.5, range: 150, startX: 250, dir: 1 },
                        { x: 500, y: 200, w: 80, h: 20, vx: 2, range: 200, startX: 500, dir: 1 }
                    ];
                    
                    enemies = [
                        { x: 350, y: 470, w: 28, h: 28, vx: 2, range: 150, startX: 350, type: 'slime' },
                        { x: 700, y: 470, w: 28, h: 28, vx: 2.5, range: 200, startX: 700, type: 'slime' },
                        { x: 200, y: 350, w: 28, h: 28, vx: 1.5, range: 100, startX: 200, type: 'slime' }
                    ];
                    
                    coins = [
                        { x: 180, y: 350, collected: false, value: 10 },
                        { x: 430, y: 270, collected: false, value: 10 },
                        { x: 680, y: 330, collected: false, value: 10 },
                        { x: 530, y: 150, collected: false, value: 20 },
                        { x: 830, y: 200, collected: false, value: 20 },
                        { x: 950, y: 450, collected: false, value: 30 }
                    ];
                    
                    exit = { x: 1050, y: 450, w: 40, h: 60 };
                    
                    levelSpan.innerText = '关卡 1-2';
                }
                else if (level === 3) {
                    // 关卡1-3：复杂地形
                    platforms = [
                        { x: 0, y: 500, w: 200, h: 30 },
                        { x: 250, y: 500, w: 150, h: 30 },
                        { x: 450, y: 500, w: 150, h: 30 },
                        { x: 650, y: 500, w: 150, h: 30 },
                        { x: 850, y: 500, w: 250, h: 30 },
                        { x: 120, y: 400, w: 60, h: 20 },
                        { x: 320, y: 320, w: 60, h: 20 },
                        { x: 520, y: 380, w: 60, h: 20 },
                        { x: 720, y: 280, w: 60, h: 20 },
                        { x: 920, y: 350, w: 60, h: 20 },
                        { x: 550, y: 200, w: 100, h: 20 }
                    ];
                    
                    movingPlatforms = [
                        { x: 200, y: 250, w: 70, h: 20, vx: 2, range: 200, startX: 200, dir: 1 },
                        { x: 400, y: 180, w: 70, h: 20, vx: 2.5, range: 250, startX: 400, dir: 1 },
                        { x: 700, y: 400, w: 70, h: 20, vx: 3, range: 150, startX: 700, dir: 1 }
                    ];
                    
                    enemies = [
                        { x: 300, y: 470, w: 28, h: 28, vx: 2.5, range: 200, startX: 300, type: 'slime' },
                        { x: 550, y: 470, w: 28, h: 28, vx: 3, range: 180, startX: 550, type: 'slime' },
                        { x: 800, y: 470, w: 28, h: 28, vx: 2, range: 250, startX: 800, type: 'slime' },
                        { x: 400, y: 300, w: 28, h: 28, vx: 2, range: 150, startX: 400, type: 'slime' }
                    ];
                    
                    coins = [
                        { x: 150, y: 350, collected: false, value: 10 },
                        { x: 350, y: 270, collected: false, value: 20 },
                        { x: 550, y: 330, collected: false, value: 20 },
                        { x: 600, y: 150, collected: false, value: 30 },
                        { x: 750, y: 230, collected: false, value: 20 },
                        { x: 850, y: 300, collected: false, value: 30 },
                        { x: 950, y: 400, collected: false, value: 50 }
                    ];
                    
                    exit = { x: 1150, y: 450, w: 40, h: 60 };
                    
                    levelSpan.innerText = '关卡 1-3';
                }
                
                // 添加边界墙
                platforms.push({ x: -50, y: 0, w: 20, h: 600 }); // 左墙
                platforms.push({ x: 1300, y: 0, w: 20, h: 600 }); // 右墙
            }
            
            // ---------- 输入处理 ----------
            // 键盘
            window.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                    keys.left = true;
                    e.preventDefault();
                }
                if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                    keys.right = true;
                    e.preventDefault();
                }
                if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === ' ') {
                    keys.jump = true;
                    e.preventDefault();
                }
                if (key === 'r' || key === 'R') {
                    resetGame();
                    e.preventDefault();
                }
            });
            
            window.addEventListener('keyup', (e) => {
                const key = e.key;
                if (key === 'ArrowLeft' || key === 'a' || key === 'A') {
                    keys.left = false;
                    e.preventDefault();
                }
                if (key === 'ArrowRight' || key === 'd' || key === 'D') {
                    keys.right = false;
                    e.preventDefault();
                }
                if (key === 'ArrowUp' || key === 'w' || key === 'W' || key === ' ') {
                    keys.jump = false;
                    keys.jumpPressed = false; // 重置跳跃按下状态
                    e.preventDefault();
                }
            });
            
            // 触摸按钮
            btnLeft.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchLeft = true;
            });
            btnLeft.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchLeft = false;
            });
            btnLeft.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchLeft = true;
            });
            btnLeft.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchLeft = false;
            });
            
            btnRight.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchRight = true;
            });
            btnRight.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchRight = false;
            });
            btnRight.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchRight = true;
            });
            btnRight.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchRight = false;
            });
            
            btnJump.addEventListener('touchstart', (e) => {
                e.preventDefault();
                touchJump = true;
                keys.jump = true; // 复用键盘逻辑
            });
            btnJump.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchJump = false;
                keys.jump = false;
                keys.jumpPressed = false;
            });
            btnJump.addEventListener('mousedown', (e) => {
                e.preventDefault();
                touchJump = true;
                keys.jump = true;
            });
            btnJump.addEventListener('mouseup', (e) => {
                e.preventDefault();
                touchJump = false;
                keys.jump = false;
                keys.jumpPressed = false;
            });
            
            btnRestart.addEventListener('click', resetGame);
            btnRestart.addEventListener('touchstart', (e) => {
                e.preventDefault();
                resetGame();
            });
            
            // 阻止页面滚动
            window.addEventListener('touchmove', (e) => {
                if (e.target.classList.contains('ctrl-btn')) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            // ---------- 游戏逻辑函数 ----------
            function update() {
                if (!gameState.gameActive || gameState.gameOver || gameState.levelComplete) return;
                
                // 无敌帧递减
                if (player.invincible > 0) {
                    player.invincible--;
                }
                
                // 移动输入
                let moveDir = 0;
                if (keys.left || touchLeft) moveDir -= 1;
                if (keys.right || touchRight) moveDir += 1;
                
                // 应用加速度
                if (moveDir !== 0) {
                    player.vx += moveDir * MOVE_SPEED * 0.3;
                    player.facing = moveDir;
                } else {
                    // 摩擦力
                    player.vx *= FRICTION;
                }
                
                // 限制最大速度
                if (player.vx > MAX_SPEED) player.vx = MAX_SPEED;
                if (player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;
                
                // 重力
                player.vy += GRAVITY;
                if (player.vy > 12) player.vy = 12; // 终端速度
                
                // 跳跃
                if (keys.jump && !keys.jumpPressed && player.grounded) {
                    player.vy = JUMP_FORCE;
                    player.grounded = false;
                    keys.jumpPressed = true;
                }
                
                // 如果没有按下跳跃，重置跳跃按下状态
                if (!keys.jump) {
                    keys.jumpPressed = false;
                }
                
                // 水平移动并碰撞检测
                player.x += player.vx;
                checkCollisions('horizontal');
                
                // 垂直移动并碰撞检测
                player.y += player.vy;
                player.grounded = false;
                checkCollisions('vertical');
                
                // 移动平台更新
                for (let mp of movingPlatforms) {
                    mp.x += mp.vx * mp.dir;
                    if (mp.x > mp.startX + mp.range || mp.x < mp.startX - mp.range) {
                        mp.dir *= -1;
                    }
                    
                    // 如果玩家站在移动平台上，跟随移动
                    if (player.grounded && 
                        player.x + player.width > mp.x && 
                        player.x < mp.x + mp.w &&
                        Math.abs(player.y + player.height - mp.y) < 5) {
                        player.x += mp.vx * mp.dir;
                    }
                }
                
                // 敌人移动
                for (let e of enemies) {
                    if (e.dead) continue;
                    
                    e.x += e.vx * (e.dir || 1);
                    if (e.x > e.startX + e.range || e.x < e.startX - e.range) {
                        e.dir = (e.dir || 1) * -1;
                    }
                }
                
                // 检查金币碰撞
                for (let coin of coins) {
                    if (!coin.collected && 
                        player.x < coin.x + 20 &&
                        player.x + player.width > coin.x - 10 &&
                        player.y < coin.y + 20 &&
                        player.y + player.height > coin.y - 10) {
                        coin.collected = true;
                        gameState.score += coin.value;
                        updateScore();
                    }
                }
                
                // 检查敌人碰撞
                for (let e of enemies) {
                    if (e.dead) continue;
                    
                    if (player.invincible <= 0 &&
                        player.x < e.x + e.w &&
                        player.x + player.width > e.x &&
                        player.y < e.y + e.h &&
                        player.y + player.height > e.y) {
                        
                        // 检查是否踩到敌人
                        if (player.vy > 0 && player.y + player.height - player.vy <= e.y + 5) {
                            // 踩死敌人
                            e.dead = true;
                            player.vy = JUMP_FORCE * 0.6; // 小跳
                            gameState.score += 50;
                            updateScore();
                        } else {
                            // 玩家受伤
                            gameState.lives--;
                            livesSpan.innerText = `×${gameState.lives}`;
                            
                            if (gameState.lives <= 0) {
                                gameOver();
                                return;
                            }
                            
                            // 无敌和击退
                            player.invincible = 60;
                            player.vx = (player.facing > 0 ? -5 : 5);
                            player.vy = -5;
                        }
                    }
                }
                
                // 检查出口
                if (exit && 
                    player.x < exit.x + exit.w &&
                    player.x + player.width > exit.x &&
                    player.y < exit.y + exit.h &&
                    player.y + player.height > exit.y) {
                    levelComplete();
                }
                
                // 防止掉出屏幕底部
                if (player.y > 700) {
                    gameState.lives--;
                    livesSpan.innerText = `×${gameState.lives}`;
                    
                    if (gameState.lives <= 0) {
                        gameOver();
                        return;
                    }
                    
                    // 重置位置
                    player.x = 200;
                    player.y = 300;
                    player.vx = 0;
                    player.vy = 0;
                }
                
                // 更新摄像机
                cameraX = player.x - canvas.width / 3;
                if (cameraX < 0) cameraX = 0;
                if (cameraX > 1000) cameraX = 1000; // 限制最右
            }
            
            // 碰撞检测
            function checkCollisions(axis) {
                // 平台碰撞
                for (let p of platforms) {
                    if (axis === 'horizontal') {
                        if (player.y + player.height > p.y &&
                            player.y < p.y + p.h &&
                            player.x + player.width > p.x &&
                            player.x < p.x + p.w) {
                            
                            if (player.vx > 0) {
                                player.x = p.x - player.width;
                            } else if (player.vx < 0) {
                                player.x = p.x + p.w;
                            }
                            player.vx = 0;
                        }
                    } else {
                        if (player.x + player.width > p.x &&
                            player.x < p.x + p.w &&
                            player.y + player.height > p.y &&
                            player.y < p.y + p.h) {
                            
                            if (player.vy > 0) {
                                player.y = p.y - player.height;
                                player.grounded = true;
                                player.vy = 0;
                            } else if (player.vy < 0) {
                                player.y = p.y + p.h;
                                player.vy = 0;
                            }
                        }
                    }
                }
                
                // 移动平台碰撞
                for (let mp of movingPlatforms) {
                    if (axis === 'horizontal') {
                        if (player.y + player.height > mp.y &&
                            player.y < mp.y + mp.h &&
                            player.x + player.width > mp.x &&
                            player.x < mp.x + mp.w) {
                            
                            if (player.vx > 0) {
                                player.x = mp.x - player.width;
                            } else if (player.vx < 0) {
                                player.x = mp.x + mp.w;
                            }
                            player.vx = 0;
                        }
                    } else {
                        if (player.x + player.width > mp.x &&
                            player.x < mp.x + mp.w &&
                            player.y + player.height > mp.y &&
                            player.y < mp.y + mp.h) {
                            
                            if (player.vy > 0 && player.y + player.height - player.vy <= mp.y + 5) {
                                player.y = mp.y - player.height;
                                player.grounded = true;
                                player.vy = 0;
                            } else if (player.vy < 0) {
                                player.y = mp.y + mp.h;
                                player.vy = 0;
                            }
                        }
                    }
                }
            }
            
            // 更新分数显示
            function updateScore() {
                scoreSpan.innerText = gameState.score;
            }
            
            // 关卡完成
            function levelComplete() {
                gameState.levelComplete = true;
                gameState.gameActive = false;
                
                if (gameState.currentLevel < 3) {
                    modalTitle.innerText = '🎉 通关！';
                    modalMsg.innerText = `进入下一关!\n得分: ${gameState.score}`;
                } else {
                    modalTitle.innerText = '🏆 通关！';
                    modalMsg.innerText = `恭喜你完成所有关卡!\n最终得分: ${gameState.score}`;
                }
                
                modal.classList.remove('hidden');
            }
            
            // 游戏结束
            function gameOver() {
                gameState.gameActive = false;
                gameState.gameOver = true;
                
                modalTitle.innerText = '💔 游戏结束';
                modalMsg.innerText = `得分: ${gameState.score}\n点击重试`;
                modal.classList.remove('hidden');
            }
            
            // 重置游戏
            function resetGame() {
                gameState = {
                    currentLevel: 1,
                    lives: 3,
                    score: 0,
                    gameActive: true,
                    gameOver: false,
                    levelComplete: false
                };
                
                player = {
                    x: 200,
                    y: 300,
                    width: 32,
                    height: 40,
                    vx: 0,
                    vy: 0,
                    grounded: false,
                    facing: 1,
                    animFrame: 0,
                    invincible: 0,
                    potatoType: 0
                };
                
                loadLevel(1);
                updateScore();
                livesSpan.innerText = '×3';
                modal.classList.add('hidden');
            }
            
            // 下一关
            function nextLevel() {
                if (gameState.currentLevel < 3) {
                    gameState.currentLevel++;
                    gameState.gameActive = true;
                    gameState.levelComplete = false;
                    loadLevel(gameState.currentLevel);
                    
                    player.x = 200;
                    player.y = 300;
                    player.vx = 0;
                    player.vy = 0;
                } else {
                    resetGame();
                }
                modal.classList.add('hidden');
            }
            
            // 模态框按钮事件
            modalBtn.addEventListener('click', () => {
                if (gameState.levelComplete && gameState.currentLevel < 3) {
                    nextLevel();
                } else {
                    resetGame();
                }
            });
            
            // ---------- 绘制 ----------
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 天空渐变
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.7, '#87CEEB');
                gradient.addColorStop(0.7, '#7ec850');
                gradient.addColorStop(1, '#6b8e4b');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 云朵
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(200 - cameraX * 0.3, 100, 40, 0, Math.PI*2);
                ctx.arc(250 - cameraX * 0.3, 80, 35, 0, Math.PI*2);
                ctx.arc(150 - cameraX * 0.3, 80, 30, 0, Math.PI*2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(600 - cameraX * 0.3, 150, 50, 0, Math.PI*2);
                ctx.arc(660 - cameraX * 0.3, 130, 40, 0, Math.PI*2);
                ctx.arc(540 - cameraX * 0.3, 130, 35, 0, Math.PI*2);
                ctx.fill();
                
                // 应用摄像机偏移
                ctx.save();
                ctx.translate(-cameraX, 0);
                
                // 绘制平台
                ctx.shadowColor = '#4a3a2a';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 4;
                
                for (let p of platforms) {
                    // 草地平台
                    ctx.fillStyle = '#8b6e4b';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    
                    // 草边
                    ctx.fillStyle = '#6b8e4b';
                    ctx.fillRect(p.x, p.y - 5, p.w, 8);
                    
                    // 纹理
                    ctx.strokeStyle = '#5f3f28';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < p.w; i += 20) {
                        ctx.beginPath();
                        ctx.moveTo(p.x + i, p.y);
                        ctx.lineTo(p.x + i + 10, p.y - 5);
                        ctx.strokeStyle = '#5f8b4b';
                        ctx.stroke();
                    }
                }
                
                // 绘制移动平台
                for (let mp of movingPlatforms) {
                    ctx.fillStyle = '#b88a5b';
                    ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
                    
                    ctx.fillStyle = '#6b8e4b';
                    ctx.fillRect(mp.x, mp.y - 5, mp.w, 8);
                    
                    // 轮子
                    ctx.fillStyle = '#5a3a1a';
                    ctx.beginPath();
                    ctx.arc(mp.x + 10, mp.y + mp.h, 8, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(mp.x + mp.w - 10, mp.y + mp.h, 8, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // 绘制金币
                for (let coin of coins) {
                    if (!coin.collected) {
                        ctx.shadowColor = 'gold';
                        ctx.shadowBlur = 15;
                        
                        // 金币闪烁
                        const sparkle = Math.sin(Date.now() * 0.01) * 0.2 + 0.8;
                        
                        ctx.beginPath();
                        ctx.arc(coin.x, coin.y, 12, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 215, 0, ${sparkle})`;
                        ctx.fill();
                        
                        ctx.font = 'bold 16px Arial';
                        ctx.fillStyle = '#b8860b';
                        ctx.shadowBlur = 10;
                        ctx.fillText('🪙', coin.x - 10, coin.y + 6);
                    }
                }
                
                // 绘制敌人
                for (let e of enemies) {
                    if (!e.dead) {
                        ctx.shadowColor = '#4a2a1a';
                        ctx.shadowBlur = 8;
                        
                        // 史莱姆
                        ctx.fillStyle = '#a55d5d';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 14, 14, 10, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#7a3f3f';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 18, 8, 5, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        // 眼睛
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 10, 3, 0, Math.PI*2);
                        ctx.arc(e.x + 20, e.y + 10, 3, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 9, e.y + 10, 1.5, 0, Math.PI*2);
                        ctx.arc(e.x + 21, e.y + 10, 1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                
                // 绘制出口
                if (exit) {
                    ctx.shadowColor = 'gold';
                    ctx.shadowBlur = 20;
                    
                    // 旗杆
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(exit.x + 18, exit.y - 40, 4, 100);
                    
                    // 旗子
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(exit.x + 20, exit.y - 40);
                    ctx.lineTo(exit.x + 60, exit.y - 30);
                    ctx.lineTo(exit.x + 20, exit.y - 20);
                    ctx.fill();
                }
                
                // 绘制土豆人
                ctx.shadowColor = '#2d1a0a';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
                
                // 无敌闪烁
                if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                // 土豆身体
                ctx.fillStyle = '#b07d44';
                ctx.beginPath();
                ctx.ellipse(player.x + 16, player.y + 20, 16, 18, 0, 0, Math.PI*2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(player.x + 10, player.y + 15, 4, 0, Math.PI*2);
                ctx.arc(player.x + 22, player.y + 15, 4, 0, Math.PI*2);
                ctx.fill();
                
                // 瞳孔（跟随面向方向）
                ctx.fillStyle = '#2d1a0a';
                ctx.beginPath();
                ctx.arc(player.x + (player.facing > 0 ? 13 : 9), player.y + 15, 2, 0, Math.PI*2);
                ctx.arc(player.x + (player.facing > 0 ? 25 : 21), player.y + 15, 2, 0, Math.PI*2);
                ctx.fill();
                
                // 嘴巴
                ctx.beginPath();
                ctx.strokeStyle = '#5d3a1a';
                ctx.lineWidth = 2;
                ctx.arc(player.x + 16, player.y + 22, 5, 0.1, Math.PI - 0.1);
                ctx.stroke();
                
                // 土豆芽
                ctx.fillStyle = '#6b8e4b';
                ctx.beginPath();
                ctx.ellipse(player.x + 16, player.y - 5, 5, 8, 0, 0, Math.PI*2);
                ctx.fill();
                
                ctx.globalAlpha = 1;
                
                ctx.restore();
                
                // 绘制HUD文字（不随摄像机移动）
                ctx.shadowBlur = 0;
                ctx.font = 'bold 24px "Segoe UI"';
                ctx.fillStyle = 'white';
                ctx.strokeStyle = '#2d1a0a';
                ctx.lineWidth = 3;
                ctx.strokeText(`🥔 ${gameState.lives}`, 20, 50);
                ctx.fillText(`🥔 ${gameState.lives}`, 20, 50);
                
                // 请求下一帧
                requestAnimationFrame(gameLoop);
            }
            
            // 游戏主循环
            function gameLoop() {
                update();
                draw();
            }
            
            // 初始化
            loadLevel(1);
            gameLoop();
        })();
    </script>
</body>
