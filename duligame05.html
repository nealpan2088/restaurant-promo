<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🎰 幸运大转盘 - 抽奖游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: linear-gradient(145deg, #2a1b3c, #1a0f2a);
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }

        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            position: relative;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
        }

        .coin-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1.3rem;
            border: 1px solid gold;
        }

        .free-spins {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #ff6b6b;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1.1rem;
        }

        /* 转盘容器 */
        .wheel-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
        }

        .wheel-wrapper {
            position: relative;
            width: min(85vw, 85vh, 450px);
            aspect-ratio: 1/1;
            margin: 0 auto;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), 0 0 0 8px #ffd966, 0 0 0 12px #b88a5b;
            transition: transform 0.1s;
            touch-action: none;
        }

        canvas:active {
            transform: scale(0.98);
        }

        /* 指针 */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #f2c744;
            filter: drop-shadow(0 8px 6px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -55px;
            left: -15px;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #fff5c1, #e0a82b);
            border-radius: 50%;
            box-shadow: 0 0 0 6px #a85e1a;
        }

        /* 抽奖按钮 */
        .spin-btn {
            width: min(80%, 300px);
            padding: 20px 0;
            margin: 20px auto;
            background: linear-gradient(145deg, #fedb7d, #f9b83c);
            border: none;
            border-radius: 60px;
            color: #2d1508;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 4px;
            box-shadow: 0 10px 0 #9f5e20, 0 5px 25px gold;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
            text-align: center;
        }

        .spin-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #9f5e20, 0 5px 20px gold;
        }

        .spin-btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 6px 0 #7a4518;
            pointer-events: none;
        }

        /* 奖品显示 */
        .prize-display {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 15px 25px;
            margin: 10px 0;
            color: white;
            font-size: 1.3rem;
            text-align: center;
            border: 2px solid gold;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .history-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .history-item {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            border: 1px solid gold;
        }

        /* 控制区 */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
        }

        .sound-toggle {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            border: 2px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sound-toggle.active {
            background: #4a9eff;
        }

        .reset-btn {
            padding: 12px 30px;
            border-radius: 30px;
            background: linear-gradient(145deg, #4a3a2a, #2d1a0a);
            border: 2px solid gold;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #7a4d1a;
            transition: 0.05s;
        }

        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7a4d1a;
        }

        /* 粒子画布 */
        .particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        /* 浮动奖励 */
        .floating-reward {
            position: fixed;
            pointer-events: none;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 0 30px gold, 0 0 60px red;
            z-index: 2000;
            animation: floatReward 1.5s ease-out forwards;
            white-space: nowrap;
        }

        @keyframes floatReward {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-150px) scale(2); }
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-content {
            background: linear-gradient(145deg, #fdebb3, #f9d77e);
            padding: 30px 20px;
            border-radius: 60px;
            text-align: center;
            border: 8px solid #c09b5e;
            width: min(90%, 350px);
            box-shadow: 0 30px 40px rgba(0,0,0,0.5);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 3rem;
            color: #a55233;
            margin-bottom: 15px;
        }

        .modal-prize {
            font-size: 2.5rem;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,215,0,0.2);
            border-radius: 50px;
            border: 3px dashed gold;
        }

        .modal-btn {
            background: #f9b83c;
            border: none;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #9f5e20;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        /* 微信提示 */
        .wx-tip {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 100;
            border: 1px solid gold;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 微信提示 -->
        <div class="wx-tip" id="wxTip">点击屏幕激活音效</div>

        <!-- 顶部状态 -->
        <div class="status-bar">
            <div class="coin-box">
                <span>🪙</span>
                <span id="coinDisplay">100</span>
            </div>
            <div class="free-spins">
                <span>🎁</span>
                <span id="freeSpinsDisplay">3</span>
            </div>
        </div>

        <!-- 转盘区域 -->
        <div class="wheel-container">
            <div class="wheel-wrapper">
                <canvas id="wheelCanvas" width="800" height="800"></canvas>
                <div class="pointer"></div>
            </div>

            <!-- 抽奖按钮 -->
            <button class="spin-btn" id="spinBtn">🎲 抽 奖</button>

            <!-- 当前奖品显示 -->
            <div class="prize-display" id="prizeDisplay">
                🎰 点击抽奖，试试手气！
            </div>

            <!-- 抽奖历史 -->
            <div class="history-box" id="historyBox">
                <div class="history-item">🎰</div>
                <div class="history-item">🎰</div>
                <div class="history-item">🎰</div>
                <div class="history-item">🎰</div>
                <div class="history-item">🎰</div>
            </div>
        </div>

        <!-- 控制区 -->
        <div class="control-panel">
            <div class="sound-toggle active" id="soundToggle">🔊</div>
            <button class="reset-btn" id="resetBtn">🔄 重置</button>
        </div>
    </div>

    <!-- 粒子画布 -->
    <canvas id="particleCanvas" class="particle-canvas"></canvas>

    <!-- 大奖模态框 -->
    <div id="jackpotModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title">🎉 恭喜！</div>
            <div class="modal-prize" id="modalPrize">🏆 大奖</div>
            <button class="modal-btn" id="modalBtn">太棒了！</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 平台检测 ====================
            const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry/i.test(navigator.userAgent);
            
            if (isWeChat) {
                document.getElementById('wxTip').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('wxTip').style.display = 'none';
                }, 4000);
            }

            // ==================== 音效系统 ====================
            let soundEnabled = true;
            let audioContext = null;
            let audioInitialized = false;

            function initAudio() {
                if (audioInitialized) return;
                try {
                    window.AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    audioInitialized = true;
                    console.log('Audio initialized');
                } catch (e) {
                    console.log('Audio not supported');
                }
            }

            function playSound(type) {
                if (!soundEnabled || !audioContext || audioContext.state !== 'running') return;

                try {
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    switch(type) {
                        case 'spin':
                            // 旋转音效 - 快速上升音阶
                            for (let i = 0; i < 5; i++) {
                                setTimeout(() => {
                                    if (audioContext.state === 'running') {
                                        const osc = audioContext.createOscillator();
                                        const gain = audioContext.createGain();
                                        osc.connect(gain);
                                        gain.connect(audioContext.destination);
                                        osc.frequency.value = 440 + i * 110;
                                        gain.gain.value = 0.1;
                                        osc.start();
                                        osc.stop(audioContext.currentTime + 0.1);
                                    }
                                }, i * 50);
                            }
                            break;
                            
                        case 'win':
                            // 中奖音效 - 欢快旋律
                            oscillator.frequency.value = 523.25;
                            gainNode.gain.value = 0.15;
                            oscillator.start();
                            
                            setTimeout(() => {
                                if (audioContext.state === 'running') {
                                    const osc2 = audioContext.createOscillator();
                                    const gain2 = audioContext.createGain();
                                    osc2.connect(gain2);
                                    gain2.connect(audioContext.destination);
                                    osc2.frequency.value = 659.25;
                                    gain2.gain.value = 0.15;
                                    osc2.start();
                                    osc2.stop(audioContext.currentTime + 0.2);
                                }
                            }, 150);
                            
                            setTimeout(() => {
                                if (audioContext.state === 'running') {
                                    const osc3 = audioContext.createOscillator();
                                    const gain3 = audioContext.createGain();
                                    osc3.connect(gain3);
                                    gain3.connect(audioContext.destination);
                                    osc3.frequency.value = 783.99;
                                    gain3.gain.value = 0.15;
                                    osc3.start();
                                    osc3.stop(audioContext.currentTime + 0.2);
                                }
                            }, 300);
                            
                            oscillator.stop(audioContext.currentTime + 0.4);
                            break;
                            
                        case 'jackpot':
                            // 大奖音效 - 华丽长音
                            for (let i = 0; i < 8; i++) {
                                setTimeout(() => {
                                    if (audioContext.state === 'running') {
                                        const osc = audioContext.createOscillator();
                                        const gain = audioContext.createGain();
                                        osc.connect(gain);
                                        gain.connect(audioContext.destination);
                                        osc.frequency.value = 440 * Math.pow(1.2, i);
                                        gain.gain.value = 0.15;
                                        osc.start();
                                        osc.stop(audioContext.currentTime + 0.2);
                                    }
                                }, i * 150);
                            }
                            break;
                            
                        case 'click':
                            oscillator.frequency.value = 880;
                            gainNode.gain.value = 0.05;
                            oscillator.start();
                            oscillator.stop(audioContext.currentTime + 0.05);
                            break;
                            
                        case 'coin':
                            oscillator.frequency.value = 1318.52;
                            gainNode.gain.value = 0.1;
                            oscillator.start();
                            oscillator.stop(audioContext.currentTime + 0.1);
                            break;
                    }
                } catch (e) {
                    console.log('Sound play failed:', e);
                }
            }

            function activateAudio() {
                if (!audioInitialized) {
                    initAudio();
                }
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume().then(() => {
                        playSound('click');
                    });
                } else if (audioContext && audioContext.state === 'running') {
                    playSound('click');
                }
            }

            // 音频激活
            document.addEventListener('touchstart', activateAudio, { once: true });
            document.addEventListener('mousedown', activateAudio, { once: true });

            // 音效开关
            document.getElementById('soundToggle').addEventListener('click', (e) => {
                e.preventDefault();
                soundEnabled = !soundEnabled;
                const toggle = document.getElementById('soundToggle');
                toggle.innerText = soundEnabled ? '🔊' : '🔇';
                toggle.classList.toggle('active', soundEnabled);
                if (soundEnabled) activateAudio();
            });

            // ==================== 粒子系统 ====================
            const particleCanvas = document.getElementById('particleCanvas');
            const pCtx = particleCanvas.getContext('2d');
            let particles = [];

            function resizeParticleCanvas() {
                particleCanvas.width = window.innerWidth;
                particleCanvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeParticleCanvas);
            resizeParticleCanvas();

            class Particle {
                constructor(x, y, color, size = 10) {
                    this.x = x;
                    this.y = y;
                    this.vx = (Math.random() - 0.5) * 10;
                    this.vy = (Math.random() - 0.8) * 10 - 5;
                    this.color = color;
                    this.size = size;
                    this.life = 1;
                    this.decay = 0.02;
                }

                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    this.vy += 0.2; // 重力
                    this.life -= this.decay;
                }

                draw(ctx) {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // 光晕效果
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = 20;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }

            function createExplosion(x, y, color, count = 30) {
                for (let i = 0; i < count; i++) {
                    particles.push(new Particle(x, y, color, 5 + Math.random() * 10));
                }
            }

            function updateParticles() {
                pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
                
                for (let i = particles.length - 1; i >= 0; i--) {
                    particles[i].update();
                    particles[i].draw(pCtx);
                    
                    if (particles[i].life <= 0) {
                        particles.splice(i, 1);
                    }
                }
                
                requestAnimationFrame(updateParticles);
            }
            updateParticles();

            // ==================== 转盘配置 ====================
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            
            // 奖品配置
            const PRIZES = [
                { name: '100 🪙', value: 100, color: '#FBC85A', textColor: '#5d3a1a', emoji: '💰' },
                { name: '50 🪙', value: 50, color: '#58C4DD', textColor: '#1a4b5e', emoji: '🪙' },
                { name: '谢谢参与', value: 0, color: '#E15554', textColor: 'white', emoji: '😢' },
                { name: '200 🪙', value: 200, color: '#6CCF8D', textColor: '#1d632b', emoji: '💎' },
                { name: '免费抽奖', value: 'free', color: '#B980F0', textColor: '#2f0b5e', emoji: '🎁' },
                { name: '500 🪙', value: 500, color: '#FFB347', textColor: '#7b4100', emoji: '🏆' },
                { name: '1000 🪙', value: 1000, color: '#FF6B6B', textColor: 'white', emoji: '👑' },
                { name: '双倍奖励', value: 'double', color: '#4A90E2', textColor: 'white', emoji: '2️⃣' }
            ];

            // 游戏状态
            let coins = 100;
            let freeSpins = 3;
            let currentAngle = 0;
            let isSpinning = false;
            let spinHistory = [];
            const maxHistory = 5;

            // 转盘参数
            const segmentCount = PRIZES.length;
            const segmentAngle = (Math.PI * 2) / segmentCount;

            // ==================== 绘制转盘 ====================
            function drawWheel(highlightIndex = -1) {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const radius = Math.min(w, h) * 0.4;

                ctx.clearRect(0, 0, w, h);

                // 绘制外圈金属
                ctx.beginPath();
                ctx.arc(cx, cy, radius + 20, 0, Math.PI * 2);
                ctx.fillStyle = '#9c7e5c';
                ctx.shadowColor = '#000000aa';
                ctx.shadowBlur = 20;
                ctx.fill();

                // 绘制扇区
                for (let i = 0; i < segmentCount; i++) {
                    const start = i * segmentAngle + currentAngle;
                    const end = start + segmentAngle;

                    // 扇形
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, start, end);
                    ctx.closePath();

                    // 颜色
                    if (i === highlightIndex) {
                        ctx.fillStyle = lightenColor(PRIZES[i].color, 40);
                        ctx.shadowColor = 'gold';
                        ctx.shadowBlur = 30;
                    } else {
                        ctx.fillStyle = PRIZES[i].color;
                        ctx.shadowColor = '#00000080';
                        ctx.shadowBlur = 10;
                    }
                    ctx.fill();

                    // 分割线
                    ctx.strokeStyle = '#FFF9E6';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, radius, start, end);
                    ctx.lineTo(cx, cy);
                    ctx.stroke();

                    // 绘制emoji
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(start + segmentAngle / 2);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.font = 'bold 48px "Segoe UI", "Arial", sans-serif';
                    ctx.fillStyle = PRIZES[i].textColor;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = '#00000080';
                    ctx.fillText(PRIZES[i].emoji, radius * 0.7, 0);
                    ctx.restore();
                }

                // 中心装饰
                ctx.beginPath();
                ctx.arc(cx, cy, 40, 0, Math.PI * 2);
                ctx.fillStyle = '#FED54E';
                ctx.shadowColor = 'gold';
                ctx.shadowBlur = 25;
                ctx.fill();

                // 中心文字
                ctx.font = 'bold 30px Arial';
                ctx.fillStyle = '#2d1508';
                ctx.shadowBlur = 0;
                ctx.fillText('🎰', cx - 18, cy + 10);
            }

            function lightenColor(color, percent) {
                if (color.startsWith('#')) {
                    let r = parseInt(color.slice(1, 3), 16);
                    let g = parseInt(color.slice(3, 5), 16);
                    let b = parseInt(color.slice(5, 7), 16);
                    r = Math.min(255, r + percent);
                    g = Math.min(255, g + percent);
                    b = Math.min(255, b + percent);
                    return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
                }
                return color;
            }

            // ==================== 抽奖逻辑 ====================
            function spin() {
                if (isSpinning) return;
                
                // 检查抽奖资格
                if (coins < 10 && freeSpins <= 0) {
                    document.getElementById('prizeDisplay').innerHTML = '❌ 金币不足！点击重置';
                    return;
                }

                // 消耗
                if (freeSpins > 0) {
                    freeSpins--;
                } else {
                    coins -= 10;
                }

                playSound('spin');
                updateUI();
                
                isSpinning = true;
                document.getElementById('spinBtn').disabled = true;

                // 随机目标角度
                const rounds = 15 + Math.floor(Math.random() * 10); // 15-25圈
                const targetSegment = Math.floor(Math.random() * segmentCount);
                const targetAngle = currentAngle + (Math.PI * 2 * rounds) + (targetSegment * segmentAngle);
                
                const startAngle = currentAngle;
                const startTime = performance.now();
                const duration = 2500; // 2.5秒

                function animate(now) {
                    const elapsed = now - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // 缓动函数：先快后慢
                    const easeOut = 1 - Math.pow(1 - progress, 3);
                    
                    currentAngle = startAngle + (targetAngle - startAngle) * easeOut;
                    drawWheel();

                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        finishSpin(targetSegment);
                    }
                }

                requestAnimationFrame(animate);
            }

            function finishSpin(segmentIndex) {
                const prize = PRIZES[segmentIndex];
                
                // 高亮中奖区域
                drawWheel(segmentIndex);
                setTimeout(() => drawWheel(), 300);

                // 获取转盘位置用于粒子特效
                const rect = canvas.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                // 处理奖励
                let rewardText = '';
                let rewardValue = 0;

                if (prize.name.includes('谢谢')) {
                    rewardText = '😢 谢谢参与';
                    playSound('click');
                } else if (prize.value === 'free') {
                    freeSpins += 1;
                    rewardText = '🎁 获得免费抽奖一次！';
                    playSound('coin');
                    createExplosion(centerX, centerY, '#B980F0', 20);
                } else if (prize.value === 'double') {
                    const doubleAmount = Math.floor(Math.random() * 100) + 50;
                    coins += doubleAmount * 2;
                    rewardText = `2️⃣ 双倍奖励 +${doubleAmount * 2}🪙`;
                    playSound('jackpot');
                    createExplosion(centerX, centerY, '#FFD966', 40);
                } else {
                    coins += prize.value;
                    rewardValue = prize.value;
                    rewardText = `${prize.emoji} 获得 ${prize.value}🪙`;
                    
                    if (prize.value >= 500) {
                        playSound('jackpot');
                        createExplosion(centerX, centerY, '#FF6B6B', 50);
                        
                        // 显示大奖模态框
                        document.getElementById('modalPrize').innerHTML = prize.emoji + ' ' + prize.name;
                        document.getElementById('jackpotModal').classList.remove('hidden');
                    } else if (prize.value >= 200) {
                        playSound('win');
                        createExplosion(centerX, centerY, '#FBC85A', 30);
                    } else {
                        playSound('coin');
                        createExplosion(centerX, centerY, '#58C4DD', 20);
                    }
                }

                // 更新显示
                document.getElementById('prizeDisplay').innerHTML = rewardText;
                
                // 漂浮文字
                showFloatingText(rewardText, centerX, centerY - 50);

                // 添加到历史
                spinHistory.unshift(prize.emoji);
                if (spinHistory.length > maxHistory) spinHistory.pop();
                updateHistory();

                updateUI();
                
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }

            // ==================== 漂浮文字 ====================
            function showFloatingText(text, x, y) {
                const div = document.createElement('div');
                div.className = 'floating-reward';
                div.innerText = text;
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                document.body.appendChild(div);
                
                setTimeout(() => div.remove(), 1500);
            }

            // ==================== 更新UI ====================
            function updateUI() {
                document.getElementById('coinDisplay').innerText = coins;
                document.getElementById('freeSpinsDisplay').innerText = freeSpins;
            }

            function updateHistory() {
                const historyBox = document.getElementById('historyBox');
                historyBox.innerHTML = '';
                
                for (let i = 0; i < maxHistory; i++) {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerText = spinHistory[i] || '🎰';
                    historyBox.appendChild(item);
                }
            }

            // ==================== 重置游戏 ====================
            function resetGame() {
                coins = 100;
                freeSpins = 3;
                spinHistory = [];
                currentAngle = 0;
                drawWheel();
                updateUI();
                updateHistory();
                document.getElementById('prizeDisplay').innerHTML = '🎰 游戏重置！试试手气';
                playSound('click');
            }

            // ==================== 事件绑定 ====================
            document.getElementById('spinBtn').addEventListener('click', spin);
            document.getElementById('spinBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                spin();
            });

            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('resetBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                resetGame();
            });

            canvas.addEventListener('click', spin);
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                spin();
            });

            document.getElementById('modalBtn').addEventListener('click', () => {
                document.getElementById('jackpotModal').classList.add('hidden');
            });
            document.getElementById('modalBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                document.getElementById('jackpotModal').classList.add('hidden');
            });

            // ==================== 初始化 ====================
            drawWheel();
            updateUI();
            updateHistory();

            // 欢迎消息
            setTimeout(() => {
                showFloatingText('👋 点击转盘抽奖', window.innerWidth/2, window.innerHeight/2);
            }, 500);
        })();
    </script>
</body>
</html>
