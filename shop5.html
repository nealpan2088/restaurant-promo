<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>川香小馆 · 通关赢大奖 挑战你的味蕾</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a0f0a, #2d1a0e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            overflow-x: hidden;
        }

        /* 动态火焰背景 */
        .fire-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .fire {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, #f85a3a 0%, transparent 50%),
                        radial-gradient(circle at 70% 60%, #ffd700 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, #d43f1f 0%, transparent 50%);
            filter: blur(40px);
            animation: fireMove 8s infinite alternate;
        }

        @keyframes fireMove {
            0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
            100% { transform: scale(1.2) translate(-5%, -5%); opacity: 0.8; }
        }

        .spark {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 20px gold;
            animation: sparkFly 3s infinite linear;
        }

        @keyframes sparkFly {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* 主容器 */
        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(26, 15, 10, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(248, 90, 58, 0.5);
            box-shadow: 0 0 50px rgba(248, 90, 58, 0.3);
            position: relative;
            min-height: 100vh;
            color: #fff;
        }

        /* 创意倒计时区域 */
        .countdown-hero {
            padding: 30px 20px 40px;
            background: linear-gradient(165deg, #f85a3a 0%, #d43f1f 100%);
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: 10px;
        }

        .floating-chili {
            position: absolute;
            font-size: 60px;
            opacity: 0.1;
            animation: floatAround 10s infinite;
        }

        .chili1 { top: 10px; left: 10px; animation-delay: 0s; }
        .chili2 { bottom: 20px; right: 20px; animation-delay: 2s; }
        .chili3 { top: 50px; right: 50px; animation-delay: 4s; }

        @keyframes floatAround {
            0%, 100% { transform: rotate(0deg) translate(0, 0); }
            25% { transform: rotate(10deg) translate(10px, -10px); }
            75% { transform: rotate(-10deg) translate(-10px, 10px); }
        }

        .event-title {
            font-size: 48px;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 5px 0 #9e2b12, 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: titlePulse 1s infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 倒计时 */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 10px;
            perspective: 1000px;
        }

        .time-box {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px 10px;
            min-width: 70px;
            text-align: center;
            border: 2px solid #ffd700;
            transform: rotateY(10deg) rotateX(5deg);
            animation: boxGlow 2s infinite alternate;
        }

        .time-box:nth-child(1) { animation-delay: 0s; }
        .time-box:nth-child(2) { animation-delay: 0.3s; }
        .time-box:nth-child(3) { animation-delay: 0.6s; }
        .time-box:nth-child(4) { animation-delay: 0.9s; }

        @keyframes boxGlow {
            from { box-shadow: 0 0 20px gold; }
            to { box-shadow: 0 0 40px #f85a3a; }
        }

        .time-number {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            line-height: 1;
            font-family: 'Arial Black', sans-serif;
        }

        .time-label {
            font-size: 14px;
            color: #fff;
            text-transform: uppercase;
        }

        /* 领券区域 */
        .coupon-section {
            padding: 20px;
        }

        .section-badge {
            display: inline-block;
            background: #f85a3a;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            margin-bottom: 20px;
            border: 2px solid gold;
            animation: badgeWobble 2s infinite;
        }

        @keyframes badgeWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(2deg); }
            75% { transform: rotate(-2deg); }
        }

        .coupon-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid #f85a3a;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .coupon-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .coupon-value {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            margin-bottom: 10px;
        }

        .coupon-desc {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .coupon-stock {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stock-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .stock-fill {
            height: 100%;
            width: 70%;
            background: linear-gradient(90deg, #ffd700, #f85a3a);
            border-radius: 4px;
            animation: stockPulse 2s infinite;
        }

        @keyframes stockPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .claim-btn {
            width: 100%;
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 700;
            padding: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #9e2b12, 0 10px 30px rgba(248,90,58,0.5);
            transition: all 0.08s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .claim-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9e2b12, 0 10px 30px rgba(248,90,58,0.5);
        }

        .claim-btn:disabled {
            opacity: 0.6;
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9e2b12;
            pointer-events: none;
        }

        /* 趣味小游戏 - 接辣椒 */
        .game-section {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            margin: 10px 20px;
            border: 2px solid #f85a3a;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .game-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #f85a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .game-stats {
            display: flex;
            gap: 20px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 900;
            color: #ffd700;
        }

        .stat-label {
            font-size: 12px;
            color: #ddd;
        }

        /* 游戏画布 */
        .game-canvas-container {
            position: relative;
            width: 100%;
            height: 350px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid #f85a3a;
            box-shadow: 0 0 30px rgba(248,90,58,0.3);
            margin-bottom: 20px;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(180deg, #1a1a1a 0%, #2d1a0e 100%);
            cursor: none;
        }

        .game-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .game-btn {
            background: linear-gradient(145deg, #333, #222);
            border: 2px solid #f85a3a;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .game-btn:active {
            transform: scale(0.95);
            background: #f85a3a;
        }

        .game-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* 通关奖励弹窗 */
        .win-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .win-content {
            background: linear-gradient(145deg, #2b1a0e, #1f1209);
            border-radius: 50px;
            padding: 40px;
            max-width: 360px;
            width: 100%;
            border: 4px solid #ffd700;
            box-shadow: 0 0 60px gold;
            text-align: center;
            animation: winPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes winPop {
            from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }

        .win-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .win-title {
            font-size: 36px;
            font-weight: 900;
            color: #ffd700;
            margin-bottom: 15px;
        }

        .win-prize {
            font-size: 28px;
            background: rgba(255,215,0,0.2);
            padding: 15px;
            border-radius: 40px;
            margin: 20px 0;
            border: 2px dashed gold;
        }

        /* 手机号弹窗 */
        .phone-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .phone-content {
            background: linear-gradient(145deg, #2b1a0e, #1f1209);
            border-radius: 50px;
            padding: 35px;
            max-width: 360px;
            width: 100%;
            border: 3px solid #f85a3a;
        }

        .phone-input {
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffd700;
            border-radius: 50px;
            font-size: 20px;
            color: white;
            text-align: center;
            letter-spacing: 3px;
            margin: 20px 0;
            outline: none;
        }

        .phone-input:focus {
            border-color: #f85a3a;
            box-shadow: 0 0 30px rgba(248,90,58,0.5);
        }

        .phone-btns {
            display: flex;
            gap: 15px;
        }

        /* 核销面板 */
        .verify-panel {
            margin: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            border: 2px solid #f85a3a;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .record-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 13px;
        }

        .record-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: flex;
            justify-content: space-between;
        }

        /* 底部 */
        .footer {
            padding: 20px;
            text-align: center;
            color: #b99e7c;
            border-top: 1px solid #f85a3a;
        }
    </style>
</head>
<body>
    <div class="fire-bg">
        <div class="fire"></div>
    </div>

    <div class="app-container">
        <!-- 倒计时区域 -->
        <div class="countdown-hero">
            <div class="floating-chili chili1">🌶️</div>
            <div class="floating-chili chili2">🌶️</div>
            <div class="floating-chili chili3">🌶️</div>
            
            <div class="event-title">🌶️ 辣王挑战</div>
            
            <div class="countdown-wrapper">
                <div class="time-box">
                    <div class="time-number" id="days">00</div>
                    <div class="time-label">天</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="hours">00</div>
                    <div class="time-label">时</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="minutes">00</div>
                    <div class="time-label">分</div>
                </div>
                <div class="time-box">
                    <div class="time-number" id="seconds">00</div>
                    <div class="time-label">秒</div>
                </div>
            </div>
        </div>

        <!-- 优惠券 -->
        <div class="coupon-section">
            <div class="section-badge">🔥 限时抢购 🔥</div>
            
            <div class="coupon-card" data-coupon-id="1">
                <div class="coupon-value">¥38</div>
                <div class="coupon-desc">招牌烤鱼立减券 · 满100可用</div>
                <div class="coupon-stock">
                    <span>剩余 <span class="stock-num">56</span> 张</span>
                    <div class="stock-bar"><div class="stock-fill" style="width:56%"></div></div>
                </div>
                <button class="claim-btn" onclick="claimCoupon(this, '招牌烤鱼立减券', '¥38')">立即领取</button>
            </div>

            <div class="coupon-card" data-coupon-id="2">
                <div class="coupon-value">5折</div>
                <div class="coupon-desc">毛血旺套餐 · 原价128</div>
                <div class="coupon-stock">
                    <span>剩余 <span class="stock-num">32</span> 张</span>
                    <div class="stock-bar"><div class="stock-fill" style="width:32%"></div></div>
                </div>
                <button class="claim-btn" onclick="claimCoupon(this, '毛血旺5折券', '5折')">立即领取</button>
            </div>
        </div>

        <!-- 小游戏 - 接辣椒 -->
        <div class="game-section">
            <div class="game-header">
                <span class="game-title">🌶️ 接辣椒挑战</span>
                <div class="game-stats">
                    <div class="stat">
                        <div class="stat-value" id="score">0</div>
                        <div class="stat-label">得分</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="target">20</div>
                        <div class="stat-label">目标</div>
                    </div>
                </div>
            </div>

            <div class="game-canvas-container">
                <canvas id="gameCanvas"></canvas>
            </div>

            <div class="game-controls">
                <button class="game-btn" id="startGameBtn" onclick="startGame()">▶ 开始挑战</button>
                <button class="game-btn" id="resetGameBtn" onclick="resetGame()" disabled>🔄 重新开始</button>
            </div>
            <p style="text-align:center; margin-top:15px; color:#ffd700;">👆 移动鼠标接住掉落的辣椒，接到20个通关！</p>
        </div>

        <!-- 核销记录面板 -->
        <div class="verify-panel">
            <div class="panel-header">
                <span>📋 实时核销记录</span>
                <span style="font-size:12px;">(模拟后端)</span>
            </div>
            <div class="record-list" id="recordList">
                <div class="record-item">等待活动开始...</div>
            </div>
        </div>

        <!-- 手机号弹窗 -->
        <div class="phone-popup" id="phonePopup">
            <div class="phone-content">
                <h2 style="color:#ffd700; text-align:center;">📱 验证手机号</h2>
                <p style="text-align:center; color:#ddd; margin:10px 0;">用于核销凭证</p>
                <input type="tel" class="phone-input" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                <div class="phone-btns">
                    <button class="game-btn" onclick="closePhonePopup()" style="background:#333;">取消</button>
                    <button class="game-btn" onclick="submitPhone()" style="background:#f85a3a;">确认</button>
                </div>
            </div>
        </div>

        <!-- 通关奖励弹窗 -->
        <div class="win-popup" id="winPopup">
            <div class="win-content">
                <div class="win-emoji">🏆</div>
                <div class="win-title">通关成功！</div>
                <div class="win-prize" id="winPrizeName">招牌烤鱼券</div>
                <p style="color:#ddd; margin:15px 0;">请输入手机号领取奖品</p>
                <button class="claim-btn" onclick="claimGamePrize()" style="font-size:18px;">立即领取</button>
            </div>
        </div>

        <div class="footer">
            <p>川香小馆 · 幸福路88号</p>
            <p>📞 185-1234-5678</p>
        </div>
    </div>

    <script>
        // ==================== 后端模拟数据库 ====================
        let records = JSON.parse(localStorage.getItem('promo_records')) || [];
        let gameWinRecord = null; // 记录当前游戏通关的奖品

        // 倒计时
        function updateCountdown() {
            const targetDate = new Date();
            targetDate.setHours(23, 59, 59, 999);
            
            const now = new Date();
            const diff = targetDate - now;
            
            if (diff < 0) {
                document.getElementById('days').innerHTML = '00';
                document.getElementById('hours').innerHTML = '00';
                document.getElementById('minutes').innerHTML = '00';
                document.getElementById('seconds').innerHTML = '00';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').innerHTML = String(days).padStart(2, '0');
            document.getElementById('hours').innerHTML = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerHTML = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerHTML = String(seconds).padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 创建火花粒子
        for (let i = 0; i < 30; i++) {
            const spark = document.createElement('div');
            spark.className = 'spark';
            spark.style.left = Math.random() * 100 + '%';
            spark.style.animationDelay = Math.random() * 5 + 's';
            spark.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.querySelector('.fire-bg').appendChild(spark);
        }

        // ==================== 接辣椒游戏 ====================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrame;
        let gameActive = false;
        let score = 0;
        const targetScore = 20;
        
        // 玩家
        let player = {
            x: 0,
            y: 0,
            width: 80,
            height: 20
        };

        // 辣椒数组
        let chilies = [];

        // 调整画布尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            player.y = canvas.height - 30;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 鼠标移动
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            player.x = (e.clientX - rect.left) * scaleX - player.width / 2;
            
            // 边界限制
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        // 触摸移动
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            player.x = (touch.clientX - rect.left) * scaleX - player.width / 2;
            
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;
        });

        // 游戏开始
        function startGame() {
            if (gameActive) return;
            
            reset();
            gameActive = true;
            document.getElementById('startGameBtn').disabled = true;
            document.getElementById('resetGameBtn').disabled = false;
            
            // 游戏循环
            function gameLoop() {
                if (!gameActive) return;
                
                update();
                draw();
                animationFrame = requestAnimationFrame(gameLoop);
            }
            gameLoop();
        }

        // 重置游戏
        function resetGame() {
            if (gameActive) {
                gameActive = false;
                cancelAnimationFrame(animationFrame);
            }
            reset();
            document.getElementById('startGameBtn').disabled = false;
            document.getElementById('resetGameBtn').disabled = true;
        }

        function reset() {
            score = 0;
            chilies = [];
            document.getElementById('score').innerHTML = '0';
            updateScore();
            draw();
        }

        // 更新游戏
        function update() {
            // 生成新辣椒
            if (Math.random() < 0.02) {
                chilies.push({
                    x: Math.random() * (canvas.width - 30),
                    y: 0,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.random() * 3
                });
            }

            // 移动辣椒
            for (let i = chilies.length - 1; i >= 0; i--) {
                const chili = chilies[i];
                chili.y += chili.speed;

                // 碰撞检测
                if (chili.y + chili.height > player.y &&
                    chili.x < player.x + player.width &&
                    chili.x + chili.width > player.x) {
                    
                    chilies.splice(i, 1);
                    score++;
                    document.getElementById('score').innerHTML = score;
                    
                    // 通关检测
                    if (score >= targetScore) {
                        gameActive = false;
                        cancelAnimationFrame(animationFrame);
                        showWinPopup();
                    }
                }
                
                // 超出屏幕
                else if (chili.y > canvas.height) {
                    chilies.splice(i, 1);
                }
            }
        }

        // 绘制游戏
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制玩家（锅）
            ctx.fillStyle = '#f85a3a';
            ctx.shadowColor = '#ffd700';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.width, player.height, 10);
            ctx.fill();
            
            // 绘制辣椒
            ctx.shadowBlur = 15;
            chilies.forEach(chili => {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.ellipse(chili.x + 15, chili.y + 15, 12, 18, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 辣椒蒂
                ctx.fillStyle = '#4CAF50';
                ctx.beginPath();
                ctx.ellipse(chili.x + 15, chili.y + 5, 4, 6, 0, 0, Math.PI * 2);
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
        }

        // 工具函数
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        // 通关弹窗
        function showWinPopup() {
            // 随机选择一个奖品
            const prizes = [
                { name: '招牌烤鱼券', value: '¥38' },
                { name: '毛血旺5折券', value: '5折' },
                { name: '酸梅汤一杯', value: '免费' },
                { name: '烤鸡翅一份', value: '¥28' }
            ];
            const prize = prizes[Math.floor(Math.random() * prizes.length)];
            gameWinRecord = prize;
            
            document.getElementById('winPrizeName').innerHTML = `${prize.name} ${prize.value}`;
            document.getElementById('winPopup').style.display = 'flex';
        }

        // 领取游戏奖品
        function claimGamePrize() {
            document.getElementById('winPopup').style.display = 'none';
            document.getElementById('phonePopup').style.display = 'flex';
        }

        // ==================== 手机号验证和记录 ====================
        let currentCoupon = null;
        let currentCouponName = '';
        let currentCouponValue = '';

        function claimCoupon(btn, name, value) {
            currentCoupon = btn.closest('.coupon-card');
            currentCouponName = name;
            currentCouponValue = value;
            document.getElementById('phonePopup').style.display = 'flex';
            document.getElementById('phoneInput').value = '';
        }

        function closePhonePopup() {
            document.getElementById('phonePopup').style.display = 'none';
            gameWinRecord = null;
        }

        function submitPhone() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            // 判断是领券还是游戏奖品
            if (gameWinRecord) {
                // 游戏通关领奖
                const record = {
                    phone: phone,
                    type: 'game',
                    prizeName: gameWinRecord.name,
                    prizeValue: gameWinRecord.value,
                    timestamp: new Date().toLocaleString(),
                    status: '未核销'
                };
                records.push(record);
                
                alert(`🎉 恭喜获得游戏奖品！\n手机号: ${phone}\n奖品: ${gameWinRecord.name} ${gameWinRecord.value}\n\n到店请出示手机号核销`);
                gameWinRecord = null;
            } else if (currentCoupon) {
                // 检查是否已领过
                const hasClaimed = records.some(r => r.phone === phone && r.type === 'coupon' && r.couponName === currentCouponName);
                if (hasClaimed) {
                    alert('该手机号已领取过此优惠券');
                    closePhonePopup();
                    return;
                }

                // 更新库存
                const stockSpan = currentCoupon.querySelector('.stock-num');
                const stockNum = parseInt(stockSpan.innerText);
                if (stockNum > 0) {
                    stockSpan.innerText = stockNum - 1;
                }

                // 记录
                const record = {
                    phone: phone,
                    type: 'coupon',
                    couponName: currentCouponName,
                    couponValue: currentCouponValue,
                    timestamp: new Date().toLocaleString(),
                    status: '未核销'
                };
                records.push(record);

                // 按钮状态
                const btn = currentCoupon.querySelector('.claim-btn');
                btn.innerHTML = '已领取 ✓';
                btn.disabled = true;

                alert(`✅ 领券成功！\n手机号: ${phone}\n优惠券: ${currentCouponName}\n\n到店请出示手机号核销`);
            }

            localStorage.setItem('promo_records', JSON.stringify(records));
            updateRecordList();
            closePhonePopup();
        }

        // 更新记录列表
        function updateRecordList() {
            const recordList = document.getElementById('recordList');
            if (records.length === 0) {
                recordList.innerHTML = '<div class="record-item">暂无记录</div>';
                return;
            }
            
            const recent = records.slice(-5).reverse();
            recordList.innerHTML = recent.map(r => `
                <div class="record-item">
                    <span>${r.phone.substr(0,3)}****${r.phone.substr(-4)}</span>
                    <span>${r.type === 'coupon' ? '🎫' : '🎮'} ${r.couponName || r.prizeName}</span>
                    <span style="color:${r.status === '已核销' ? '#4CAF50' : '#FFD700'}">${r.status}</span>
                </div>
            `).join('');
        }
        updateRecordList();

        // 模拟核销功能 (可在控制台调用)
        function verifyPrize(phone) {
            const unverified = records.filter(r => r.phone === phone && r.status === '未核销');
            if (unverified.length > 0) {
                unverified.forEach(r => r.status = '已核销');
                localStorage.setItem('promo_records', JSON.stringify(records));
                updateRecordList();
                alert(`✅ 核销成功！共核销 ${unverified.length} 个奖品`);
            } else {
                alert('❌ 未找到未核销的奖品');
            }
        }

        // 得分更新
        function updateScore() {
            document.getElementById('score').innerHTML = score;
        }

        console.log('测试核销: verifyPrize("13800138000")');
    </script>
</body>
