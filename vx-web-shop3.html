<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智能店铺宣传 · 旗舰版</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 高德地图 JS API (使用2.0版本) -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=“63430514133026562d07bd151860e3e2”&plugin=AMap.Scale,AMap.Geolocation"></script>
    <!-- PWA 离线缓存 -->
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E5%BA%97%E9%93%BA%E5%AE%A3%E4%BC%A0%22%2C%22short_name%22%3A%22Shop%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f5f7fb%22%2C%22theme_color%22%3A%22%233b5c7a%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data:image/svg+xml%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ccircle%20cx%3D%2250%22%20cy%3D%2250%22%20r%3D%2250%22%20fill%3D%22%233b5c7a%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2270%22%20font-size%3D%2260%22%20text-anchor%3D%22middle%22%20fill%3D%22%23fff%22%3E%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">
    <style>
        /* ===== CSS 变量 ===== */
        :root {
            /* 主题1: 简约轻语 (默认) */
            --bg-color: #f5f7fb;
            --card-bg: rgba(255, 255, 255, 0.9);
            --card-bg-solid: #ffffffd6;
            --text-primary: #1e2b3a;
            --text-secondary: #4b5f73;
            --icon-color: #54708f;
            --accent-color: #3b5c7a;
            --border-color: rgba(0,0,0,0.03);
            --avatar-bg: linear-gradient(145deg, #e0e5ec, #ffffff);
            --badge-bg: #e9ecf2;
            --shadow-color: rgba(0,0,0,0.1);
            --map-bg: #eef2f6;
            --wifi-bg: #f2f5f9;
            --review-bg: #f0f4fa;
            --btn-bg: #4a637b;
            --btn-text: white;
            --footer-text: #9aaebf;
        }

        /* 主题2: 暖阳拿铁 */
        body.theme2 {
            --bg-color: #fae9dd;
            --card-bg: rgba(255, 245, 235, 0.9);
            --card-bg-solid: #fff5ebd6;
            --text-primary: #4a3729;
            --text-secondary: #7b5f4b;
            --icon-color: #b46f40;
            --accent-color: #b46f40;
            --border-color: rgba(180, 111, 64, 0.1);
            --avatar-bg: #f3d5b5;
            --badge-bg: #f3d5b5;
            --shadow-color: rgba(180, 111, 64, 0.15);
            --map-bg: #f3e1d2;
            --wifi-bg: #f3e1d2;
            --review-bg: #f3e1d2;
            --btn-bg: #b46f40;
        }

        /* 主题3: 深夜食堂 (深色) */
        body.theme3 {
            --bg-color: #2b3a4a;
            --card-bg: rgba(35, 45, 55, 0.9);
            --card-bg-solid: #2a3a48d6;
            --text-primary: #e2eaf1;
            --text-secondary: #b0c4d9;
            --icon-color: #8bb3d1;
            --accent-color: #8bb3d1;
            --border-color: rgba(255,255,255,0.05);
            --avatar-bg: #405b6e;
            --badge-bg: #405b6e;
            --shadow-color: rgba(0,0,0,0.3);
            --map-bg: #2f4050;
            --wifi-bg: #2f4050;
            --review-bg: #2f4050;
            --btn-bg: #5f7a94;
        }

        /* 主题4: 莫兰迪绿 */
        body.theme4 {
            --bg-color: #d4dbd0;
            --card-bg: #edf3ead9;
            --card-bg-solid: #e5efe0d9;
            --text-primary: #2c4238;
            --text-secondary: #4d6659;
            --icon-color: #5f8b74;
            --accent-color: #5f8b74;
            --border-color: rgba(95, 139, 116, 0.1);
            --avatar-bg: #b7cdac;
            --badge-bg: #b7cdac;
            --shadow-color: rgba(95, 139, 116, 0.15);
            --map-bg: #cbd9c4;
            --wifi-bg: #cbd9c4;
            --review-bg: #cbd9c4;
            --btn-bg: #5f8b74;
        }

        /* 主题5: 浪漫粉彩 */
        body.theme5 {
            --bg-color: #ffe7f0;
            --card-bg: #fff3f8f0;
            --card-bg-solid: #ffeef5f0;
            --text-primary: #6b3e4f;
            --text-secondary: #8f6173;
            --icon-color: #d45f8c;
            --accent-color: #d45f8c;
            --border-color: rgba(212, 95, 140, 0.1);
            --avatar-bg: #ffd9e8;
            --badge-bg: #ffd9e8;
            --shadow-color: rgba(212, 95, 140, 0.15);
            --map-bg: #ffe2ef;
            --wifi-bg: #ffe2ef;
            --review-bg: #ffe2ef;
            --btn-bg: #d45f8c;
        }

        /* 暗黑模式 (通过媒体查询自动适配) */
        @media (prefers-color-scheme: dark) {
            body:not(.theme3) {
                --bg-color: #1a1e24;
                --card-bg: rgba(30, 35, 42, 0.95);
                --card-bg-solid: #262d36e6;
                --text-primary: #e8edf2;
                --text-secondary: #b8c5d4;
                --icon-color: #7f9fbb;
                --accent-color: #7f9fbb;
                --border-color: rgba(255,255,255,0.05);
                --avatar-bg: #36424f;
                --badge-bg: #36424f;
                --shadow-color: rgba(0,0,0,0.5);
                --map-bg: #2d3843;
                --wifi-bg: #2d3843;
                --review-bg: #2d3843;
                --btn-bg: #5d748b;
                --footer-text: #8f9fb0;
            }
        }

        /* 应用变量 */
        body {
            background: var(--bg-color);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .page-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .shop-avatar {
            background: var(--avatar-bg);
            color: var(--text-primary);
        }

        .shop-name {
            background: linear-gradient(135deg, var(--text-primary), var(--icon-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .shop-badge {
            background: var(--badge-bg);
            color: var(--text-secondary);
        }

        .info-grid, .feature-card, .review-wall {
            background: var(--card-bg-solid);
            border-color: var(--border-color);
        }

        .info-icon, .feature-header i {
            color: var(--icon-color);
        }

        .info-content, .review-text {
            color: var(--text-primary);
        }

        .info-label {
            color: var(--text-secondary);
        }

        .map-container {
            background: var(--map-bg);
            border-color: var(--border-color);
        }

        .wifi-item {
            background: var(--wifi-bg);
        }

        .wifi-label {
            color: var(--text-secondary);
        }

        .wifi-value {
            background: var(--card-bg-solid);
            border-color: var(--border-color);
        }

        .review-item {
            background: var(--review-bg);
        }

        .btn-small, .wechat-btn, .nav-btn {
            background: var(--btn-bg);
            color: white;
        }

        .share-icon, #backToTop {
            background: var(--badge-bg);
            color: var(--text-secondary);
        }

        /* ===== 基础样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 16px 12px 60px;
            transition: background 0.3s ease;
            position: relative;
        }

        .page-card {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            border-radius: 36px;
            overflow: hidden;
            padding: 24px 20px 32px;
            transition: all 0.2s ease;
            position: relative;
        }

        /* 分享和返回顶部 */
        .float-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .float-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--card-bg-solid);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px var(--shadow-color);
            cursor: pointer;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .float-btn:active {
            transform: scale(0.9);
        }

        .share-icon {
            position: relative;
            float: right;
            background: var(--badge-bg);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        .shop-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            clear: both;
        }

        .shop-avatar {
            width: 70px;
            height: 70px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px -8px var(--shadow-color);
            font-size: 32px;
        }

        .shop-title {
            flex: 1;
        }

        .shop-name {
            font-size: 1.7rem;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .shop-badge {
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-block;
            font-weight: 500;
        }

        .info-grid {
            border-radius: 24px;
            padding: 18px 16px;
            margin-bottom: 20px;
        }

        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-icon {
            width: 24px;
            font-size: 1rem;
            text-align: center;
        }

        .info-content {
            flex: 1;
            font-size: 0.95rem;
            word-break: break-word;
        }

        .info-label {
            font-weight: 500;
            margin-right: 6px;
        }

        .feature-card {
            border-radius: 28px;
            padding: 18px 18px 20px;
            margin-bottom: 20px;
            transition: transform 0.15s;
        }

        .feature-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 14px;
        }

        /* 地图容器 */
        .map-container {
            border-radius: 20px;
            overflow: hidden;
            height: 180px;
            width: 100%;
            border: 1px solid var(--border-color);
            position: relative;
        }

        #amapContainer {
            width: 100%;
            height: 100%;
        }

        /* WiFi模块 */
        .wifi-item {
            border-radius: 18px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .wifi-item:last-child {
            margin-bottom: 0;
        }

        .wifi-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .wifi-value {
            padding: 6px 14px;
            border-radius: 30px;
            font-family: 'SF Mono', monospace;
            font-size: 0.9rem;
        }

        .wifi-pwd-hidden {
            filter: blur(4px);
            user-select: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
        }

        .btn-small {
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 8px var(--shadow-color);
            transition: 0.1s;
        }

        .btn-small:active {
            opacity: 0.7;
            transform: scale(0.97);
        }

        /* 评论墙 */
        .review-wall {
            border-radius: 30px;
            padding: 18px 12px 12px 18px;
            margin-top: 12px;
            max-height: 260px;
            overflow: hidden;
            position: relative;
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .review-marquee {
            height: 180px;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent, black 8%, black 92%, transparent);
        }

        .review-track {
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: scrollReviews 25s linear infinite;
            will-change: transform;
            padding: 4px 6px;
        }

        .review-item {
            display: flex;
            gap: 10px;
            border-radius: 24px;
            padding: 12px 16px;
            align-items: center;
        }

        .review-avatar {
            width: 38px;
            height: 38px;
            background: var(--icon-color);
            border-radius: 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .review-text {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.3;
        }

        .review-stars {
            color: #f5b342;
            font-size: 0.7rem;
            margin-top: 3px;
            letter-spacing: 2px;
        }

        @keyframes scrollReviews {
            0% { transform: translateY(0); }
            100% { transform: translateY(calc(-100% + 160px)); }
        }

        /* 微信弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg-solid);
            border-radius: 32px;
            padding: 30px 24px;
            max-width: 320px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px black;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .modal-content i {
            font-size: 4rem;
            color: #2b8635;
            margin-bottom: 16px;
        }

        .modal-content h3 {
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .modal-content p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            word-break: break-all;
            padding: 12px;
            background: var(--wifi-bg);
            border-radius: 12px;
            font-family: monospace;
        }

        .modal-close {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .wechat-btn, .nav-btn {
            border: none;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 0.95rem;
            width: 100%;
            margin: 12px 0 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .nav-btn {
            margin-top: 10px;
        }

        .hidden-module {
            display: none !important;
        }

        .clickable {
            cursor: pointer;
            transition: opacity 0.1s;
        }

        .clickable:active {
            opacity: 0.6;
        }

        /* 页面缓存指示器 */
        .cache-indicator {
            position: fixed;
            top: 10px;
            left: 10px;
            background: var(--card-bg-solid);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body class="theme1" id="bodyTheme">
    <!-- 缓存指示器 -->
    <div class="cache-indicator" id="cacheIndicator">
        <i class="fas fa-database"></i> <span id="cacheStatus">已缓存</span>
    </div>

    <!-- 微信弹窗 -->
    <div class="modal" id="wechatModal">
        <div class="modal-content">
            <i class="fab fa-weixin"></i>
            <h3>添加店铺微信</h3>
            <p id="wechatDisplay"></p>
            <button class="modal-close" id="copyWechatBtn">复制微信号</button>
            <button class="modal-close" style="margin-top:10px; background:var(--text-secondary);" id="closeModalBtn">关闭</button>
        </div>
    </div>

    <!-- 浮动按钮组 -->
    <div class="float-buttons">
        <div class="float-btn" id="backToTop" title="返回顶部">
            <i class="fas fa-arrow-up"></i>
        </div>
    </div>

    <div class="page-card" id="app">
        <!-- 分享图标 -->
        <div class="share-icon" id="shareBtn" title="分享店铺">
            <i class="fas fa-share-alt"></i>
        </div>

        <!-- 店铺头部 -->
        <div class="shop-header">
            <div class="shop-avatar"><i class="fas fa-store-alt"></i></div>
            <div class="shop-title">
                <div class="shop-name" id="shopNameDisplay">铺名加载中</div>
                <span class="shop-badge">
                    <i class="far fa-clock"></i> <span id="hoursDisplay">09:00-21:00</span>
                </span>
            </div>
        </div>

        <!-- 基础信息 -->
        <div class="info-grid">
            <div class="info-row" id="descRow">
                <div class="info-icon"><i class="fas fa-pen-fancy"></i></div>
                <div class="info-content"><span class="info-label">简介</span> <span id="descText"></span></div>
            </div>
            <div class="info-row" id="addressRow">
                <div class="info-icon"><i class="fas fa-map-pin"></i></div>
                <div class="info-content"><span class="info-label">地址</span> <span id="addressText"></span></div>
            </div>
            <div class="info-row" id="phoneRow">
                <div class="info-icon"><i class="fas fa-phone-alt"></i></div>
                <div class="info-content"><span class="info-label">电话</span> <span id="phoneText"></span></div>
            </div>
        </div>

        <!-- 微信按钮 -->
        <div id="wechatBtnContainer" class="hidden-module">
            <button class="wechat-btn" id="addWechatBtn">
                <i class="fab fa-weixin"></i> 加本店微信
            </button>
        </div>

        <!-- 地图模块 (可交互高德地图) -->
        <div class="feature-card hidden-module" id="mapModule">
            <div class="feature-header"><i class="fas fa-map-marked-alt"></i> 店铺位置</div>
            <div class="map-container">
                <div id="amapContainer"></div>
            </div>
            <button class="nav-btn hidden-module" id="navigateBtn">
                <i class="fas fa-directions"></i> 导航到店铺地址
            </button>
        </div>

        <!-- WiFi模块 -->
        <div class="feature-card hidden-module" id="wifiModule">
            <div class="feature-header"><i class="fas fa-wifi"></i> 店铺Wi-Fi</div>
            <div class="wifi-item">
                <span class="wifi-label"><i class="fas fa-network-wired"></i> 账号</span>
                <span class="wifi-value" id="wifiSsid">xxx</span>
            </div>
            <div class="wifi-item" style="flex-wrap:wrap; gap:12px;">
                <span class="wifi-label"><i class="fas fa-key"></i> 密码</span>
                <span id="wifiPwdSpan" class="wifi-pwd-hidden">••••••••</span>
                <button class="btn-small" id="unlockWifiBtn">
                    <i class="fas fa-heart"></i> 加关注领密码
                </button>
            </div>
        </div>

        <!-- 评论墙 -->
        <div class="review-wall">
            <div class="review-header">
                <i class="far fa-comment-dots"></i> 
                <span id="reviewTypeTitle">顾客好评</span>
                <span style="font-size:0.8rem; margin-left:auto;">✨ 真实留言</span>
            </div>
            <div class="review-marquee">
                <div class="review-track" id="reviewTrack"></div>
            </div>
        </div>

        <!-- 底部提示 -->
        <div style="text-align:center; margin-top:16px; color:var(--footer-text); font-size:0.7rem;">
            <i class="far fa-heart"></i> 点击电话可拨打 · 地址可复制
        </div>
    </div>

    <script>
        (function(){
            // ==================== 工具函数 ====================
            function getParam(p, def=null) {
                let val = new URLSearchParams(location.search).get(p);
                return (val === null || val === '') ? def : decodeURIComponent(val);
            }

            // ==================== 页面缓存 ====================
            if ('serviceWorker' in navigator) {
                // 注册Service Worker实现离线缓存
                navigator.serviceWorker.register('data:text/javascript;charset=utf-8,' + encodeURIComponent(`
                    const CACHE_NAME = 'shop-cache-v1';
                    const urlsToCache = ['.', 'index.html', 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css', 'https://webapi.amap.com/maps?v=2.0&key=demo'];
                    
                    self.addEventListener('install', event => {
                        event.waitUntil(
                            caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache))
                        );
                    });
                    
                    self.addEventListener('fetch', event => {
                        event.respondWith(
                            caches.match(event.request).then(response => response || fetch(event.request))
                        );
                    });
                `), { scope: './' }).then(() => {
                    document.getElementById('cacheStatus').innerText = '缓存已启用';
                }).catch(() => {
                    document.getElementById('cacheStatus').innerText = '缓存不可用';
                });
            }

            // 使用 localStorage 缓存页面数据
            function cachePageData(key, data) {
                try {
                    localStorage.setItem('shop_' + key, JSON.stringify({
                        data: data,
                        timestamp: Date.now()
                    }));
                } catch(e) {}
            }

            function getCachedPageData(key) {
                try {
                    const cached = localStorage.getItem('shop_' + key);
                    if (cached) {
                        const { data, timestamp } = JSON.parse(cached);
                        // 缓存1小时
                        if (Date.now() - timestamp < 3600000) {
                            return data;
                        }
                    }
                } catch(e) {}
                return null;
            }

            // ==================== 10种业态评论库 ====================
            const reviewLibrary = {
                1: { name: '☕ 咖啡店好评', reviews: [ /* ... 省略以节省空间，实际使用完整数据 */ ] },
                2: { name: '🍽️ 美食好评', reviews: [] },
                3: { name: '💇 美业好评', reviews: [] },
                4: { name: '🌸 花店好评', reviews: [] },
                5: { name: '📚 书店好评', reviews: [] },
                6: { name: '💪 健身好评', reviews: [] },
                7: { name: '🐾 宠物好评', reviews: [] },
                8: { name: '👗 服装好评', reviews: [] },
                9: { name: '🏨 民宿好评', reviews: [] },
                10: { name: '🍺 酒馆好评', reviews: [] }
            };

            // 完整评论数据 (为了节省篇幅，只填充第一条，实际使用完整)
            reviewLibrary[1].reviews = [
                { name:'咖啡小白', comment:'拿铁拉花太精致了', stars:5 },
                { name:'提神专家', comment:'美式很醇厚', stars:5 },
                { name:'甜品控', comment:'提拉米苏绝了', stars:5 },
                { name:'办公族', comment:'WiFi快，适合办公', stars:4 },
                { name:'小姐姐', comment:'环境ins风，拍照出片', stars:5 },
                { name:'老顾客', comment:'每天一杯，习惯了', stars:5 },
                { name:'探店达人', comment:'手冲咖啡有果香', stars:5 },
                { name:'情侣', comment:'约会好去处', stars:4 },
                { name:'学生党', comment:'价格实惠', stars:4 },
                { name:'咖啡师', comment:'豆子品质很好', stars:5 },
                { name:'游客', comment:'来旅游特意打卡', stars:5 },
                { name:'附近居民', comment:'早餐套餐很划算', stars:4 }
            ];

            // 读取所有参数
            const theme = getParam('theme', '1');
            const shopName = getParam('name', '未命名店铺');
            const hours = getParam('hours', '09:00–21:00');
            const desc = getParam('desc', '');
            const address = getParam('address', '');
            const phone = getParam('phone', '');
            const lat = getParam('lat', '');
            const lng = getParam('lng', '');
            const wifiSsid = getParam('wifiSsid', '');
            const wifiPwd = getParam('wifiPwd', '');
            const wechatId = getParam('wechat', '');
            const reviewType = getParam('review', '1');

            // 缓存当前配置
            cachePageData('current', { theme, shopName, hours, desc, address, phone, lat, lng, wifiSsid, wifiPwd, wechatId, reviewType });

            // 主题设置
            document.body.className = `theme${theme}`;

            // 基础信息填充
            document.getElementById('shopNameDisplay').innerText = shopName;
            document.getElementById('hoursDisplay').innerText = hours;
            document.getElementById('descText').innerText = desc || '—';
            document.getElementById('addressText').innerText = address || '—';
            document.getElementById('phoneText').innerText = phone || '—';

            // 微信按钮 + 弹窗
            const wechatContainer = document.getElementById('wechatBtnContainer');
            const wechatModal = document.getElementById('wechatModal');
            const wechatDisplay = document.getElementById('wechatDisplay');
            
            if (wechatId) {
                wechatContainer.classList.remove('hidden-module');
                wechatDisplay.innerText = wechatId;
                
                document.getElementById('addWechatBtn').addEventListener('click', function(){
                    wechatModal.classList.add('active');
                });
            } else {
                wechatContainer.classList.add('hidden-module');
            }

            // 关闭弹窗
            document.getElementById('closeModalBtn').addEventListener('click', function(){
                wechatModal.classList.remove('active');
            });

            // 复制微信号
            document.getElementById('copyWechatBtn').addEventListener('click', function(){
                navigator.clipboard?.writeText(wechatId).then(() => {
                    alert('微信号已复制');
                    wechatModal.classList.remove('active');
                });
            });

            // 地图模块 (高德)
            const mapModule = document.getElementById('mapModule');
            const navBtn = document.getElementById('navigateBtn');
            
            if (lat && lng) {
                mapModule.classList.remove('hidden-module');
                
                // 初始化高德地图
                window.onload = function() {
                    const map = new AMap.Map('amapContainer', {
                        zoom: 15,
                        center: [parseFloat(lng), parseFloat(lat)],
                        viewMode: '2D'
                    });
                    
                    // 添加标记
                    new AMap.Marker({
                        position: [parseFloat(lng), parseFloat(lat)],
                        map: map
                    });
                };
                
                if (address) {
                    navBtn.classList.remove('hidden-module');
                    navBtn.onclick = function(){
                        let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                        let encodeAddr = encodeURIComponent(address);
                        
                        if (isIOS) {
                            window.open(`http://maps.apple.com/?q=${encodeAddr}`, '_system');
                        } else {
                            // 高德地图URI
                            window.open(`amapuri://route/plan/?&dlat=${lat}&dlon=${lng}&dname=${encodeAddr}&dev=0&t=0`, '_blank');
                            setTimeout(() => window.open(`https://uri.amap.com/marker?position=${lng},${lat}&name=${encodeAddr}`, '_blank'), 300);
                        }
                    };
                }
            } else {
                mapModule.classList.add('hidden-module');
            }

            // WiFi模块
            const wifiModule = document.getElementById('wifiModule');
            if (wifiSsid && wifiPwd) {
                wifiModule.classList.remove('hidden-module');
                document.getElementById('wifiSsid').innerText = wifiSsid;
                const pwdSpan = document.getElementById('wifiPwdSpan');
                pwdSpan.innerText = '********';
                pwdSpan.className = 'wifi-pwd-hidden';
                
                document.getElementById('unlockWifiBtn').onclick = function() {
                    if (pwdSpan.classList.contains('wifi-pwd-hidden')) {
                        pwdSpan.innerText = wifiPwd;
                        pwdSpan.classList.remove('wifi-pwd-hidden');
                        pwdSpan.classList.add('wifi-value');
                        this.innerHTML = '<i class="fas fa-check"></i> 密码已显示';
                    } else {
                        pwdSpan.innerText = '********';
                        pwdSpan.classList.add('wifi-pwd-hidden');
                        pwdSpan.classList.remove('wifi-value');
                        this.innerHTML = '<i class="fas fa-heart"></i> 加关注领密码';
                    }
                };
            } else {
                wifiModule.classList.add('hidden-module');
            }

            // 评论墙生成
            let reviewData = reviewLibrary[reviewType] || reviewLibrary['1'];
            document.getElementById('reviewTypeTitle').innerText = reviewData.name;
            
            const track = document.getElementById('reviewTrack');
            if (track) {
                track.innerHTML = '';
                let allReviews = [...reviewData.reviews, ...reviewData.reviews.slice(0,6)];
                allReviews.forEach(r => {
                    let stars = '★'.repeat(r.stars) + '☆'.repeat(5-r.stars);
                    track.innerHTML += `
                        <div class="review-item">
                            <div class="review-avatar">${r.name[0]}</div>
                            <div class="review-text">
                                <strong>${r.name}</strong>
                                <div class="review-stars">${stars}</div>
                                <div>${r.comment}</div>
                            </div>
                        </div>
                    `;
                });
            }

            // 电话拨打
            if (phone) {
                document.getElementById('phoneRow').classList.add('clickable');
                document.getElementById('phoneRow').onclick = () => window.location.href = `tel:${phone}`;
            }
            
            // 地址复制
            if (address) {
                document.getElementById('addressRow').classList.add('clickable');
                document.getElementById('addressRow').onclick = () => {
                    navigator.clipboard?.writeText(address).then(() => alert('地址已复制'));
                };
            }

            // 分享功能
            document.getElementById('shareBtn').addEventListener('click', function(){
                if (navigator.share) {
                    navigator.share({ 
                        title: shopName, 
                        text: `快来逛逛 ${shopName}`, 
                        url: location.href 
                    });
                } else { 
                    navigator.clipboard?.writeText(location.href);
                    alert('链接已复制: ' + location.href); 
                }
            });

            // 返回顶部
            document.getElementById('backToTop').addEventListener('click', function(){
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // 简介为空时变灰
            if (!desc) document.getElementById('descText').style.opacity = '0.6';

            // 检测暗黑模式变化
            const darkModeMedia = window.matchMedia('(prefers-color-scheme: dark)');
            darkModeMedia.addEventListener('change', (e) => {
                // 重新应用主题
                document.body.className = `theme${theme}`;
            });
        })();
    </script>

    <!-- 优化建议 -->
    
</body>
