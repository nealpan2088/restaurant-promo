<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>川香小馆 · 狂欢倒计时 领券抽大奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            overflow-x: hidden;
        }

        /* 动态炫光背景 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, #f85a3a 0%, #4a1f0f 80%);
            overflow: hidden;
        }

        /* 动态光栅效果 */
        .dynamic-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                transparent 0px,
                transparent 20px,
                rgba(255, 215, 0, 0.03) 20px,
                rgba(255, 215, 0, 0.03) 40px
            );
            animation: moveRays 20s linear infinite;
        }

        @keyframes moveRays {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(10%, 10%) rotate(10deg); }
        }

        /* 漂浮光点 */
        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            box-shadow: 0 0 20px gold;
            animation: particleFloat 15s infinite linear;
        }

        @keyframes particleFloat {
            from { transform: translateY(100vh) translateX(-10vw) rotate(0deg); }
            to { transform: translateY(-20vh) translateX(20vw) rotate(360deg); }
        }

        /* 主容器 */
        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(26, 15, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(248, 90, 58, 0.3);
            box-shadow: 0 0 50px rgba(248, 90, 58, 0.3), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
            position: relative;
            min-height: 100vh;
            color: #fff;
        }

        /* 创意倒计时区域 */
        .countdown-hero {
            padding: 30px 20px 40px;
            background: linear-gradient(165deg, #f85a3a 0%, #d43f1f 100%);
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            margin-bottom: 10px;
        }

        .countdown-hero::before {
            content: '🔥';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 150px;
            opacity: 0.1;
            transform: rotate(15deg);
            animation: fireGlow 2s infinite alternate;
        }

        @keyframes fireGlow {
            from { opacity: 0.1; transform: rotate(15deg) scale(1); }
            to { opacity: 0.2; transform: rotate(15deg) scale(1.1); }
        }

        .event-title {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 5px 0 #9e2b12, 0 10px 20px rgba(0,0,0,0.5);
            animation: titleShake 0.5s infinite;
            transform-origin: center;
        }

        @keyframes titleShake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(1deg); }
            75% { transform: rotate(-1deg); }
        }

        .event-subtitle {
            font-size: 18px;
            opacity: 0.95;
            margin: 10px 0 20px;
            text-shadow: 2px 2px 0 #9e2b12;
        }

        /* 动感倒计时 */
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0 15px;
            perspective: 500px;
        }

        .countdown-block {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px 10px;
            min-width: 70px;
            text-align: center;
            border: 2px solid rgba(255,215,0,0.5);
            box-shadow: 0 0 30px rgba(255,215,0,0.3);
            transform-style: preserve-3d;
            animation: blockFloat 2s infinite alternate;
        }

        .countdown-block:nth-child(1) { animation-delay: 0s; }
        .countdown-block:nth-child(2) { animation-delay: 0.2s; }
        .countdown-block:nth-child(3) { animation-delay: 0.4s; }
        .countdown-block:nth-child(4) { animation-delay: 0.6s; }

        @keyframes blockFloat {
            from { transform: translateY(0) rotateX(0deg); }
            to { transform: translateY(-10px) rotateX(5deg); }
        }

        .countdown-number {
            font-size: 48px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px gold, 0 5px 0 #b8860b;
            line-height: 1;
            margin-bottom: 5px;
            font-family: 'Arial Black', sans-serif;
        }

        .countdown-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        .countdown-progress {
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #f85a3a);
            border-radius: 3px;
            animation: progressPulse 1s infinite;
        }

        @keyframes progressPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* 领券区域 - 卡片式设计 */
        .coupon-section {
            padding: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .section-title h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffd700, #f85a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .coupon-grid {
            display: grid;
            gap: 15px;
        }

        .coupon-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 24px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transform: translateY(0);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .coupon-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .coupon-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .coupon-value {
            font-size: 42px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .coupon-tag {
            background: #f85a3a;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            animation: tagPulse 1.5s infinite;
        }

        @keyframes tagPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .coupon-desc {
            font-size: 16px;
            color: #ddd;
            margin-bottom: 10px;
        }

        .coupon-limit {
            font-size: 14px;
            color: #ffd700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stock-bar {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
            margin-left: 10px;
        }

        .stock-fill {
            height: 100%;
            width: 70%;
            background: linear-gradient(90deg, #ffd700, #f85a3a);
            border-radius: 2px;
        }

        .claim-btn {
            width: 100%;
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #9e2b12, 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.08s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .claim-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9e2b12, 0 10px 20px rgba(0,0,0,0.3);
        }

        /* 手机号弹窗 */
        .phone-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .phone-popup-content {
            background: linear-gradient(145deg, #2b1a0e, #1f1209);
            border-radius: 40px;
            padding: 35px;
            max-width: 360px;
            width: 100%;
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
            animation: slideUp 0.4s;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .popup-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .popup-header h3 {
            font-size: 28px;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .popup-header p {
            color: #ddd;
            font-size: 14px;
        }

        .phone-input-group {
            margin-bottom: 20px;
        }

        .phone-input {
            width: 100%;
            padding: 18px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #f85a3a;
            border-radius: 40px;
            font-size: 18px;
            color: white;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }

        .phone-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .popup-btns {
            display: flex;
            gap: 15px;
        }

        .popup-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .popup-btn.confirm {
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            color: white;
            box-shadow: 0 5px 0 #9e2b12;
        }

        .popup-btn.confirm:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #9e2b12;
        }

        .popup-btn.cancel {
            background: rgba(255,255,255,0.1);
            color: #ddd;
            border: 2px solid #f85a3a;
        }

        .popup-btn.cancel:active {
            background: rgba(255,255,255,0.2);
        }

        /* 3D转盘区域 */
        .wheel-section {
            padding: 20px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            margin: 10px 20px;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 20px auto;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotateX(5deg) rotateY(0deg);
            transition: transform 3.5s cubic-bezier(0.23, 1, 0.32, 1);
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 50px solid #ffd700;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            z-index: 10;
        }

        .wheel-pointer::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -10px;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff, #ffd700);
            border-radius: 50%;
        }

        .spin-counter {
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 10px 0;
            border: 2px solid #ffd700;
        }

        /* 核销记录面板 */
        .verify-panel {
            margin: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            border: 2px solid #f85a3a;
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #ffd700;
        }

        .record-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
            color: #ddd;
        }

        .record-item {
            padding: 8px;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: flex;
            justify-content: space-between;
        }

        /* 底部 */
        .footer {
            padding: 20px;
            text-align: center;
            color: #b99e7c;
            border-top: 1px solid #f85a3a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="dynamic-bg">
        <div class="floating-particles" id="particles"></div>
    </div>

    <div class="app-container">
        <!-- 创意倒计时区域 -->
        <div class="countdown-hero">
            <div class="event-title">🔥 狂欢倒计时</div>
            <div class="event-subtitle">年度钜惠 · 限时开启</div>
            
            <div class="countdown-wrapper" id="countdownWrapper">
                <div class="countdown-block">
                    <div class="countdown-number" id="days">00</div>
                    <div class="countdown-label">天</div>
                </div>
                <div class="countdown-block">
                    <div class="countdown-number" id="hours">00</div>
                    <div class="countdown-label">时</div>
                </div>
                <div class="countdown-block">
                    <div class="countdown-number" id="minutes">00</div>
                    <div class="countdown-label">分</div>
                </div>
                <div class="countdown-block">
                    <div class="countdown-number" id="seconds">00</div>
                    <div class="countdown-label">秒</div>
                </div>
            </div>

            <div class="countdown-progress">
                <div class="progress-bar" style="width: 75%;"></div>
            </div>
        </div>

        <!-- 领券区域 -->
        <div class="coupon-section">
            <div class="section-title">
                <h2>🎫 限时秒杀券</h2>
                <span style="color:#ffd700;">每人限领1张</span>
            </div>

            <div class="coupon-grid">
                <!-- 优惠券1 -->
                <div class="coupon-card" data-coupon-id="1">
                    <div class="coupon-header">
                        <span class="coupon-value">¥38</span>
                        <span class="coupon-tag">热销🔥</span>
                    </div>
                    <div class="coupon-desc">招牌烤鱼立减券 · 满100可用</div>
                    <div class="coupon-limit">
                        <span>剩余 <span class="stock-num">56</span> 张</span>
                        <div class="stock-bar"><div class="stock-fill" style="width: 56%;"></div></div>
                    </div>
                    <button class="claim-btn" onclick="showPhonePopup(this, '招牌烤鱼立减券', '¥38')">立即领取</button>
                </div>

                <!-- 优惠券2 -->
                <div class="coupon-card" data-coupon-id="2">
                    <div class="coupon-header">
                        <span class="coupon-value">5折</span>
                        <span class="coupon-tag">限量⚡</span>
                    </div>
                    <div class="coupon-desc">毛血旺套餐 · 原价128</div>
                    <div class="coupon-limit">
                        <span>剩余 <span class="stock-num">32</span> 张</span>
                        <div class="stock-bar"><div class="stock-fill" style="width: 32%;"></div></div>
                    </div>
                    <button class="claim-btn" onclick="showPhonePopup(this, '毛血旺5折券', '5折')">立即领取</button>
                </div>
            </div>
        </div>

        <!-- 幸运大转盘 -->
        <div class="wheel-section">
            <h2 style="font-size:28px; margin-bottom:10px;">🎰 幸运大转盘</h2>
            <div class="spin-counter">
                <span>今日剩余 <span id="spinChance">3</span> 次</span>
            </div>

            <div class="wheel-container">
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 200 200">
                    <!-- 8个扇形 -->
                    <path d="M100,100 L173.2,50 A80,80 0 0,1 173.2,50 L100,100 Z" fill="#FF6B6B" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L173.2,50 A80,80 0 0,1 190.7,105.4 L100,100 Z" fill="#FFD93D" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L190.7,105.4 A80,80 0 0,1 173.2,150 L100,100 Z" fill="#6BCB77" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L173.2,150 A80,80 0 0,1 126.8,173.2 L100,100 Z" fill="#4D96FF" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L126.8,173.2 A80,80 0 0,1 73.2,173.2 L100,100 Z" fill="#FFB347" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L73.2,173.2 A80,80 0 0,1 26.8,150 L100,100 Z" fill="#9D65C9" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L26.8,150 A80,80 0 0,1 9.3,105.4 L100,100 Z" fill="#FF8A5C" stroke="#fff" stroke-width="2"/>
                    <path d="M100,100 L9.3,105.4 A80,80 0 0,1 26.8,50 L100,100 Z" fill="#F9ED69" stroke="#fff" stroke-width="2"/>

                    <!-- 奖品文字 -->
                    <text x="135" y="55" fill="white" font-size="14" text-anchor="middle" transform="rotate(22.5,135,55)">🐟烤鱼</text>
                    <text x="155" y="110" fill="white" font-size="14" text-anchor="middle" transform="rotate(67.5,155,110)">🧋酸梅汤</text>
                    <text x="145" y="145" fill="white" font-size="14" text-anchor="middle" transform="rotate(112.5,145,145)">🍚米饭</text>
                    <text x="105" y="165" fill="white" font-size="14" text-anchor="middle" transform="rotate(157.5,105,165)">💰10元</text>
                    <text x="55" y="145" fill="white" font-size="14" text-anchor="middle" transform="rotate(202.5,55,145)">🍗鸡翅</text>
                    <text x="30" y="105" fill="white" font-size="14" text-anchor="middle" transform="rotate(247.5,30,105)">🍺啤酒</text>
                    <text x="40" y="60" fill="white" font-size="14" text-anchor="middle" transform="rotate(292.5,40,60)">🙏谢谢</text>
                    <text x="80" y="35" fill="white" font-size="14" text-anchor="middle" transform="rotate(337.5,80,35)">🥗小菜</text>
                    
                    <circle cx="100" cy="100" r="20" fill="#FFD700" stroke="#fff" stroke-width="3"/>
                </svg>
                <div class="wheel-pointer"></div>
            </div>

            <button class="claim-btn" id="spinBtn" onclick="spinWheel()" style="width:80%; margin:10px auto;">开始抽奖</button>
        </div>

        <!-- 核销记录面板 (模拟后台记录) -->
        <div class="verify-panel">
            <div class="panel-title">
                <span>📋 实时核销记录</span>
                <span style="font-size:12px;">(模拟后端)</span>
            </div>
            <div class="record-list" id="recordList">
                <div class="record-item">
                    <span>等待活动开始...</span>
                </div>
            </div>
        </div>

        <!-- 手机号弹窗 -->
        <div class="phone-popup" id="phonePopup">
            <div class="phone-popup-content">
                <div class="popup-header">
                    <h3>📱 验证手机号</h3>
                    <p>用于核销凭证 & 到店提醒</p>
                </div>
                <div class="phone-input-group">
                    <input type="tel" class="phone-input" id="phoneInput" placeholder="请输入手机号" maxlength="11" pattern="[0-9]*">
                </div>
                <div class="popup-btns">
                    <button class="popup-btn cancel" onclick="closePhonePopup()">取消</button>
                    <button class="popup-btn confirm" onclick="submitPhone()">确认领取</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>川香小馆 · 幸福路88号</p>
            <p>☎ 185-1234-5678</p>
        </div>
    </div>

    <script>
        // ==================== 后端模拟数据库 ====================
        let records = JSON.parse(localStorage.getItem('promo_records')) || [];
        let spinChance = parseInt(localStorage.getItem('spinChance')) || 3;
        let lastSpinDate = localStorage.getItem('lastSpinDate') || '';
        
        // 当前选中的优惠券
        let currentCoupon = null;
        let currentCouponName = '';
        let currentCouponValue = '';

        // 倒计时
        function updateCountdown() {
            const targetDate = new Date();
            targetDate.setHours(23, 59, 59, 999); // 当天结束
            
            const now = new Date();
            const diff = targetDate - now;
            
            if (diff < 0) {
                document.getElementById('days').innerHTML = '00';
                document.getElementById('hours').innerHTML = '00';
                document.getElementById('minutes').innerHTML = '00';
                document.getElementById('seconds').innerHTML = '00';
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            document.getElementById('days').innerHTML = String(days).padStart(2, '0');
            document.getElementById('hours').innerHTML = String(hours).padStart(2, '0');
            document.getElementById('minutes').innerHTML = String(minutes).padStart(2, '0');
            document.getElementById('seconds').innerHTML = String(seconds).padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();

        // 创建粒子背景
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.background = `rgba(255, ${Math.floor(Math.random() * 100 + 155)}, 0, ${Math.random() * 0.5 + 0.3})`;
                container.appendChild(particle);
            }
        }
        createParticles();

        // 显示手机号弹窗
        function showPhonePopup(btn, couponName, couponValue) {
            currentCoupon = btn.closest('.coupon-card');
            currentCouponName = couponName;
            currentCouponValue = couponValue;
            document.getElementById('phonePopup').style.display = 'flex';
            document.getElementById('phoneInput').value = '';
            document.getElementById('phoneInput').focus();
        }

        function closePhonePopup() {
            document.getElementById('phonePopup').style.display = 'none';
        }

        // 提交手机号并领取优惠券
        function submitPhone() {
            const phone = document.getElementById('phoneInput').value.trim();
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                return;
            }

            // 检查是否已领过
            const hasClaimed = records.some(r => r.phone === phone && r.type === 'coupon' && r.couponName === currentCouponName);
            if (hasClaimed) {
                alert('该手机号已领取过此优惠券');
                closePhonePopup();
                return;
            }

            // 更新库存
            if (currentCoupon) {
                const stockSpan = currentCoupon.querySelector('.stock-num');
                const stockNum = parseInt(stockSpan.innerText);
                if (stockNum > 0) {
                    stockSpan.innerText = stockNum - 1;
                    const stockFill = currentCoupon.querySelector('.stock-fill');
                    stockFill.style.width = ((stockNum - 1) / 100) * 100 + '%';
                }
            }

            // 记录到后端
            const record = {
                phone: phone,
                type: 'coupon',
                couponName: currentCouponName,
                couponValue: currentCouponValue,
                timestamp: new Date().toLocaleString(),
                status: '未核销'
            };
            records.push(record);
            localStorage.setItem('promo_records', JSON.stringify(records));
            
            // 更新显示
            updateRecordList();
            
            // 按钮状态变化
            if (currentCoupon) {
                const btn = currentCoupon.querySelector('.claim-btn');
                btn.innerHTML = '已领取 ✓';
                btn.style.background = '#b99e7c';
                btn.style.boxShadow = 'none';
                btn.disabled = true;
            }
            
            closePhonePopup();
            alert(`✅ 领取成功！\n手机号: ${phone}\n奖品: ${currentCouponName}\n到店请出示手机号核销`);
        }

        // ==================== 转盘抽奖 ====================
        let isSpinning = false;
        let currentRotation = 0;
        const wheelSvg = document.getElementById('wheelSvg');
        const spinBtn = document.getElementById('spinBtn');
        
        const prizes = [
            { name: '招牌烤鱼券', desc: '价值38元，满100可用' },
            { name: '酸梅汤一杯', desc: '免费畅饮' },
            { name: '米饭免费', desc: '不限量' },
            { name: '10元代金券', desc: '满50可用' },
            { name: '烤鸡翅一份', desc: '价值28元' },
            { name: '啤酒一瓶', desc: '指定啤酒' },
            { name: '谢谢参与', desc: '继续加油' },
            { name: '小菜一份', desc: '四选一' }
        ];

        function checkAndResetSpinChance() {
            const today = new Date().toDateString();
            if (lastSpinDate !== today) {
                spinChance = 3;
                localStorage.setItem('spinChance', spinChance);
                localStorage.setItem('lastSpinDate', today);
            }
            document.getElementById('spinChance').innerText = spinChance;
        }
        checkAndResetSpinChance();

        function spinWheel() {
            if (isSpinning) return;
            if (spinChance <= 0) {
                alert('今日抽奖次数已用完，明天再来吧！');
                return;
            }

            // 先弹出手机号验证
            showSpinPhonePopup();
        }

        function showSpinPhonePopup() {
            document.getElementById('phonePopup').style.display = 'flex';
            document.getElementById('phoneInput').value = '';
            // 修改确认按钮行为
            const confirmBtn = document.querySelector('.popup-btn.confirm');
            const originalClick = confirmBtn.onclick;
            confirmBtn.onclick = function() {
                const phone = document.getElementById('phoneInput').value.trim();
                if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                    alert('请输入正确的手机号');
                    return;
                }
                
                // 检查今天是否抽过
                const today = new Date().toDateString();
                const hasSpunToday = records.some(r => r.phone === phone && r.type === 'spin' && r.timestamp.includes(today));
                
                // 执行抽奖
                performSpin(phone);
                
                // 恢复按钮事件
                confirmBtn.onclick = submitPhone;
                closePhonePopup();
            };
        }

        function performSpin(phone) {
            isSpinning = true;
            spinBtn.disabled = true;
            
            // 减少次数
            spinChance--;
            localStorage.setItem('spinChance', spinChance);
            document.getElementById('spinChance').innerText = spinChance;
            
            // 随机旋转
            const extraRotation = Math.floor(Math.random() * 720) + 1440;
            currentRotation += extraRotation;
            wheelSvg.style.transform = `rotateX(5deg) rotateY(0deg) rotateZ(${currentRotation}deg)`;
            
            // 计算奖品
            setTimeout(() => {
                const normalizedRotation = (currentRotation % 360 + 360) % 360;
                let pointerAngle = (360 - normalizedRotation + 90) % 360;
                let prizeIndex = Math.floor(pointerAngle / 45) % 8;
                const prize = prizes[prizeIndex];
                
                // 记录到后端
                const record = {
                    phone: phone,
                    type: 'spin',
                    prizeName: prize.name,
                    prizeDesc: prize.desc,
                    timestamp: new Date().toLocaleString(),
                    status: '未核销'
                };
                records.push(record);
                localStorage.setItem('promo_records', JSON.stringify(records));
                
                updateRecordList();
                
                // 显示结果
                if (prize.name !== '谢谢参与') {
                    alert(`🎉 恭喜中奖！\n手机号: ${phone}\n奖品: ${prize.name}\n${prize.desc}\n\n到店请出示手机号核销`);
                } else {
                    alert(`😊 谢谢参与，明天再来试试吧！`);
                }
                
                isSpinning = false;
                spinBtn.disabled = false;
            }, 3500);
        }

        // 更新记录列表
        function updateRecordList() {
            const recordList = document.getElementById('recordList');
            if (records.length === 0) {
                recordList.innerHTML = '<div class="record-item">暂无记录</div>';
                return;
            }
            
            // 显示最近5条
            const recent = records.slice(-5).reverse();
            recordList.innerHTML = recent.map(r => `
                <div class="record-item">
                    <span>${r.phone.substr(0,3)}****${r.phone.substr(-4)}</span>
                    <span>${r.type === 'coupon' ? '🎫' : '🎰'} ${r.couponName || r.prizeName}</span>
                    <span style="color:${r.status === '已核销' ? '#4CAF50' : '#FFD700'}">${r.status}</span>
                </div>
            `).join('');
        }
        updateRecordList();

        // 模拟核销功能 (可在后台查看)
        function verifyPrize(phone) {
            const unverified = records.filter(r => r.phone === phone && r.status === '未核销');
            if (unverified.length > 0) {
                unverified.forEach(r => r.status = '已核销');
                localStorage.setItem('promo_records', JSON.stringify(records));
                updateRecordList();
                alert(`✅ 核销成功！共核销 ${unverified.length} 个奖品`);
            } else {
                alert('❌ 未找到未核销的奖品');
            }
        }

        // 添加测试按钮 (可移除)
        console.log('测试核销功能: verifyPrize("13800138000")');
    </script>
</body>
</html>
