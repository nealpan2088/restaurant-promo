<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💎 宝石迷阵·增强音效版</title>
    <style>
        /* 样式保持不变，和之前一样 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: linear-gradient(145deg, #2a1b3c, #1a0f2a);
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
        }

        .game-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            position: relative;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: white;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(145deg, #f0b400, #ff6b6b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid gold;
        }

        .score-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            border: 1px solid gold;
        }

        .combo-box {
            background: #ff6b6b;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 1rem;
            animation: pulse 1s infinite;
            transition: all 0.2s;
        }

        .combo-box.high-combo {
            background: #ff4444;
            transform: scale(1.1);
            box-shadow: 0 0 20px red;
        }

        /* 游戏主区域 */
        .game-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        /* 宝石网格 */
        .grid-container {
            aspect-ratio: 1/1;
            width: min(95vw, 95vh, 500px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            padding: 12px;
            border: 4px solid #ffd966;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,215,0,0.3);
        }

        .grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 4px;
        }

        .gem-cell {
            aspect-ratio: 1/1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(4vw, 4vh, 24px);
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            touch-action: manipulation;
            color: white;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
        }

        .gem-red { background: linear-gradient(145deg, #ff4444, #cc0000); }
        .gem-blue { background: linear-gradient(145deg, #4444ff, #0000cc); }
        .gem-green { background: linear-gradient(145deg, #44ff44, #00cc00); }
        .gem-yellow { background: linear-gradient(145deg, #ffff44, #cccc00); }
        .gem-purple { background: linear-gradient(145deg, #ff44ff, #cc00cc); }
        .gem-orange { background: linear-gradient(145deg, #ff8844, #cc4400); }

        .gem-red::before { content: "❤️"; }
        .gem-blue::before { content: "💎"; }
        .gem-green::before { content: "🍀"; }
        .gem-yellow::before { content: "⭐"; }
        .gem-purple::before { content: "🔮"; }
        .gem-orange::before { content: "🎃"; }

        .gem-special::after {
            content: "✨";
            position: absolute;
            font-size: 0.5em;
            bottom: 2px;
            right: 2px;
            animation: sparkle 1s infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .gem-cell.selected {
            transform: scale(0.95);
            box-shadow: 0 0 0 3px gold, 0 4px 0 #b8860b;
            filter: brightness(1.2);
        }

        .gem-cell.match-highlight {
            animation: matchPulse 0.3s ease;
        }

        @keyframes matchPulse {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.5); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .gem-cell.eliminate {
            animation: eliminate 0.3s ease forwards;
        }

        @keyframes eliminate {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .gem-cell.fall {
            animation: fall 0.2s ease;
        }

        @keyframes fall {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 底部控制区 */
        .control-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            gap: 10px;
        }

        .power-ups {
            display: flex;
            gap: 10px;
        }

        .power-btn {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: linear-gradient(145deg, #4a3a2a, #2d1a0a);
            border: 2px solid gold;
            color: white;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.05s;
            box-shadow: 0 4px 0 #7a4d1a;
            touch-action: manipulation;
            position: relative;
        }

        .power-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7a4d1a;
        }

        .power-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        .power-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid gold;
        }

        .action-btn {
            padding: 12px 25px;
            border-radius: 30px;
            background: linear-gradient(145deg, #f0b400, #ff6b6b);
            border: none;
            color: #2d1508;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 5px 0 #9f5e20;
            cursor: pointer;
            transition: 0.05s;
            touch-action: manipulation;
            white-space: nowrap;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9f5e20;
        }

        /* 音效控制区 */
        .sound-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .sound-toggle {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sound-toggle.active {
            background: #4a9eff;
            border-color: white;
        }

        /* 激励动画 */
        .floating-reward {
            position: fixed;
            pointer-events: none;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 0 0 20px gold;
            z-index: 1000;
            animation: floatReward 1s ease-out forwards;
        }

        @keyframes floatReward {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

        .combo-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: gold;
            text-shadow: 0 0 30px red, 0 0 60px orange;
            z-index: 100;
            animation: comboPop 0.5s ease-out;
            pointer-events: none;
            white-space: nowrap;
            font-weight: bold;
        }

        @keyframes comboPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }

        .mission-bar {
            margin-top: 10px;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        .mission-progress {
            height: 100%;
            background: linear-gradient(90deg, gold, #ff6b6b);
            border-radius: 4px;
            transition: width 0.3s;
            position: relative;
            overflow: hidden;
        }

        .mission-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: linear-gradient(145deg, #fdebb3, #f9d77e);
            padding: 30px 20px;
            border-radius: 50px;
            text-align: center;
            border: 6px solid #c09b5e;
            width: min(90%, 350px);
            box-shadow: 0 20px 30px black;
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-size: 2.5rem;
            color: #a55233;
            margin-bottom: 15px;
        }

        .modal-rewards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .reward-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .reward-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: gold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .modal-btn {
            background: #f9b83c;
            border: none;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 0 #9f5e20;
            cursor: pointer;
            width: 100%;
            touch-action: manipulation;
            transition: 0.05s;
        }

        .modal-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #9f5e20;
        }

        .hidden {
            display: none;
        }

        .wx-tip {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 100;
            border: 1px solid gold;
            display: none;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 350px) {
            .power-btn {
                width: 40px;
                height: 40px;
                font-size: 1.2rem;
            }
            .action-btn {
                padding: 8px 15px;
                font-size: 0.9rem;
            }
        }

        /* 音效测试按钮 */
        .test-sound {
            width: 30px;
            height: 30px;
            border-radius: 15px;
            background: #4a9eff;
            border: 1px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 微信提示 -->
        <div class="wx-tip" id="wxTip">点击屏幕激活音效</div>

        <!-- 顶部状态 -->
        <div class="status-bar">
            <div class="player-info">
                <div class="player-avatar">🥔</div>
                <span>宝石猎人</span>
            </div>
            <div class="score-box">
                <span>💎</span>
                <span id="scoreDisplay">0</span>
            </div>
            <div class="combo-box" id="comboDisplay">
                🔥 0
            </div>
            <div class="sound-controls">
                <div class="sound-toggle" id="soundToggle">🔊</div>
                <div class="test-sound" id="testSound">♪</div>
            </div>
        </div>

        <!-- 游戏主区域 -->
        <div class="game-main">
            <div class="grid-container">
                <div class="grid" id="gameGrid"></div>
            </div>

            <!-- 任务进度 -->
            <div style="width: 100%; max-width: 500px; margin-top: 10px;">
                <div style="display: flex; justify-content: space-between; color: white; margin-bottom: 5px;">
                    <span>每日任务</span>
                    <span id="missionProgress">0/10</span>
                </div>
                <div class="mission-bar">
                    <div class="mission-progress" id="missionBar" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 底部控制区 -->
        <div class="control-panel">
            <div class="power-ups">
                <div style="position: relative;">
                    <button class="power-btn" id="btnShuffle">🔄</button>
                    <span class="power-count" id="shuffleCount">3</span>
                </div>
                <div style="position: relative;">
                    <button class="power-btn" id="btnBomb">💣</button>
                    <span class="power-count" id="bombCount">2</span>
                </div>
                <div style="position: relative;">
                    <button class="power-btn" id="btnHint">🔍</button>
                    <span class="power-count" id="hintCount">∞</span>
                </div>
            </div>
            <button class="action-btn" id="btnNewGame">新游戏</button>
        </div>
    </div>

    <!-- 奖励模态框 -->
    <div id="rewardModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">🎉 达成成就</div>
            <div class="modal-rewards" id="modalRewards">
                <div class="reward-item">
                    <div class="reward-icon">💎</div>
                    <span id="rewardScore">+100</span>
                </div>
                <div class="reward-item">
                    <div class="reward-icon">🔄</div>
                    <span id="rewardShuffle">+1</span>
                </div>
            </div>
            <button class="modal-btn" id="modalBtn">继续</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 平台检测 ====================
            const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            if (isWeChat) {
                document.getElementById('wxTip').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('wxTip').style.display = 'none';
                }, 4000);
            }

            // ==================== 增强音效系统（三种方案备用）====================
            let soundEnabled = true;
            let audioContext = null;
            let audioInitialized = false;
            
            // 方案1: Web Audio API (最可靠)
            function initAudio() {
                if (audioInitialized) return;
                
                try {
                    window.AudioContext = window.AudioContext || window.webkitAudioContext;
                    audioContext = new AudioContext();
                    audioInitialized = true;
                    console.log('AudioContext initialized');
                } catch (e) {
                    console.log('Web Audio API not supported:', e);
                }
            }

            // 方案2: 备用的Audio对象
            function playFallbackSound(type) {
                if (!soundEnabled) return;
                
                try {
                    // 创建简单的振荡器作为备选
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.frequency.value = type === 'select' ? 440 : 
                                                type === 'match' ? 523 : 
                                                type === 'combo' ? 659 : 392;
                    gainNode.gain.value = 0.1;
                    
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.1);
                    
                    // 自动关闭
                    setTimeout(() => {
                        audioCtx.close();
                    }, 200);
                } catch (e) {
                    console.log('Fallback sound failed:', e);
                }
            }

            // 方案3: 使用Base64编码的极简音频（最兼容）
            const soundUrls = {
                select: 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PA==',
                match: 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PA==',
                combo: 'data:audio/wav;base64,UklGRlwAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YVAAAAA8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PDw8PA=='
            };

            // 主播放函数（自动选择最佳方案）
            function playSound(type) {
                if (!soundEnabled) return;
                
                // 尝试用AudioContext
                if (audioContext && audioContext.state === 'running') {
                    try {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        // 设置音高
                        switch(type) {
                            case 'select':
                                oscillator.frequency.value = 440; // A4
                                gainNode.gain.value = 0.1;
                                oscillator.start();
                                oscillator.stop(audioContext.currentTime + 0.1);
                                break;
                            case 'match':
                                oscillator.frequency.value = 523.25; // C5
                                gainNode.gain.value = 0.15;
                                oscillator.start();
                                oscillator.stop(audioContext.currentTime + 0.15);
                                
                                // 第二个音
                                setTimeout(() => {
                                    if (audioContext && audioContext.state === 'running') {
                                        const osc2 = audioContext.createOscillator();
                                        const gain2 = audioContext.createGain();
                                        osc2.connect(gain2);
                                        gain2.connect(audioContext.destination);
                                        osc2.frequency.value = 659.25; // E5
                                        gain2.gain.value = 0.15;
                                        osc2.start();
                                        osc2.stop(audioContext.currentTime + 0.15);
                                    }
                                }, 100);
                                break;
                            case 'combo':
                                for (let i = 0; i < 3; i++) {
                                    setTimeout(() => {
                                        if (audioContext && audioContext.state === 'running') {
                                            const osc = audioContext.createOscillator();
                                            const gain = audioContext.createGain();
                                            osc.connect(gain);
                                            gain.connect(audioContext.destination);
                                            osc.frequency.value = 440 * (1 + i * 0.2);
                                            gain.gain.value = 0.1;
                                            osc.start();
                                            osc.stop(audioContext.currentTime + 0.1);
                                        }
                                    }, i * 100);
                                }
                                break;
                            case 'special':
                                oscillator.frequency.value = 392;
                                gainNode.gain.value = 0.15;
                                oscillator.start();
                                
                                setTimeout(() => {
                                    if (audioContext && audioContext.state === 'running') {
                                        const osc2 = audioContext.createOscillator();
                                        const gain2 = audioContext.createGain();
                                        osc2.connect(gain2);
                                        gain2.connect(audioContext.destination);
                                        osc2.frequency.value = 784;
                                        gain2.gain.value = 0.15;
                                        osc2.start();
                                        osc2.stop(audioContext.currentTime + 0.2);
                                    }
                                }, 150);
                                oscillator.stop(audioContext.currentTime + 0.3);
                                break;
                            case 'powerup':
                                oscillator.frequency.value = 330;
                                gainNode.gain.value = 0.12;
                                oscillator.start();
                                
                                setTimeout(() => {
                                    if (audioContext && audioContext.state === 'running') {
                                        const osc2 = audioContext.createOscillator();
                                        const gain2 = audioContext.createGain();
                                        osc2.connect(gain2);
                                        gain2.connect(audioContext.destination);
                                        osc2.frequency.value = 660;
                                        gain2.gain.value = 0.12;
                                        osc2.start();
                                        osc2.stop(audioContext.currentTime + 0.15);
                                    }
                                }, 100);
                                oscillator.stop(audioContext.currentTime + 0.2);
                                break;
                        }
                        return;
                    } catch (e) {
                        console.log('AudioContext play failed, using fallback');
                    }
                }
                
                // 降级到备选方案
                playFallbackSound(type);
            }

            // 强制激活音频（必须在用户手势中调用）
            function activateAudio() {
                if (!audioInitialized) {
                    initAudio();
                }
                
                if (audioContext) {
                    if (audioContext.state === 'suspended') {
                        audioContext.resume().then(() => {
                            console.log('AudioContext resumed');
                            // 播放测试音
                            playSound('select');
                        });
                    } else if (audioContext.state === 'running') {
                        playSound('select');
                    }
                } else {
                    // 尝试用fallback
                    playFallbackSound('select');
                }
                
                // 显示激活提示
                document.getElementById('wxTip').innerText = '音效已激活！';
                document.getElementById('wxTip').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('wxTip').style.display = 'none';
                }, 2000);
            }

            // 监听用户交互来激活音频
            function setupAudioActivation() {
                const events = ['touchstart', 'touchend', 'mousedown', 'keydown'];
                
                function activateHandler(e) {
                    // 避免多次激活
                    if (audioContext && audioContext.state === 'running') return;
                    
                    activateAudio();
                    
                    // 移除监听器
                    events.forEach(event => {
                        document.removeEventListener(event, activateHandler, { capture: true });
                    });
                }
                
                // 添加监听器
                events.forEach(event => {
                    document.addEventListener(event, activateHandler, { capture: true, once: true });
                });
            }

            // 音效开关
            document.getElementById('soundToggle').addEventListener('click', (e) => {
                e.preventDefault();
                soundEnabled = !soundEnabled;
                document.getElementById('soundToggle').innerText = soundEnabled ? '🔊' : '🔇';
                
                if (soundEnabled) {
                    activateAudio();
                }
            });

            // 测试音效按钮
            document.getElementById('testSound').addEventListener('click', (e) => {
                e.preventDefault();
                activateAudio();
                playSound('combo');
            });

            // 为所有可交互元素添加激活音频的监听
            document.querySelectorAll('button, .gem-cell').forEach(el => {
                el.addEventListener('touchstart', (e) => {
                    if (audioContext && audioContext.state !== 'running') {
                        activateAudio();
                    }
                }, { once: true });
            });

            // 初始化音频激活
            setupAudioActivation();

            // ==================== 游戏配置 ====================
            const ROWS = 8;
            const COLS = 8;
            const GEM_TYPES = ['red', 'blue', 'green', 'yellow', 'purple', 'orange'];
            
            // 游戏状态
            let grid = [];
            let score = 0;
            let combo = 0;
            let maxCombo = 0;
            let selectedRow = -1;
            let selectedCol = -1;
            let isProcessing = false;
            let powerUps = {
                shuffle: 3,
                bomb: 2,
                hint: Infinity
            };
            
            // 任务系统
            let mission = {
                target: 10,
                current: 0,
                type: 'score'
            };
            
            // 连击计时
            let comboTimer = null;

            // ==================== 初始化网格 ====================
            function initGrid() {
                grid = [];
                for (let i = 0; i < ROWS; i++) {
                    grid[i] = [];
                    for (let j = 0; j < COLS; j++) {
                        grid[i][j] = {
                            type: GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)],
                            special: Math.random() < 0.1 // 10%特殊宝石
                        };
                    }
                }
                
                // 消除初始匹配
                while (findAllMatches().length > 0) {
                    resolveMatches(true);
                }
            }

            // ==================== 渲染网格 ====================
            function renderGrid() {
                const gridElement = document.getElementById('gameGrid');
                gridElement.innerHTML = '';
                
                for (let i = 0; i < ROWS; i++) {
                    for (let j = 0; j < COLS; j++) {
                        const cell = document.createElement('div');
                        cell.className = `gem-cell gem-${grid[i][j].type}`;
                        if (grid[i][j].special) {
                            cell.classList.add('gem-special');
                        }
                        if (i === selectedRow && j === selectedCol) {
                            cell.classList.add('selected');
                        }
                        
                        // 添加触摸事件
                        cell.addEventListener('touchstart', (e) => {
                            e.preventDefault();
                            handleCellClick(i, j);
                        });
                        cell.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            handleCellClick(i, j);
                        });
                        
                        gridElement.appendChild(cell);
                    }
                }
                
                updateUI();
            }

            // ==================== 查找所有匹配 ====================
            function findAllMatches() {
                const matches = [];
                
                // 水平匹配
                for (let i = 0; i < ROWS; i++) {
                    for (let j = 0; j < COLS - 2; j++) {
                        if (grid[i][j] && grid[i][j+1] && grid[i][j+2] &&
                            grid[i][j].type === grid[i][j+1].type && 
                            grid[i][j].type === grid[i][j+2].type) {
                            
                            let k = j + 3;
                            while (k < COLS && grid[i][k] && grid[i][k].type === grid[i][j].type) {
                                k++;
                            }
                            
                            for (let m = j; m < k; m++) {
                                matches.push({ row: i, col: m });
                            }
                            j = k - 1;
                        }
                    }
                }
                
                // 垂直匹配
                for (let j = 0; j < COLS; j++) {
                    for (let i = 0; i < ROWS - 2; i++) {
                        if (grid[i][j] && grid[i+1][j] && grid[i+2][j] &&
                            grid[i][j].type === grid[i+1][j].type && 
                            grid[i][j].type === grid[i+2][j].type) {
                            
                            let k = i + 3;
                            while (k < ROWS && grid[k][j] && grid[k][j].type === grid[i][j].type) {
                                k++;
                            }
                            
                            for (let m = i; m < k; m++) {
                                matches.push({ row: m, col: j });
                            }
                            i = k - 1;
                        }
                    }
                }
                
                // 去重
                return Array.from(new Set(matches.map(m => `${m.row},${m.col}`)))
                    .map(str => {
                        const [row, col] = str.split(',').map(Number);
                        return { row, col };
                    });
            }

            // ==================== 消除匹配并下落 ====================
            function resolveMatches(isInitial = false) {
                let matches = findAllMatches();
                if (matches.length === 0) return false;
                
                // 播放消除音效
                if (!isInitial) {
                    if (matches.length >= 6) {
                        playSound('combo');
                    } else {
                        playSound('match');
                    }
                }
                
                // 高亮匹配的宝石
                if (!isInitial) {
                    matches.forEach(m => {
                        const cell = document.querySelector(`.grid :nth-child(${m.row * COLS + m.col + 1})`);
                        if (cell) {
                            cell.classList.add('match-highlight');
                            // 添加消除动画
                            setTimeout(() => {
                                cell.classList.add('eliminate');
                            }, 150);
                        }
                    });
                }
                
                // 计算得分
                const matchCount = matches.length;
                if (!isInitial) {
                    const baseScore = matchCount * 10;
                    const comboMultiplier = Math.min(combo + 1, 5);
                    const matchScore = baseScore * comboMultiplier;
                    
                    score += matchScore;
                    
                    // 特殊宝石奖励
                    const specialCount = matches.filter(m => grid[m.row][m.col].special).length;
                    if (specialCount > 0) {
                        score += specialCount * 50;
                        showFloatingText(`✨ 特殊 +${specialCount*50}`, 'gold');
                        playSound('special');
                    }
                    
                    // 连击系统
                    combo++;
                    if (combo > maxCombo) maxCombo = combo;
                    
                    // 显示连击特效
                    if (combo >= 3) {
                        showComboEffect(combo);
                    }
                    
                    // 连击样式
                    const comboBox = document.getElementById('comboDisplay');
                    if (combo >= 5) {
                        comboBox.classList.add('high-combo');
                    } else {
                        comboBox.classList.remove('high-combo');
                    }
                    
                    // 重置连击计时器
                    if (comboTimer) clearTimeout(comboTimer);
                    comboTimer = setTimeout(() => {
                        combo = 0;
                        document.getElementById('comboDisplay').classList.remove('high-combo');
                        updateUI();
                    }, 3000);
                    
                    // 漂浮得分
                    showFloatingText(`+${matchScore}`, '#ffd966');
                    
                    // 更新任务
                    mission.current += matchCount;
                    if (mission.current >= mission.target) {
                        completeMission();
                    }
                }
                
                // 消除匹配的宝石
                matches.forEach(m => {
                    grid[m.row][m.col] = null;
                });
                
                // 下落并生成新宝石
                setTimeout(() => {
                    for (let j = 0; j < COLS; j++) {
                        for (let i = ROWS - 1; i >= 0; i--) {
                            if (grid[i][j] === null) {
                                for (let k = i - 1; k >= 0; k--) {
                                    if (grid[k][j] !== null) {
                                        grid[i][j] = grid[k][j];
                                        grid[k][j] = null;
                                        
                                        // 添加下落动画
                                        const cell = document.querySelector(`.grid :nth-child(${i * COLS + j + 1})`);
                                        if (cell) {
                                            cell.classList.add('fall');
                                            setTimeout(() => cell.classList.remove('fall'), 200);
                                        }
                                        break;
                                    }
                                }
                                if (grid[i][j] === null) {
                                    // 生成新宝石
                                    const isSpecial = Math.random() < 0.1;
                                    grid[i][j] = {
                                        type: GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)],
                                        special: isSpecial
                                    };
                                    
                                    // 新宝石下落动画
                                    const cell = document.querySelector(`.grid :nth-child(${i * COLS + j + 1})`);
                                    if (cell) {
                                        cell.classList.add('fall');
                                        setTimeout(() => cell.classList.remove('fall'), 200);
                                    }
                                }
                            }
                        }
                    }
                    
                    renderGrid();
                }, 300);
                
                updateUI();
                return true;
            }

            // ==================== 处理点击 ====================
            function handleCellClick(row, col) {
                if (isProcessing) return;
                
                // 确保音频已激活
                if (audioContext && audioContext.state !== 'running') {
                    activateAudio();
                }
                
                playSound('select');
                
                // 第一个宝石选择
                if (selectedRow === -1) {
                    selectedRow = row;
                    selectedCol = col;
                    renderGrid();
                    return;
                }
                
                // 检查是否相邻
                const rowDiff = Math.abs(row - selectedRow);
                const colDiff = Math.abs(col - selectedCol);
                const isAdjacent = (rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1);
                
                if (!isAdjacent) {
                    // 选择新宝石
                    selectedRow = row;
                    selectedCol = col;
                    renderGrid();
                    return;
                }
                
                // 交换宝石
                isProcessing = true;
                
                // 临时交换
                const temp = { ...grid[row][col] };
                grid[row][col] = { ...grid[selectedRow][selectedCol] };
                grid[selectedRow][selectedCol] = temp;
                
                renderGrid();
                
                // 检查是否有匹配
                setTimeout(() => {
                    if (findAllMatches().length > 0) {
                        // 有效交换
                        let hasMatches = true;
                        let loopCount = 0;
                        
                        function processChain() {
                            if (resolveMatches()) {
                                setTimeout(processChain, 400);
                            } else {
                                isProcessing = false;
                                selectedRow = -1;
                                selectedCol = -1;
                                renderGrid();
                                
                                // 随机触发奖励
                                if (Math.random() < 0.1) {
                                    triggerRandomReward();
                                }
                            }
                        }
                        
                        setTimeout(processChain, 300);
                    } else {
                        // 无效交换，换回来
                        const tempBack = { ...grid[row][col] };
                        grid[row][col] = { ...grid[selectedRow][selectedCol] };
                        grid[selectedRow][selectedCol] = tempBack;
                        
                        renderGrid();
                        isProcessing = false;
                        selectedRow = -1;
                        selectedCol = -1;
                        
                        // 显示提示
                        showFloatingText('❌ 不能交换', '#ff6b6b');
                    }
                }, 200);
            }

            // ==================== 道具系统 ====================
            function useShuffle() {
                if (powerUps.shuffle <= 0 || isProcessing) return;
                
                powerUps.shuffle--;
                isProcessing = true;
                playSound('powerup');
                
                // 重新排列所有宝石
                for (let i = 0; i < ROWS; i++) {
                    for (let j = 0; j < COLS; j++) {
                        grid[i][j].type = GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
                    }
                }
                
                renderGrid();
                showFloatingText('🔄 洗牌', '#4a9eff');
                
                setTimeout(() => {
                    isProcessing = false;
                    // 自动消除
                    if (findAllMatches().length > 0) {
                        resolveMatches();
                    }
                }, 300);
                
                updateUI();
            }
            
            function useBomb() {
                if (powerUps.bomb <= 0 || isProcessing || selectedRow === -1) return;
                
                powerUps.bomb--;
                isProcessing = true;
                playSound('powerup');
                
                // 消除3x3区域
                const row = selectedRow;
                const col = selectedCol;
                
                for (let i = Math.max(0, row - 1); i <= Math.min(ROWS - 1, row + 1); i++) {
                    for (let j = Math.max(0, col - 1); j <= Math.min(COLS - 1, col + 1); j++) {
                        if (grid[i][j]) {
                            score += 5;
                            // 添加爆炸动画
                            const cell = document.querySelector(`.grid :nth-child(${i * COLS + j + 1})`);
                            if (cell) {
                                cell.classList.add('eliminate');
                            }
                            grid[i][j] = {
                                type: GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)],
                                special: false
                            };
                        }
                    }
                }
                
                renderGrid();
                showFloatingText('💥 炸弹', '#ff6b6b');
                
                setTimeout(() => {
                    isProcessing = false;
                    selectedRow = -1;
                    selectedCol = -1;
                    if (findAllMatches().length > 0) {
                        resolveMatches();
                    }
                }, 300);
                
                updateUI();
            }
            
            function useHint() {
                playSound('select');
                
                // 简单提示：找到一个可交换的位置
                for (let i = 0; i < ROWS; i++) {
                    for (let j = 0; j < COLS; j++) {
                        // 检查右交换
                        if (j < COLS - 1) {
                            // 模拟交换
                            const temp = grid[i][j].type;
                            grid[i][j].type = grid[i][j+1].type;
                            grid[i][j+1].type = temp;
                            
                            if (findAllMatches().length > 0) {
                                // 换回来
                                const tempBack = grid[i][j].type;
                                grid[i][j].type = grid[i][j+1].type;
                                grid[i][j+1].type = tempBack;
                                
                                // 高亮提示
                                highlightHint(i, j, i, j+1);
                                return;
                            }
                            
                            // 换回来
                            const tempBack = grid[i][j].type;
                            grid[i][j].type = grid[i][j+1].type;
                            grid[i][j+1].type = tempBack;
                        }
                        
                        // 检查下交换
                        if (i < ROWS - 1) {
                            const temp = grid[i][j].type;
                            grid[i][j].type = grid[i+1][j].type;
                            grid[i+1][j].type = temp;
                            
                            if (findAllMatches().length > 0) {
                                const tempBack = grid[i][j].type;
                                grid[i][j].type = grid[i+1][j].type;
                                grid[i+1][j].type = tempBack;
                                
                                highlightHint(i, j, i+1, j);
                                return;
                            }
                            
                            const tempBack = grid[i][j].type;
                            grid[i][j].type = grid[i+1][j].type;
                            grid[i+1][j].type = tempBack;
                        }
                    }
                }
                
                showFloatingText('❌ 没有可交换', '#999');
            }
            
            function highlightHint(r1, c1, r2, c2) {
                const cells = document.querySelectorAll('.gem-cell');
                cells[r1 * COLS + c1].style.boxShadow = '0 0 0 4px #4a9eff, 0 4px 0 #7a4d1a';
                cells[r2 * COLS + c2].style.boxShadow = '0 0 0 4px #4a9eff, 0 4px 0 #7a4d1a';
                
                setTimeout(() => {
                    cells[r1 * COLS + c1].style.boxShadow = '';
                    cells[r2 * COLS + c2].style.boxShadow = '';
                }, 1000);
            }

            // ==================== 任务系统 ====================
            function completeMission() {
                // 奖励
                const rewardScore = 200;
                const rewardShuffle = 1;
                
                score += rewardScore;
                powerUps.shuffle += rewardShuffle;
                
                playSound('special');
                
                // 显示奖励
                document.getElementById('rewardScore').innerText = `+${rewardScore}`;
                document.getElementById('rewardShuffle').innerText = `+${rewardShuffle}`;
                document.getElementById('rewardModal').classList.remove('hidden');
                
                // 新任务
                mission.target += 10;
                mission.current = 0;
                
                updateUI();
            }

            // ==================== 随机奖励 ====================
            function triggerRandomReward() {
                const rewards = [
                    { type: 'score', value: 50, text: '+50 分' },
                    { type: 'shuffle', value: 1, text: '+1 洗牌' },
                    { type: 'bomb', value: 1, text: '+1 炸弹' }
                ];
                
                const reward = rewards[Math.floor(Math.random() * rewards.length)];
                
                if (reward.type === 'score') {
                    score += reward.value;
                } else if (reward.type === 'shuffle') {
                    powerUps.shuffle += reward.value;
                } else if (reward.type === 'bomb') {
                    powerUps.bomb += reward.value;
                }
                
                playSound('powerup');
                showFloatingText(`🎁 ${reward.text}`, 'gold');
                updateUI();
            }

            // ==================== 特效 ====================
            function showFloatingText(text, color) {
                const div = document.createElement('div');
                div.className = 'floating-reward';
                div.innerText = text;
                div.style.color = color;
                div.style.left = (Math.random() * (window.innerWidth - 100) + 50) + 'px';
                div.style.top = window.innerHeight / 2 + 'px';
                document.body.appendChild(div);
                
                setTimeout(() => {
                    div.remove();
                }, 1000);
            }
            
            function showComboEffect(comboCount) {
                const div = document.createElement('div');
                div.className = 'combo-effect';
                div.innerText = `🔥 ${comboCount} Combo!`;
                div.style.left = '50%';
                div.style.top = '50%';
                document.body.appendChild(div);
                
                setTimeout(() => {
                    div.remove();
                }, 500);
            }

            // ==================== UI更新 ====================
            function updateUI() {
                document.getElementById('scoreDisplay').innerText = score;
                document.getElementById('comboDisplay').innerHTML = `🔥 ${combo}`;
                document.getElementById('shuffleCount').innerText = powerUps.shuffle;
                document.getElementById('bombCount').innerText = powerUps.bomb;
                
                document.getElementById('missionProgress').innerText = `${mission.current}/${mission.target}`;
                document.getElementById('missionBar').style.width = `${(mission.current / mission.target) * 100}%`;
                
                // 道具按钮状态
                document.getElementById('btnShuffle').classList.toggle('disabled', powerUps.shuffle <= 0);
                document.getElementById('btnBomb').classList.toggle('disabled', powerUps.bomb <= 0);
            }

            // ==================== 新游戏 ====================
            function newGame() {
                initGrid();
                score = 0;
                combo = 0;
                maxCombo = 0;
                selectedRow = -1;
                selectedCol = -1;
                isProcessing = false;
                powerUps = {
                    shuffle: 3,
                    bomb: 2,
                    hint: Infinity
                };
                mission = {
                    target: 10,
                    current: 0,
                    type: 'score'
                };
                
                renderGrid();
                updateUI();
                
                playSound('powerup');
                showFloatingText('🎮 新游戏', '#4a9eff');
            }

            // ==================== 事件绑定 ====================
            document.getElementById('btnShuffle').addEventListener('click', useShuffle);
            document.getElementById('btnShuffle').addEventListener('touchstart', (e) => {
                e.preventDefault();
                useShuffle();
            });
            
            document.getElementById('btnBomb').addEventListener('click', useBomb);
            document.getElementById('btnBomb').addEventListener('touchstart', (e) => {
                e.preventDefault();
                useBomb();
            });
            
            document.getElementById('btnHint').addEventListener('click', useHint);
            document.getElementById('btnHint').addEventListener('touchstart', (e) => {
                e.preventDefault();
                useHint();
            });
            
            document.getElementById('btnNewGame').addEventListener('click', newGame);
            document.getElementById('btnNewGame').addEventListener('touchstart', (e) => {
                e.preventDefault();
                newGame();
            });
            
            document.getElementById('modalBtn').addEventListener('click', () => {
                document.getElementById('rewardModal').classList.add('hidden');
            });
            document.getElementById('modalBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                document.getElementById('rewardModal').classList.add('hidden');
            });

            // ==================== 初始化 ====================
            initGrid();
            renderGrid();
            
            // 欢迎消息
            setTimeout(() => {
                showFloatingText('👋 点击任意位置激活音效', 'gold');
            }, 500);
        })();
    </script>
</body>
