<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>川香小馆 · 扫码领券抽大奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: #1a0f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        /* 动态背景 - 粒子效果 + 渐变流动 */
        .dynamic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(145deg, #2b1a0e, #1f1209);
            overflow: hidden;
        }

        /* 动态光晕 */
        .dynamic-bg::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(248, 90, 58, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 70% 60%, rgba(255, 215, 0, 0.1) 0%, transparent 45%),
                        radial-gradient(circle at 10% 80%, rgba(248, 90, 58, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 浮动粒子 */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            50% { transform: translateY(-40px) translateX(20px); opacity: 0.8; }
        }

        /* 主要容器 */
        .app-container {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 248, 240, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(248, 90, 58, 0.3);
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100vh;
            border-radius: 0;
            margin: 0 auto;
        }

        /* 门店封面 - 添加动态光效 */
        .store-cover {
            height: 220px;
            background: linear-gradient(145deg, #fb8b67, #f85a3a);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: white;
            overflow: hidden;
            animation: pulseGlow 3s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.1); }
        }

        .store-cover::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: moveGlow 12s infinite alternate;
        }

        @keyframes moveGlow {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-30px, 30px) scale(1.2); }
        }

        .store-cover::after {
            content: '🌶️';
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 100px;
            opacity: 0.15;
            transform: rotate(10deg);
            animation: rotateSlow 20s infinite linear;
        }

        @keyframes rotateSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 音效控制按钮 */
        .sound-control {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            z-index: 100;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sound-control:active {
            transform: scale(0.9);
            background: rgba(248,90,58,0.8);
        }

        /* 扫码区域 */
        .scan-banner {
            background: rgba(255, 249, 230, 0.95);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ffeecc;
            margin: 0;
            backdrop-filter: blur(5px);
        }

        .scan-icon {
            background: #f85a3a;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .scan-btn {
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            box-shadow: 0 5px 0 #a52f13, 0 8px 20px rgba(248,90,58,0.4);
            transition: all 0.1s;
            cursor: pointer;
            letter-spacing: 1px;
        }

        .scan-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #a52f13, 0 5px 15px rgba(248,90,58,0.4);
        }

        /* 优惠券区域 - 毛玻璃效果 */
        .coupon-section {
            padding: 20px;
            background: rgba(250, 247, 242, 0.8);
            backdrop-filter: blur(5px);
        }

        /* 改进的转盘区域 */
        .wheel-section {
            padding: 20px 20px 30px;
            background: linear-gradient(180deg, rgba(250,247,242,0.9) 0%, rgba(240,232,220,0.95) 100%);
            backdrop-filter: blur(5px);
            text-align: center;
            border-radius: 40px 40px 0 0;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .wheel-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(248,90,58,0.1) 0%, transparent 50%);
            animation: rotateSlow 20s linear infinite;
            pointer-events: none;
        }

        /* 3D转盘容器 - 成熟方案 */
        .wheel-3d-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            perspective: 1200px;
            cursor: pointer;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.3));
        }

        /* 转盘本体 - 使用SVG扇形方案，更精确 */
        .wheel-svg {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transform: rotateX(8deg) rotateY(0deg) rotateZ(0deg);
            transition: transform 3.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 15px rgba(248,90,58,0.3));
            border-radius: 50%;
            background: #2b1a0e;
        }

        /* 转盘切片 - 使用SVG路径，更精确控制 */
        .wheel-segment-path {
            transition: filter 0.3s;
        }

        .wheel-segment-path:hover {
            filter: brightness(1.1);
        }

        /* 转盘上的奖品文字 */
        .prize-text-svg {
            font-size: 14px;
            font-weight: bold;
            fill: white;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .prize-icon-svg {
            font-size: 22px;
            pointer-events: none;
        }

        /* 转盘中心装饰 - 3D球体效果 */
        .wheel-center-3d {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(30px);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffd966, #b8860b);
            border-radius: 50%;
            border: 4px solid #fff2d7;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 5px 15px rgba(255,255,200,0.8);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3a2c1b;
            font-weight: 900;
            font-size: 28px;
            animation: centerPulse 2s infinite;
        }

        @keyframes centerPulse {
            0%, 100% { transform: translate(-50%, -50%) translateZ(30px) scale(1); }
            50% { transform: translate(-50%, -50%) translateZ(30px) scale(1.05); }
        }

        /* 指针 - 更精致的设计 */
        .wheel-pointer-container {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 80px;
            z-index: 30;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .pointer-base {
            width: 0;
            height: 0;
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            border-bottom: 50px solid #f85a3a;
            position: relative;
            animation: pointerWobble 2s infinite;
        }

        @keyframes pointerWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-2deg); }
            75% { transform: rotate(2deg); }
        }

        .pointer-base::after {
            content: '';
            position: absolute;
            top: 15px;
            left: -12px;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #ffd700, #b8860b);
            border-radius: 50%;
            box-shadow: 0 2px 10px gold;
        }

        .pointer-light {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 20px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            filter: blur(5px);
            animation: lightFlicker 1.5s infinite;
        }

        @keyframes lightFlicker {
            0%, 100% { opacity: 0.5; width: 10px; }
            50% { opacity: 1; width: 15px; }
        }

        /* 抽奖按钮 - 更吸引人 */
        .spin-btn {
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 60px;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 3px;
            margin: 10px auto 15px;
            box-shadow: 0 15px 0 #9e2b12, 0 20px 30px rgba(248,90,58,0.6);
            transition: all 0.08s linear;
            cursor: pointer;
            position: relative;
            z-index: 40;
            border: 2px solid #ffb08e;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
            animation: btnPulse 2s infinite;
        }

        @keyframes btnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .spin-btn:active {
            transform: translateY(8px);
            box-shadow: 0 7px 0 #9e2b12, 0 15px 25px rgba(248,90,58,0.6);
        }

        .spin-btn:disabled {
            opacity: 0.7;
            transform: translateY(8px);
            box-shadow: 0 7px 0 #9e2b12, 0 10px 20px rgba(0,0,0,0.3);
            pointer-events: none;
            animation: none;
        }

        /* 抽奖结果弹窗 - 更华丽 */
        .prize-popup {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-content {
            background: linear-gradient(145deg, #fff5e6, #ffe4cc);
            border-radius: 50px;
            padding: 35px;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 4px #f85a3a, 0 0 0 8px rgba(248,90,58,0.3);
            animation: popupShow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #ffd700;
            position: relative;
            overflow: hidden;
        }

        @keyframes popupShow {
            from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }

        .popup-content::before {
            content: '🎊';
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 150px;
            opacity: 0.1;
            transform: rotate(20deg);
        }

        .popup-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }

        .popup-title {
            font-size: 32px;
            font-weight: 800;
            color: #f85a3a;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #ffe4cc;
        }

        .popup-prize {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(145deg, #8b4513, #d2691e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
            padding: 10px;
            border-top: 2px dashed #f85a3a;
            border-bottom: 2px dashed #f85a3a;
        }

        .popup-btn {
            background: linear-gradient(145deg, #f85a3a, #d43f1f);
            color: white;
            border: none;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 8px 0 #9e2b12;
            transition: all 0.1s;
            margin-top: 20px;
        }

        .popup-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #9e2b12;
        }

        /* 底部 */
        .footer {
            background: #2c1e12;
            color: #cfa776;
            padding: 25px 20px;
            text-align: center;
            font-size: 15px;
            border-top: 3px solid #f85a3a;
        }

        /* 点击波纹效果 */
        .ripple-effect {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: ripple 0.5s ease-out;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes ripple {
            to {
                transform: scale(6);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 动态背景 -->
    <div class="dynamic-bg">
        <div class="particles" id="particles"></div>
    </div>

    <!-- 音效控制 -->
    <div class="sound-control" id="soundControl" onclick="toggleSound()">
        <span id="soundIcon">🔊</span>
    </div>

    <div class="app-container" id="app">
        <!-- 门店封面 -->
        <div class="store-cover">
            <div class="store-badge" style="background:rgba(0,0,0,0.3); padding:8px 16px; border-radius:40px; align-self:flex-start; backdrop-filter:blur(10px);">🔥 必吃榜 · 川菜热门</div>
            <div class="store-name">川香小馆 · 幸福路店</div>
            <div class="store-desc">
                <span>⏰ 11:00-22:00</span>
                <span>📞 185-1234-5678</span>
            </div>
        </div>

        <!-- 扫码领券横幅 -->
        <div class="scan-banner">
            <div style="display:flex; align-items:center; gap:12px;">
                <div class="scan-icon" id="scanIcon">📱</div>
                <div>
                    <h3 style="font-size:18px; font-weight:700; color:#8b4513;">扫码领88元新人礼</h3>
                    <p style="color:#b99e7c;">已有 <span id="scanCount">1,856</span> 人领取</p>
                </div>
            </div>
            <button class="scan-btn" id="scanBtn">立即扫码</button>
        </div>

        <!-- 优惠券列表 (简化展示) -->
        <div class="coupon-section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="font-size:22px; color:#3a2c1b;">🔥 限时秒杀券</h2>
                <span style="color:#f85a3a;">抢完即止</span>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div style="background:white; border-radius:16px; padding:15px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                    <div style="font-size:28px; font-weight:800; color:#f85a3a;">¥38</div>
                    <div style="font-size:14px; color:#666; margin:5px 0;">满100可用</div>
                    <button class="receive-btn" style="background:#f85a3a; color:white; border:none; padding:8px 0; width:100%; border-radius:30px; font-weight:600;" onclick="playClickSound();receiveCoupon(this)">立即抢</button>
                </div>
                <div style="background:white; border-radius:16px; padding:15px; text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.05);">
                    <div style="font-size:28px; font-weight:800; color:#f85a3a;">5折</div>
                    <div style="font-size:14px; color:#666; margin:5px 0;">毛血旺套餐</div>
                    <button class="receive-btn" style="background:#f85a3a; color:white; border:none; padding:8px 0; width:100%; border-radius:30px; font-weight:600;" onclick="playClickSound();receiveCoupon(this)">立即抢</button>
                </div>
            </div>
        </div>

        <!-- 3D幸运大转盘 - 成熟方案 -->
        <div class="wheel-section">
            <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:10px;">
                <h2 style="font-size:28px; font-weight:800; background:linear-gradient(145deg,#f85a3a,#d43f1f); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">幸运大转盘</h2>
                <span style="background:#ffeee8; padding:5px 12px; border-radius:30px; color:#f85a3a; font-weight:600;">今日<span id="spinChance">3</span>次</span>
            </div>

            <!-- 3D转盘 - 使用SVG实现精确扇形 -->
            <div class="wheel-3d-container" onclick="event.stopPropagation()">
                <svg class="wheel-svg" id="wheelSvg" viewBox="0 0 200 200">
                    <!-- 定义8个扇形，每个45度 -->
                    <!-- 扇形1 (0°-45°) - 招牌烤鱼 -->
                    <path class="wheel-segment-path" d="M100,100 L173.2,50 A80,80 0 0,1 173.2,50 L100,100 Z" fill="#FF6B6B" stroke="#fff" stroke-width="2">
                        <animate attributeName="filter" values="brightness(1);brightness(1.1);brightness(1)" dur="3s" repeatCount="indefinite" />
                    </path>
                    <!-- 扇形2 (45°-90°) - 酸梅汤 -->
                    <path class="wheel-segment-path" d="M100,100 L173.2,50 A80,80 0 0,1 190.7,105.4 L100,100 Z" fill="#FFD93D" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形3 (90°-135°) - 米饭免费 -->
                    <path class="wheel-segment-path" d="M100,100 L190.7,105.4 A80,80 0 0,1 173.2,150 L100,100 Z" fill="#6BCB77" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形4 (135°-180°) - 10元券 -->
                    <path class="wheel-segment-path" d="M100,100 L173.2,150 A80,80 0 0,1 126.8,173.2 L100,100 Z" fill="#4D96FF" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形5 (180°-225°) - 烤鸡翅 -->
                    <path class="wheel-segment-path" d="M100,100 L126.8,173.2 A80,80 0 0,1 73.2,173.2 L100,100 Z" fill="#FFB347" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形6 (225°-270°) - 啤酒 -->
                    <path class="wheel-segment-path" d="M100,100 L73.2,173.2 A80,80 0 0,1 26.8,150 L100,100 Z" fill="#9D65C9" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形7 (270°-315°) - 谢谢参与 -->
                    <path class="wheel-segment-path" d="M100,100 L26.8,150 A80,80 0 0,1 9.3,105.4 L100,100 Z" fill="#FF8A5C" stroke="#fff" stroke-width="2"/>
                    <!-- 扇形8 (315°-360°) - 小菜一份 -->
                    <path class="wheel-segment-path" d="M100,100 L9.3,105.4 A80,80 0 0,1 26.8,50 L100,100 Z" fill="#F9ED69" stroke="#fff" stroke-width="2"/>

                    <!-- 奖品图标和文字 (使用g分组定位) -->
                    <g class="prize-icon-svg">
                        <text x="135" y="55" fill="white" font-size="20" text-anchor="middle" dominant-baseline="middle" transform="rotate(22.5,135,55)">🐟</text>
                        <text x="145" y="90" fill="white" font-size="10" text-anchor="middle" transform="rotate(67.5,145,90)">烤鱼</text>
                    </g>
                    <g>
                        <text x="155" y="110" fill="white" font-size="20" text-anchor="middle" transform="rotate(67.5,155,110)">🧋</text>
                        <text x="165" y="130" fill="white" font-size="10" text-anchor="middle" transform="rotate(112.5,165,130)">酸梅汤</text>
                    </g>
                    <g>
                        <text x="145" y="145" fill="white" font-size="20" text-anchor="middle" transform="rotate(112.5,145,145)">🍚</text>
                        <text x="130" y="160" fill="white" font-size="10" text-anchor="middle" transform="rotate(157.5,130,160)">米饭</text>
                    </g>
                    <g>
                        <text x="105" y="165" fill="white" font-size="20" text-anchor="middle" transform="rotate(157.5,105,165)">💰</text>
                        <text x="80" y="165" fill="white" font-size="10" text-anchor="middle" transform="rotate(202.5,80,165)">10元</text>
                    </g>
                    <g>
                        <text x="55" y="145" fill="white" font-size="20" text-anchor="middle" transform="rotate(202.5,55,145)">🍗</text>
                        <text x="35" y="125" fill="white" font-size="10" text-anchor="middle" transform="rotate(247.5,35,125)">鸡翅</text>
                    </g>
                    <g>
                        <text x="30" y="105" fill="white" font-size="20" text-anchor="middle" transform="rotate(247.5,30,105)">🍺</text>
                        <text x="30" y="80" fill="white" font-size="10" text-anchor="middle" transform="rotate(292.5,30,80)">啤酒</text>
                    </g>
                    <g>
                        <text x="40" y="60" fill="white" font-size="20" text-anchor="middle" transform="rotate(292.5,40,60)">🙏</text>
                        <text x="55" y="40" fill="white" font-size="10" text-anchor="middle" transform="rotate(337.5,55,40)">谢谢</text>
                    </g>
                    <g>
                        <text x="80" y="35" fill="white" font-size="20" text-anchor="middle" transform="rotate(337.5,80,35)">🥗</text>
                        <text x="110" y="30" fill="white" font-size="10" text-anchor="middle" transform="rotate(22.5,110,30)">小菜</text>
                    </g>

                    <!-- 中心圆装饰 -->
                    <circle cx="100" cy="100" r="20" fill="#FFD700" stroke="#fff2d7" stroke-width="4" filter="url(#glow)">
                        <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite" />
                    </circle>
                    <text x="100" y="105" fill="#8b4513" font-size="20" text-anchor="middle" font-weight="bold">⭐</text>
                </svg>
                <div class="wheel-center-3d">⭐</div>
                <div class="wheel-pointer-container">
                    <div class="pointer-base"></div>
                    <div class="pointer-light"></div>
                </div>
            </div>

            <!-- 抽奖按钮 -->
            <button class="spin-btn" id="spinWheelBtn" onclick="playClickSound();spinWheel()">开始抽奖</button>
        </div>

        <!-- 底部 -->
        <div class="footer">
            <p style="font-size:18px; font-weight:600; color:#ffd700;">川香小馆 · 地道巴适</p>
            <p style="margin:10px 0;">📍 幸福路88号（近地铁2号线）</p>
            <p>⏰ 11:00-14:00 17:00-22:00</p>
            <div style="margin-top:20px; background:#3a2c1b; padding:10px; border-radius:40px; font-size:13px;">
                长按保存本页 · 下次从相册扫码进入
            </div>
        </div>
    </div>

    <!-- 抽奖结果弹窗 -->
    <div class="prize-popup" id="prizePopup">
        <div class="popup-content">
            <div class="popup-icon" id="prizeEmoji">🎉</div>
            <div class="popup-title">恭喜获得</div>
            <div class="popup-prize" id="prizeName">招牌烤鱼券</div>
            <div class="popup-desc" id="prizeDesc" style="color:#666; margin:10px 0;">已存入卡包，到店使用</div>
            <button class="popup-btn" onclick="playClickSound();closePopup()">查看我的奖品</button>
        </div>
    </div>

    <!-- 音频元素 (使用Web Audio API 生成简单音效，避免外部文件) -->
    <script>
        // ==================== 音效系统 ====================
        let soundEnabled = true;
        let audioCtx = null;

        // 初始化音频上下文 (需要用户交互后启动)
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) {
                console.log('Web Audio API not supported');
            }
        }

        // 播放点击音效
        function playClickSound() {
            if (!soundEnabled || !audioCtx) return;
            
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.value = 800;
                gainNode.gain.value = 0.1;
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.stop(now + 0.1);
            } catch(e) {}
        }

        // 播放抽奖音效 (旋转声)
        function playSpinSound() {
            if (!soundEnabled || !audioCtx) return;
            
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.value = 200;
                gainNode.gain.value = 0.05;
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1);
                osc.stop(now + 1);
            } catch(e) {}
        }

        // 播放成功音效 (中奖)
        function playWinSound() {
            if (!soundEnabled || !audioCtx) return;
            
            try {
                const now = audioCtx.currentTime;
                // 播放一段欢快的旋律
                const freqs = [523.25, 659.25, 783.99, 1046.50];
                freqs.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.value = freq;
                    gainNode.gain.value = 0.1;
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    osc.start(now + i * 0.1);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.2);
                    osc.stop(now + i * 0.1 + 0.2);
                });
            } catch(e) {}
        }

        // 切换音效开关
        function toggleSound() {
            initAudio();
            soundEnabled = !soundEnabled;
            document.getElementById('soundIcon').innerText = soundEnabled ? '🔊' : '🔇';
            if (soundEnabled) playClickSound();
        }

        // 用户首次交互时启动音频
        document.addEventListener('touchstart', function initAudioOnTouch() {
            initAudio();
            document.removeEventListener('touchstart', initAudioOnTouch);
        }, { once: true });

        // ==================== 动态背景粒子 ====================
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.background = `rgba(255, ${Math.floor(Math.random() * 100 + 155)}, ${Math.floor(Math.random() * 50)}, ${Math.random() * 0.5 + 0.3})`;
                particlesContainer.appendChild(particle);
            }
        }
        createParticles();

        // ==================== 扫码领券功能 ====================
        document.getElementById('scanBtn').addEventListener('click', function() {
            playClickSound();
            this.innerHTML = '识别中...';
            this.disabled = true;
            
            setTimeout(() => {
                playWinSound(); // 扫码成功播放成功音效
                const scanCount = document.getElementById('scanCount');
                scanCount.innerText = (parseInt(scanCount.innerText.replace(',', '')) + 1).toLocaleString();
                
                // 弹出扫码成功提示
                alert('✅ 扫码成功！新人礼包已发放');
                
                this.innerHTML = '立即扫码';
                this.disabled = false;
            }, 800);
        });

        // ==================== 领券功能 ====================
        function receiveCoupon(btn) {
            playClickSound();
            btn.innerHTML = '领取成功 ✓';
            btn.style.background = '#b99e7c';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '立即抢';
                btn.style.background = '#f85a3a';
                btn.disabled = false;
            }, 2000);
        }

        // ==================== 3D转盘抽奖 ====================
        let spinChance = 3;
        let isSpinning = false;
        let currentRotation = 0;
        const wheelSvg = document.getElementById('wheelSvg');
        
        // 奖品配置
        const prizes = [
            { name: '招牌烤鱼券', emoji: '🐟', desc: '价值38元，满100可用' },
            { name: '酸梅汤一杯', emoji: '🧋', desc: '到店即赠，清凉解渴' },
            { name: '米饭免费', emoji: '🍚', desc: '不限量，随便吃' },
            { name: '10元代金券', emoji: '💰', desc: '满50可用' },
            { name: '烤鸡翅一份', emoji: '🍗', desc: '价值28元' },
            { name: '啤酒一瓶', emoji: '🍺', desc: '指定啤酒' },
            { name: '谢谢参与', emoji: '🙏', desc: '继续加油哦' },
            { name: '小菜一份', emoji: '🥗', desc: '四选一' }
        ];

        function spinWheel() {
            if (isSpinning) return;
            if (spinChance <= 0) {
                alert('今日抽奖次数已用完，明天再来吧！');
                playClickSound();
                return;
            }

            playSpinSound(); // 播放旋转音效
            isSpinning = true;
            const spinBtn = document.getElementById('spinWheelBtn');
            spinBtn.disabled = true;
            
            // 减少次数
            spinChance--;
            document.getElementById('spinChance').innerText = spinChance;
            localStorage.setItem('spinChance', spinChance);
            
            // 随机旋转角度 (1440-2160度之间，4-6圈)
            const extraRotation = Math.floor(Math.random() * 720) + 1440;
            currentRotation += extraRotation;
            
            // 应用3D旋转
            wheelSvg.style.transform = `rotateX(8deg) rotateY(0deg) rotateZ(${currentRotation}deg)`;
            
            // 计算中奖结果 (8个扇形，每个45度)
            setTimeout(() => {
                playWinSound(); // 播放中奖音效
                
                // 计算指针指向的扇形 (指针在顶部，对应角度-90度)
                const normalizedRotation = (currentRotation % 360 + 360) % 360;
                // 指针指向顶部，对应-90度，需要调整
                let pointerAngle = (360 - normalizedRotation + 90) % 360;
                let prizeIndex = Math.floor(pointerAngle / 45) % 8;
                
                const prize = prizes[prizeIndex];
                
                // 显示弹窗
                document.getElementById('prizeEmoji').innerText = prize.emoji;
                document.getElementById('prizeName').innerText = prize.name;
                document.getElementById('prizeDesc').innerText = prize.desc;
                document.getElementById('prizePopup').style.display = 'flex';
                
                isSpinning = false;
                spinBtn.disabled = false;
            }, 3500);
        }

        function closePopup() {
            playClickSound();
            document.getElementById('prizePopup').style.display = 'none';
        }

        // 点击波纹效果
        function createRipple(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 500);
        }

        document.addEventListener('click', function(e) {
            if (e.target.tagName === 'BUTTON' || e.target.classList.contains('scan-btn') || e.target.classList.contains('spin-btn')) {
                createRipple(e);
            }
        });

        // 初始化
        checkAndResetSpinChance();
        function checkAndResetSpinChance() {
            const today = new Date().toDateString();
            const lastSpinDate = localStorage.getItem('lastSpinDate');
            if (lastSpinDate !== today) {
                spinChance = 3;
                localStorage.setItem('spinChance', spinChance);
                localStorage.setItem('lastSpinDate', today);
            } else {
                spinChance = parseInt(localStorage.getItem('spinChance')) || 3;
            }
            document.getElementById('spinChance').innerText = spinChance;
        }

        // 页面可见性变化时检查
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                checkAndResetSpinChance();
            }
        });
    </script>
</body>
