<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- Nunito 现代字体 & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-page, #f0f4fa);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px 12px 40px;
            transition: background 0.2s;
        }
        .page {
            max-width: 420px;
            width: 100%;
            background: var(--card-bg, #ffffff);
            border-radius: var(--card-radius, 36px) var(--card-radius, 36px) 30px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 8px 20px rgba(0,20,50,0.08);
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .brand-bar {
            height: 8px;
            background: var(--bar-gradient, linear-gradient(90deg, #8B5CF6, #EC4899, #F59E0B));
            background-size: 200% 200%;
            animation: gradientShift 6s ease infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .shop-header { padding: 24px 22px 18px; background: var(--header-bg, white); border-bottom: 1px solid rgba(0,0,0,0.02); }
        .shop-name { font-size: 28px; font-weight: 800; letter-spacing: -0.3px; background: var(--name-gradient, linear-gradient(135deg, #1E293B, #2D3C54)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .shop-name i { background: var(--name-icon-gradient, linear-gradient(145deg, #8B5CF6, #C084FC)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 30px; }
        .shop-desc { font-size: 16px; font-weight: 500; color: var(--desc-color, #5B6C82); margin-bottom: 18px; padding-left: 4px; border-left: 4px solid var(--desc-border, #EC4899); padding-left: 14px; background: var(--desc-bg, #F8FAFE); border-radius: 0 20px 20px 0; line-height: 1.4; width: fit-content; padding: 6px 18px 6px 14px; }
        
        .info-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .info-item { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--info-text, #334155); background: var(--info-bg, #F1F5F9); padding: 8px 16px 8px 12px; border-radius: 40px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: background 0.15s; }
        .info-item i { color: var(--info-icon, #8B5CF6); font-size: 16px; width: 20px; }
        .coordinate-badge { background: var(--coord-bg, #EFF6FF); border: 1px solid var(--coord-border, #CBD5E1); }
        .coordinate-badge i { color: var(--coord-icon, #2563EB); }

        .map-link-popup { display: none; position: absolute; background: white; border-radius: 30px; box-shadow: 0 12px 28px rgba(0,0,0,0.2); padding: 12px 20px; z-index: 200; gap: 20px; border: 1px solid #e2e8f0; }
        .map-link-popup.show { display: flex; }
        .map-link-popup a { text-decoration: none; font-weight: 700; padding: 8px 16px; border-radius: 40px; background: #f1f5f9; color: #1e293b; display: flex; align-items: center; gap: 6px; }

        .section-card { margin: 20px 18px 24px; background: var(--section-bg, #FFFFFF); border-radius: 28px; box-shadow: 0 12px 30px -8px rgba(0,0,0,0.05); padding: 22px 18px; border: 1px solid var(--section-border, rgba(230,240,255,0.6)); }
        .section-title { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: var(--title-color, #0B1E38); margin-bottom: 18px; }
        .section-title i { font-size: 24px; background: var(--title-icon-gradient, linear-gradient(145deg, #8B5CF6, #D946EF)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .coupon-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; }
        .coupon-item { background: var(--coupon-bg, linear-gradient(115deg, #F9FAFF, #F0F4FF)); border-radius: 24px; padding: 14px 12px; flex: 1 1 130px; border: 1px dashed var(--coupon-border, #A78BFA); box-shadow: 0 2px 6px var(--coupon-shadow, rgba(139,92,246,0.1)); }
        .coupon-amount { font-size: 26px; font-weight: 800; color: var(--coupon-amount, #8B5CF6); } .coupon-amount small { color: var(--coupon-small, #6D28D9); }
        .coupon-condition { font-size: 14px; font-weight: 500; color: #334155; margin-top: 4px; }
        .claim-btn { background: var(--btn-bg, white); border: 1px solid var(--btn-border, #8B5CF6); border-radius: 40px; padding: 4px 12px; font-size: 12px; font-weight: 700; color: var(--btn-text, #8B5CF6); margin-top: 10px; display: inline-block; cursor: pointer; transition: 0.15s; }
        .claim-btn.received { background: var(--btn-received-bg, #8B5CF6); color: white; border-color: var(--btn-received-border, #8B5CF6); }

        /* 转盘 */
        .wheel-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        .canvas-container { position: relative; width: 280px; height: 280px; margin: 10px auto; }
        canvas#wheelCanvas { width: 100%; height: 100%; display: block; border-radius: 50%; box-shadow: 0 14px 28px rgba(0,0,0,0.15), 0 0 0 6px var(--wheel-outer, white), 0 0 0 8px var(--wheel-outer2, #f0f0f0); }
        .wheel-pointer-fixed {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid var(--pointer, #EC4899);
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2));
            z-index: 15;
            pointer-events: none;
        }
        .pointer-dot {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px; height: 16px;
            background: var(--pointer, #EC4899);
            border-radius: 50%;
            border: 2px solid white;
            z-index: 15;
            pointer-events: none;
        }
        .wheel-button { background: var(--spin-btn-bg, linear-gradient(145deg, #1E293B, #0F172A)); border: none; color: var(--spin-btn-text, white); font-weight: 800; padding: 14px 44px; border-radius: 50px; font-size: 20px; box-shadow: 0 12px 16px -8px var(--spin-shadow, rgba(0,0,0,0.2)); margin: 20px 0 10px; cursor: pointer; }
        .prize-indicator { font-size: 16px; font-weight: 700; background: var(--prize-bg, #f1f5f9); padding: 8px 22px; border-radius: 40px; color: var(--prize-text, #0f172a); margin: 10px 0 5px; }

        .activity-item { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--activity-border, #EDF2F7); }
        .activity-date { background: var(--activity-date-bg, #EFF6FF); border-radius: 20px; padding: 8px 16px; font-weight: 800; color: var(--activity-date-text, #2563EB); min-width: 80px; text-align: center; }

        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(3px); align-items: center; justify-content: center; z-index: 300; }
        .modal-content { background: white; max-width: 340px; width: 90%; border-radius: 48px; padding: 32px 24px; text-align: center; box-shadow: 0 30px 50px rgba(0,0,0,0.3); }
        .close-modal { background: #1E293B; color: white; border: none; padding: 14px 28px; border-radius: 60px; font-weight: 700; width: 100%; margin-top: 18px; cursor: pointer; }

        .sound-toggle { position: absolute; top: 10px; right: 10px; background: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; z-index: 50; }

            div.innerHTML = `<div class="activity-date">${item.date.replace('-','<br>')}</div><div class="activity-desc">${item.desc} <small>${item.sub}</small></div>`;
            activityContainer.appendChild(div);
        });

        // ---------- 转盘绘制 ----------
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const sectors = 8;
        const colors = ['#FDE68A','#FCA5A5','#C4B5FD','#6EE7B7','#FBCFE8','#BFDBFE','#FED7AA','#B0D9F1'];
        const numbers = [8, 1, 5, 3, 9, 2, 7, 6];
        function drawWheel(rotateRad = 0) {
            ctx.clearRect(0,0,300,300);
            const angleStep = (Math.PI*2) / sectors;
            for (let i = 0; i < sectors; i++) {
                const start = i * angleStep + rotateRad;
                const end = start + angleStep;
                ctx.beginPath(); ctx.moveTo(150,150); ctx.arc(150,150,140, start, end); ctx.closePath();
                ctx.fillStyle = colors[i % colors.length]; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(150,150); ctx.arc(150,150,140, start, end); ctx.lineTo(150,150); ctx.stroke();
                ctx.save(); ctx.translate(150,150); ctx.rotate(start + angleStep/2); ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = 'bold 28px "Nunito", sans-serif'; ctx.fillStyle = '#1E293B'; ctx.fillText(numbers[i], 90, 10); ctx.restore();
            }
            ctx.beginPath(); ctx.arc(150,150,30,0,2*Math.PI); ctx.fillStyle = '#ffffff'; ctx.fill(); ctx.strokeStyle = '#ddd'; ctx.lineWidth = 3; ctx.stroke();
        }
        drawWheel();

        // 声音
        let audioCtx = null; let soundEnabled = true;
        const soundToggle = document.getElementById('soundToggle');
        soundToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            soundToggle.innerHTML = soundEnabled ? '<i class="fas fa-volume-up" style="color:#8B5CF6;"></i>' : '<i class="fas fa-volume-mute" style="color:#888;"></i>';
        });
        function playSpinSound() {
            if (!soundEnabled) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.value = 880; gain.gain.value = 0.1;
            osc.connect(gain).connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // 抽奖
        let isSpinning = false; let currentRotate = 0;
        const spinBtn = document.getElementById('spinButton');
        const prizeHint = document.getElementById('prizeHint');
        const modal = document.getElementById('resultModal');
        const modalPrizeNum = document.getElementById('modalPrizeNum');
        const modalPrizeSpan = document.getElementById('modalPrizeSpan');
        const modalDateSpan = document.getElementById('modalDate');
        const closeModal = document.getElementById('closeModal');
        const today = new Date(); const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        modalDateSpan.innerText = dateStr;

        spinBtn.addEventListener('click', function() {
            if (isSpinning) return;
            isSpinning = true;
            playSpinSound();
            const spins = 8 + Math.floor(Math.random() * 13);
            const targetAngle = (Math.random() * Math.PI*2) + spins * Math.PI*2;
            const startRot = currentRotate % (Math.PI*2);
            let animStart = null; const duration = 3000;
            function animateSpin(ts) {
                if (!animStart) animStart = ts;
                const progress = Math.min((ts - animStart) / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotate = startRot + (targetAngle - startRot) * easeOut;
                drawWheel(currentRotate);
                if (progress < 1) requestAnimationFrame(animateSpin);
                else {
                    let rawAngle = (currentRotate % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
                    const pointerAngle = 3 * Math.PI / 2;
                    const angleStep = 2 * Math.PI / sectors;
                    let prizeIndex = -1;
                    for (let i = 0; i < sectors; i++) {
                        let start = i * angleStep + rawAngle;
                        let end = start + angleStep;
                        start = (start + 2*Math.PI) % (2*Math.PI);
                        end = (end + 2*Math.PI) % (2*Math.PI);
                        if (start < end) { if (pointerAngle >= start && pointerAngle < end) prizeIndex = i; }
                        else { if (pointerAngle >= start || pointerAngle < end) prizeIndex = i; }
                    }
                    if (prizeIndex === -1) prizeIndex = 0;
                    const prizeNum = numbers[prizeIndex];
                    prizeHint.innerText = `🎉 箭头指向数字 ${prizeNum} 恭喜！`;
                    modalPrizeNum.innerText = prizeNum; modalPrizeSpan.innerText = prizeNum;
                    modal.style.display = 'flex';
                    if (soundEnabled) {
                        if (!audioCtx) audioCtx = new AudioContext();
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.type = 'sine'; osc.frequency.value = 660; gain.gain.value = 0.15;
                        osc.connect(gain).connect(audioCtx.destination);
                        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                    }
                    isSpinning = false;
                }
            }
            requestAnimationFrame(animateSpin);
        });
        closeModal.addEventListener('click', () => modal.style.display = 'none');
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

        console.log(`参数: style=${style}, act=${act}, coupon=${coupon}`);
    })();
</script>
