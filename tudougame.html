<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🥔 土豆人大冒险 - 15关 + 6种怪物</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        body {
            background: linear-gradient(145deg, #1a3f5a, #0d2b3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 10px;
        }
        
        .game-container {
            max-width: 1000px;
            width: 100%;
            background: #2d5a2d;
            border-radius: 40px 40px 20px 20px;
            padding: 20px 20px 30px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 0 0 4px #8b6e4b, inset 0 0 0 8px #c09b6b;
            border: 2px solid #e8b87b;
        }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3a281c;
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 20px;
            border: 3px solid #b88a5b;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: inset 0 -3px 0 #5f3f28;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .score-box {
            background: #1e3b4a;
            padding: 8px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid gold;
        }
        
        .score-box span:first-child {
            font-size: 1.8rem;
        }
        
        .lives-box {
            background: #5f2e1a;
            padding: 8px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid #ff8a5c;
        }
        
        .level-box {
            background: #4a3b2a;
            padding: 8px 25px;
            border-radius: 40px;
            border: 2px solid #a8e6cf;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .enemy-counter {
            background: #2d1a0a;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #ffd966;
        }
        
        /* 游戏画布 */
        .canvas-wrapper {
            position: relative;
            background: #87CEEB;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 -10px 0 #4a7a4a, 0 15px 20px rgba(0,0,0,0.4);
            border: 5px solid #7a5a3a;
        }
        
        canvas {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 16/9;
            background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 70%, #7ec850 70%, #6b8e4b 100%);
            cursor: pointer;
            touch-action: none;
        }
        
        /* 移动端控制按钮 */
        .mobile-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
        }
        
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        
        .dpad-row {
            display: flex;
            gap: 5px;
        }
        
        .ctrl-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(50, 50, 50, 0.9);
            border: 4px solid #f0b400;
            color: white;
            font-size: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 0 #7a4d1a, 0 10px 20px rgba(0,0,0,0.3);
            touch-action: manipulation;
            cursor: pointer;
            transition: 0.05s linear;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .ctrl-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #7a4d1a, 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
        }
        
        .jump-btn {
            background: rgba(220, 120, 40, 0.95);
            border-color: #ffe66d;
            font-size: 2rem;
        }
        
        @media (min-width: 768px) {
            .mobile-controls {
                display: none;
            }
        }
        
        /* 游戏结束/胜利弹窗 */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: #fdebb3;
            padding: 40px;
            border-radius: 70px;
            text-align: center;
            border: 8px solid #c09b5e;
            box-shadow: 0 20px 30px black;
            max-width: 400px;
            width: 90%;
        }
        
        .modal-content h2 {
            font-size: 3rem;
            color: #a55233;
            margin-bottom: 20px;
        }
        
        .modal-content p {
            font-size: 2rem;
            margin: 20px 0;
            color: #3f2b1c;
        }
        
        .modal-btn {
            background: #f9b83c;
            border: none;
            padding: 20px 50px;
            border-radius: 60px;
            font-size: 2rem;
            font-weight: bold;
            color: #2d1508;
            box-shadow: 0 8px 0 #9f5e20;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.05s;
        }
        
        .modal-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #9f5e20;
        }
        
        .hidden {
            display: none;
        }
        
        /* 提示 */
        .key-hint {
            color: #f0e6d2;
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
        }
        
        .key-hint span {
            background: #3a281c;
            padding: 5px 15px;
            border-radius: 30px;
            border: 2px solid #b88a5b;
        }
        
        .enemy-legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 10px 0;
            color: white;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #3a281c;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #b88a5b;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 游戏头部信息 -->
        <div class="game-header">
            <div class="lives-box">
                <span>🥔</span>
                <span id="livesDisplay">×3</span>
            </div>
            <div class="score-box">
                <span>🪙</span>
                <span id="scoreDisplay">0</span>
            </div>
            <div class="level-box">
                <span id="levelDisplay">第 1-1 关</span>
                <div class="enemy-counter" id="enemyCount">👾 0</div>
            </div>
        </div>
        
        <!-- 怪物图例 -->
        <div class="enemy-legend">
            <div class="legend-item"><span>🟤</span> 史莱姆</div>
            <div class="legend-item"><span>🍄</span> 蘑菇怪</div>
            <div class="legend-item"><span>🐢</span> 乌龟</div>
            <div class="legend-item"><span>🦔</span> 刺猬</div>
            <div class="legend-item"><span>🦇</span> 蝙蝠</div>
            <div class="legend-item"><span>🌺</span> 食人花</div>
        </div>
        
        <!-- 游戏画布 -->
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="1024" height="576"></canvas>
        </div>
        
        <!-- 移动端控制按钮 -->
        <div class="mobile-controls">
            <div class="dpad">
                <div class="dpad-row">
                    <button class="ctrl-btn" id="btnLeft" touch-action="manipulation">←</button>
                    <button class="ctrl-btn" id="btnRight" touch-action="manipulation">→</button>
                </div>
            </div>
            <div class="action-btns">
                <button class="ctrl-btn jump-btn" id="btnJump" touch-action="manipulation">🦘</button>
                <button class="ctrl-btn" id="btnRestart" touch-action="manipulation">↻</button>
            </div>
        </div>
        
        <!-- 键盘提示 -->
        <div class="key-hint">
            <span>←→/AD 移动 | W/空格 跳跃 | R 重试 | 数字键1-5跳关(调试)</span>
        </div>
    </div>
    
    <!-- 游戏结束/胜利模态框 -->
    <div id="gameModal" class="game-modal hidden">
        <div class="modal-content">
            <h2 id="modalTitle">🥔</h2>
            <p id="modalMessage"></p>
            <button class="modal-btn" id="modalBtn">继续冒险</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 游戏配置 ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            
            // 显示元素
            const livesSpan = document.getElementById('livesDisplay');
            const scoreSpan = document.getElementById('scoreDisplay');
            const levelSpan = document.getElementById('levelDisplay');
            const enemyCountSpan = document.getElementById('enemyCount');
            const modal = document.getElementById('gameModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMsg = document.getElementById('modalMessage');
            const modalBtn = document.getElementById('modalBtn');
            
            // 按钮
            const btnLeft = document.getElementById('btnLeft');
            const btnRight = document.getElementById('btnRight');
            const btnJump = document.getElementById('btnJump');
            const btnRestart = document.getElementById('btnRestart');
            
            // ---------- 游戏常量 ----------
            const GRAVITY = 0.5;
            const JUMP_FORCE = -12;
            const MOVE_SPEED = 3.8;
            const MAX_SPEED = 5;
            const FRICTION = 0.7;
            
            // ---------- 游戏状态 ----------
            let gameState = {
                currentLevel: 1,
                maxLevel: 15,
                lives: 3,
                score: 0,
                gameActive: true,
                gameOver: false,
                levelComplete: false,
                totalEnemies: 0,
                enemiesKilled: 0
            };
            
            // ---------- 玩家对象 ----------
            let player = {
                x: 200,
                y: 400,
                width: 32,
                height: 40,
                vx: 0,
                vy: 0,
                grounded: true,
                facing: 1,
                animFrame: 0,
                invincible: 0,
                potatoType: 0
            };
            
            // ---------- 关卡数据 ----------
            let platforms = [];
            let enemies = [];
            let coins = [];
            let exit = null;
            let movingPlatforms = [];
            let levelData = {};
            
            // 输入状态
            const keys = {
                left: false,
                right: false,
                jump: false,
                jumpPressed: false
            };
            
            // 触摸控制
            let touchLeft = false;
            let touchRight = false;
            let touchJump = false;
            
            // 摄像机
            let cameraX = 0;
            
            // ---------- 加载关卡（15关，主角下方永不落空）----------
            function loadLevel(level) {
                // 清空旧数据
                platforms = [];
                enemies = [];
                coins = [];
                movingPlatforms = [];
                exit = null;
                
                // 确保玩家起始位置下方有平台
                const startX = 200;
                const startY = 300;
                
                // 每个关卡都有基础地面
                platforms.push({ x: 0, y: 520, w: 1400, h: 30 }); // 主地面贯穿全关
                
                // 根据关卡配置
                if (level === 1) {
                    // 第1关：新手教学 - 简单敌人
                    platforms.push(
                        { x: 300, y: 440, w: 100, h: 20 },
                        { x: 500, y: 380, w: 100, h: 20 },
                        { x: 700, y: 320, w: 100, h: 20 },
                        { x: 900, y: 260, w: 100, h: 20 }
                    );
                    
                    enemies = [
                        { x: 350, y: 490, type: 'slime', w: 28, h: 28, vx: 1, range: 80, startX: 350, dir: 1 },
                        { x: 550, y: 430, type: 'mushroom', w: 28, h: 30, vx: 1.2, range: 100, startX: 550, dir: 1 }
                    ];
                    
                    coins = [
                        { x: 350, y: 390, collected: false, value: 10 },
                        { x: 550, y: 330, collected: false, value: 10 },
                        { x: 750, y: 270, collected: false, value: 10 },
                        { x: 950, y: 210, collected: false, value: 20 }
                    ];
                    
                    exit = { x: 1100, y: 460, w: 40, h: 60 };
                }
                else if (level === 2) {
                    platforms.push(
                        { x: 250, y: 460, w: 80, h: 20 },
                        { x: 400, y: 400, w: 80, h: 20 },
                        { x: 550, y: 340, w: 80, h: 20 },
                        { x: 700, y: 400, w: 80, h: 20 },
                        { x: 850, y: 460, w: 80, h: 20 }
                    );
                    
                    enemies = [
                        { x: 280, y: 490, type: 'slime', w: 28, h: 28, vx: 1.5, range: 100, startX: 280, dir: 1 },
                        { x: 430, y: 430, type: 'turtle', w: 32, h: 28, vx: 0.8, range: 120, startX: 430, dir: 1 },
                        { x: 580, y: 370, type: 'hedgehog', w: 28, h: 24, vx: 1.2, range: 80, startX: 580, dir: 1 }
                    ];
                    
                    coins = [
                        { x: 280, y: 410, collected: false, value: 10 },
                        { x: 430, y: 350, collected: false, value: 10 },
                        { x: 580, y: 290, collected: false, value: 10 },
                        { x: 730, y: 350, collected: false, value: 20 },
                        { x: 880, y: 410, collected: false, value: 20 }
                    ];
                    
                    exit = { x: 1150, y: 460, w: 40, h: 60 };
                }
                else if (level === 3) {
                    platforms.push(
                        { x: 200, y: 480, w: 70, h: 20 },
                        { x: 320, y: 420, w: 70, h: 20 },
                        { x: 440, y: 360, w: 70, h: 20 },
                        { x: 560, y: 300, w: 70, h: 20 },
                        { x: 680, y: 360, w: 70, h: 20 },
                        { x: 800, y: 420, w: 70, h: 20 },
                        { x: 920, y: 480, w: 70, h: 20 }
                    );
                    
                    // 移动平台
                    movingPlatforms = [
                        { x: 500, y: 200, w: 80, h: 20, vx: 1.8, range: 150, startX: 500, dir: 1 }
                    ];
                    
                    enemies = [
                        { x: 250, y: 510, type: 'slime', w: 28, h: 28, vx: 1.8, range: 120, startX: 250, dir: 1 },
                        { x: 370, y: 450, type: 'bat', w: 30, h: 20, vx: 2, range: 150, startX: 370, dir: 1, fly: true },
                        { x: 490, y: 390, type: 'mushroom', w: 28, h: 30, vx: 1.5, range: 100, startX: 490, dir: 1 },
                        { x: 610, y: 330, type: 'turtle', w: 32, h: 28, vx: 1, range: 140, startX: 610, dir: 1 }
                    ];
                    
                    coins = [
                        { x: 250, y: 430, collected: false, value: 10 },
                        { x: 370, y: 370, collected: false, value: 10 },
                        { x: 490, y: 310, collected: false, value: 20 },
                        { x: 610, y: 250, collected: false, value: 20 },
                        { x: 730, y: 310, collected: false, value: 10 },
                        { x: 850, y: 370, collected: false, value: 10 }
                    ];
                    
                    exit = { x: 1200, y: 460, w: 40, h: 60 };
                }
                else if (level === 4) {
                    platforms.push(
                        { x: 180, y: 500, w: 60, h: 20 },
                        { x: 280, y: 440, w: 60, h: 20 },
                        { x: 380, y: 380, w: 60, h: 20 },
                        { x: 480, y: 320, w: 60, h: 20 },
                        { x: 580, y: 260, w: 60, h: 20 },
                        { x: 680, y: 320, w: 60, h: 20 },
                        { x: 780, y: 380, w: 60, h: 20 },
                        { x: 880, y: 440, w: 60, h: 20 },
                        { x: 980, y: 500, w: 60, h: 20 }
                    );
                    
                    enemies = [
                        { x: 220, y: 530, type: 'slime', w: 28, h: 28, vx: 2, range: 100, startX: 220, dir: 1 },
                        { x: 320, y: 470, type: 'hedgehog', w: 28, h: 24, vx: 1.8, range: 80, startX: 320, dir: 1 },
                        { x: 420, y: 410, type: 'turtle', w: 32, h: 28, vx: 1.2, range: 120, startX: 420, dir: 1 },
                        { x: 520, y: 350, type: 'bat', w: 30, h: 20, vx: 2.5, range: 150, startX: 520, dir: 1, fly: true },
                        { x: 620, y: 290, type: 'mushroom', w: 28, h: 30, vx: 1.8, range: 100, startX: 620, dir: 1 },
                        { x: 720, y: 350, type: 'flower', w: 28, h: 32, vx: 0, range: 0, startX: 720, dir: 1, stationary: true }
                    ];
                    
                    coins = [
                        { x: 220, y: 450, collected: false, value: 10 },
                        { x: 320, y: 390, collected: false, value: 10 },
                        { x: 420, y: 330, collected: false, value: 20 },
                        { x: 520, y: 270, collected: false, value: 20 },
                        { x: 620, y: 210, collected: false, value: 30 },
                        { x: 720, y: 270, collected: false, value: 20 },
                        { x: 820, y: 330, collected: false, value: 20 },
                        { x: 920, y: 390, collected: false, value: 10 }
                    ];
                    
                    exit = { x: 1250, y: 460, w: 40, h: 60 };
                }
                else if (level === 5) {
                    // 第5关：空中平台 + 多种敌人
                    platforms.push(
                        { x: 150, y: 520, w: 80, h: 20 },
                        { x: 250, y: 460, w: 80, h: 20 },
                        { x: 350, y: 400, w: 80, h: 20 },
                        { x: 450, y: 340, w: 80, h: 20 },
                        { x: 550, y: 280, w: 80, h: 20 },
                        { x: 650, y: 340, w: 80, h: 20 },
                        { x: 750, y: 400, w: 80, h: 20 },
                        { x: 850, y: 460, w: 80, h: 20 },
                        { x: 950, y: 520, w: 80, h: 20 }
                    );
                    
                    movingPlatforms = [
                        { x: 500, y: 200, w: 80, h: 20, vx: 2.2, range: 200, startX: 500, dir: 1 },
                        { x: 700, y: 150, w: 80, h: 20, vx: 2.5, range: 180, startX: 700, dir: 1 }
                    ];
                    
                    enemies = [
                        { x: 180, y: 550, type: 'slime', w: 28, h: 28, vx: 2.2, range: 120, startX: 180, dir: 1 },
                        { x: 280, y: 490, type: 'mushroom', w: 28, h: 30, vx: 2, range: 100, startX: 280, dir: 1 },
                        { x: 380, y: 430, type: 'turtle', w: 32, h: 28, vx: 1.5, range: 140, startX: 380, dir: 1 },
                        { x: 480, y: 370, type: 'hedgehog', w: 28, h: 24, vx: 2, range: 100, startX: 480, dir: 1 },
                        { x: 580, y: 310, type: 'bat', w: 30, h: 20, vx: 3, range: 180, startX: 580, dir: 1, fly: true },
                        { x: 680, y: 370, type: 'flower', w: 28, h: 32, vx: 0, startX: 680, stationary: true },
                        { x: 780, y: 430, type: 'bat', w: 30, h: 20, vx: 2.8, range: 160, startX: 780, dir: 1, fly: true }
                    ];
                    
                    for (let i = 0; i < 10; i++) {
                        coins.push({
                            x: 200 + i * 80,
                            y: 200 + (i % 3) * 50,
                            collected: false,
                            value: 10 + i * 5
                        });
                    }
                    
                    exit = { x: 1300, y: 460, w: 40, h: 60 };
                }
                else if (level === 6) {
                    // 第6关：复杂地形
                    for (let i = 0; i < 12; i++) {
                        platforms.push({
                            x: 100 + i * 90,
                            y: 500 - (i % 4) * 60,
                            w: 70,
                            h: 20
                        });
                    }
                    
                    movingPlatforms = [
                        { x: 400, y: 250, w: 80, h: 20, vx: 2.5, range: 250, startX: 400, dir: 1 },
                        { x: 700, y: 180, w: 80, h: 20, vx: 3, range: 220, startX: 700, dir: 1 }
                    ];
                    
                    for (let i = 0; i < 8; i++) {
                        let type;
                        if (i % 5 === 0) type = 'bat';
                        else if (i % 4 === 0) type = 'turtle';
                        else if (i % 3 === 0) type = 'mushroom';
                        else type = 'slime';
                        
                        enemies.push({
                            x: 150 + i * 100,
                            y: 500,
                            type: type,
                            w: type === 'turtle' ? 32 : 28,
                            h: type === 'mushroom' ? 30 : (type === 'bat' ? 20 : 28),
                            vx: 1.5 + i * 0.3,
                            range: 100 + i * 20,
                            startX: 150 + i * 100,
                            dir: 1,
                            fly: type === 'bat'
                        });
                    }
                    
                    for (let i = 0; i < 15; i++) {
                        coins.push({
                            x: 120 + i * 70,
                            y: 300 + (i % 5) * 40,
                            collected: false,
                            value: 15
                        });
                    }
                    
                    exit = { x: 1350, y: 460, w: 40, h: 60 };
                }
                else if (level === 7) {
                    // 第7关：空中堡垒
                    for (let i = 0; i < 10; i++) {
                        platforms.push({
                            x: 200 + i * 90,
                            y: 450 - i * 25,
                            w: 70,
                            h: 20
                        });
                    }
                    
                    movingPlatforms = [
                        { x: 500, y: 200, w: 80, h: 20, vx: 3, range: 300, startX: 500, dir: 1 },
                        { x: 800, y: 150, w: 80, h: 20, vx: 3.5, range: 280, startX: 800, dir: 1 }
                    ];
                    
                    for (let i = 0; i < 6; i++) {
                        enemies.push({
                            x: 250 + i * 120,
                            y: 450,
                            type: i % 2 === 0 ? 'bat' : 'flower',
                            w: 30,
                            h: i % 2 === 0 ? 20 : 32,
                            vx: i % 2 === 0 ? 3 : 0,
                            range: 150,
                            startX: 250 + i * 120,
                            dir: 1,
                            fly: i % 2 === 0,
                            stationary: i % 2 !== 0
                        });
                    }
                    
                    for (let i = 0; i < 12; i++) {
                        coins.push({
                            x: 220 + i * 80,
                            y: 350 - i * 15,
                            collected: false,
                            value: 20
                        });
                    }
                    
                    exit = { x: 1400, y: 460, w: 40, h: 60 };
                }
                else if (level === 8) {
                    // 第8关：迷宫式
                    for (let i = 0; i < 15; i++) {

            // ---------- 游戏逻辑 ----------
            function update() {
                if (!gameState.gameActive || gameState.gameOver || gameState.levelComplete) return;
                
                // 无敌帧递减
                if (player.invincible > 0) {
                    player.invincible--;
                }
                
                // 移动输入
                let moveDir = 0;
                if (keys.left || touchLeft) moveDir -= 1;
                if (keys.right || touchRight) moveDir += 1;
                
                // 应用加速度
                if (moveDir !== 0) {
                    player.vx += moveDir * MOVE_SPEED * 0.3;
                    player.facing = moveDir;
                } else {
                    player.vx *= FRICTION;
                }
                
                // 限速
                if (player.vx > MAX_SPEED) player.vx = MAX_SPEED;
                if (player.vx < -MAX_SPEED) player.vx = -MAX_SPEED;
                
                // 重力
                player.vy += GRAVITY;
                if (player.vy > 12) player.vy = 12;
                
                // 跳跃
                if (keys.jump && !keys.jumpPressed && player.grounded) {
                    player.vy = JUMP_FORCE;
                    player.grounded = false;
                    keys.jumpPressed = true;
                }
                if (!keys.jump) {
                    keys.jumpPressed = false;
                }
                
                // 水平移动
                player.x += player.vx;
                checkCollisions('horizontal');
                
                // 垂直移动
                player.y += player.vy;
                player.grounded = false;
                checkCollisions('vertical');
                
                // 移动平台
                for (let mp of movingPlatforms) {
                    mp.x += mp.vx * mp.dir;
                    if (mp.x > mp.startX + mp.range || mp.x < mp.startX - mp.range) {
                        mp.dir *= -1;
                    }
                    
                    if (player.grounded && 
                        player.x + player.width > mp.x && 
                        player.x < mp.x + mp.w &&
                        Math.abs(player.y + player.height - mp.y) < 5) {
                        player.x += mp.vx * mp.dir;
                    }
                }
                
                // 敌人移动
                for (let e of enemies) {
                    if (e.dead) continue;
                    
                    if (!e.stationary) {
                        e.x += e.vx * e.dir;
                        if (e.x > e.startX + e.range || e.x < e.startX - e.range) {
                            e.dir *= -1;
                        }
                    }
                    
                    // 飞行敌人上下浮动
                    if (e.fly) {
                        e.y = (e.startY || 480) + Math.sin(Date.now() * 0.005 + e.x) * 10;
                    } else {
                        e.startY = e.y;
                    }
                }
                
                // 金币碰撞
                for (let coin of coins) {
                    if (!coin.collected && 
                        player.x < coin.x + 20 &&
                        player.x + player.width > coin.x - 10 &&
                        player.y < coin.y + 20 &&
                        player.y + player.height > coin.y - 10) {
                        coin.collected = true;
                        gameState.score += coin.value;
                        updateScore();
                    }
                }
                
                // 敌人碰撞
                for (let e of enemies) {
                    if (e.dead) continue;
                    
                    if (player.invincible <= 0 &&
                        player.x < e.x + e.w &&
                        player.x + player.width > e.x &&
                        player.y < e.y + e.h &&
                        player.y + player.height > e.y) {
                        
                        if (player.vy > 0 && player.y + player.height - player.vy <= e.y + 10) {
                            // 踩死敌人
                            e.dead = true;
                            player.vy = JUMP_FORCE * 0.6;
                            gameState.score += 50;
                            gameState.enemiesKilled++;
                            updateEnemyCount();
                            updateScore();
                        } else {
                            // 玩家受伤
                            gameState.lives--;
                            livesSpan.innerText = `×${gameState.lives}`;
                            
                            if (gameState.lives <= 0) {
                                gameOver();
                                return;
                            }
                            
                            player.invincible = 60;
                            player.vx = (player.facing > 0 ? -5 : 5);
                            player.vy = -5;
                        }
                    }
                }
                
                // 出口碰撞
                if (exit && 
                    player.x < exit.x + exit.w &&
                    player.x + player.width > exit.x &&
                    player.y < exit.y + exit.h &&
                    player.y + player.height > exit.y) {
                    levelComplete();
                }
                
                // 掉出屏幕底部（虽然不会发生，但保留安全机制）
                if (player.y > 700) {
                    gameState.lives--;
                    livesSpan.innerText = `×${gameState.lives}`;
                    
                    if (gameState.lives <= 0) {
                        gameOver();
                        return;
                    }
                    
                    player.x = 200;
                    player.y = 300;
                    player.vx = 0;
                    player.vy = 0;
                }
                
                // 摄像机
                cameraX = player.x - canvas.width / 3;
                if (cameraX < 0) cameraX = 0;
                if (cameraX > 1600) cameraX = 1600;
                
                updateEnemyCount();
            }
            
            // 碰撞检测
            function checkCollisions(axis) {
                // 平台碰撞
                for (let p of platforms) {
                    if (axis === 'horizontal') {
                        if (player.y + player.height > p.y &&
                            player.y < p.y + p.h &&
                            player.x + player.width > p.x &&
                            player.x < p.x + p.w) {
                            
                            if (player.vx > 0) {
                                player.x = p.x - player.width;
                            } else if (player.vx < 0) {
                                player.x = p.x + p.w;
                            }
                            player.vx = 0;
                        }
                    } else {
                        if (player.x + player.width > p.x &&
                            player.x < p.x + p.w &&
                            player.y + player.height > p.y &&
                            player.y < p.y + p.h) {
                            
                            if (player.vy > 0) {
                                player.y = p.y - player.height;
                                player.grounded = true;
                                player.vy = 0;
                            } else if (player.vy < 0) {
                                player.y = p.y + p.h;
                                player.vy = 0;
                            }
                        }
                    }
                }
                
                // 移动平台碰撞
                for (let mp of movingPlatforms) {
                    if (axis === 'horizontal') {
                        if (player.y + player.height > mp.y &&
                            player.y < mp.y + mp.h &&
                            player.x + player.width > mp.x &&
                            player.x < mp.x + mp.w) {
                            
                            if (player.vx > 0) {
                                player.x = mp.x - player.width;
                            } else if (player.vx < 0) {
                                player.x = mp.x + mp.w;
                            }
                            player.vx = 0;
                        }
                    } else {
                        if (player.x + player.width > mp.x &&
                            player.x < mp.x + mp.w &&
                            player.y + player.height > mp.y &&
                            player.y < mp.y + mp.h) {
                            
                            if (player.vy > 0 && player.y + player.height - player.vy <= mp.y + 5) {
                                player.y = mp.y - player.height;
                                player.grounded = true;
                                player.vy = 0;
                            } else if (player.vy < 0) {
                                player.y = mp.y + mp.h;
                                player.vy = 0;
                            }
                        }
                    }
                }
            }
            
            function updateScore() {
                scoreSpan.innerText = gameState.score;
            }
            
            function levelComplete() {
                gameState.levelComplete = true;
                gameState.gameActive = false;
                
                if (gameState.currentLevel < gameState.maxLevel) {
                    modalTitle.innerText = '🎉 通关！';
                    modalMsg.innerText = `进入第 ${gameState.currentLevel + 1} 关!\n得分: ${gameState.score}`;
                } else {
                    modalTitle.innerText = '🏆 恭喜通关！';
                    modalMsg.innerText = `你完成了所有关卡!\n最终得分: ${gameState.score}`;
                }
                
                modal.classList.remove('hidden');
            }
            
            function gameOver() {
                gameState.gameActive = false;
                gameState.gameOver = true;
                
                modalTitle.innerText = '💔 游戏结束';
                modalMsg.innerText = `得分: ${gameState.score}\n点击重试`;
                modal.classList.remove('hidden');
            }
            
            function resetGame() {
                gameState = {
                    currentLevel: 1,
                    maxLevel: 15,
                    lives: 3,
                    score: 0,
                    gameActive: true,
                    gameOver: false,
                    levelComplete: false,
                    totalEnemies: 0,
                    enemiesKilled: 0
                };
                
                player = {
                    x: 200,
                    y: 400,
                    width: 32,
                    height: 40,
                    vx: 0,
                    vy: 0,
                    grounded: true,
                    facing: 1,
                    animFrame: 0,
                    invincible: 0,
                    potatoType: 0
                };
                
                loadLevel(1);
                updateScore();
                livesSpan.innerText = '×3';
                modal.classList.add('hidden');
            }
            
            function nextLevel() {
                if (gameState.currentLevel < gameState.maxLevel) {
                    gameState.currentLevel++;
                    gameState.gameActive = true;
                    gameState.levelComplete = false;
                    loadLevel(gameState.currentLevel);
                    
                    player.x = 200;
                    player.y = 400;
                    player.vx = 0;
                    player.vy = 0;
                } else {
                    resetGame();
                }
                modal.classList.add('hidden');
            }
            
            modalBtn.addEventListener('click', () => {
                if (gameState.levelComplete && gameState.currentLevel < gameState.maxLevel) {
                    nextLevel();
                } else {
                    resetGame();
                }
            });
            
            // ---------- 绘制 ----------
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 天空渐变
                const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(0.7, '#87CEEB');
                gradient.addColorStop(0.7, '#7ec850');
                gradient.addColorStop(1, '#6b8e4b');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 云
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(200 - cameraX * 0.3, 100, 40, 0, Math.PI*2);
                ctx.arc(250 - cameraX * 0.3, 80, 35, 0, Math.PI*2);
                ctx.arc(150 - cameraX * 0.3, 80, 30, 0, Math.PI*2);
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(600 - cameraX * 0.3, 150, 50, 0, Math.PI*2);
                ctx.arc(660 - cameraX * 0.3, 130, 40, 0, Math.PI*2);
                ctx.arc(540 - cameraX * 0.3, 130, 35, 0, Math.PI*2);
                ctx.fill();
                
                ctx.save();
                ctx.translate(-cameraX, 0);
                
                // 绘制平台
                ctx.shadowColor = '#4a3a2a';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 4;
                
                for (let p of platforms) {
                    ctx.fillStyle = '#8b6e4b';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#6b8e4b';
                    ctx.fillRect(p.x, p.y - 5, p.w, 8);
                }
                
                // 移动平台
                for (let mp of movingPlatforms) {
                    ctx.fillStyle = '#b88a5b';
                    ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
                    ctx.fillStyle = '#6b8e4b';
                    ctx.fillRect(mp.x, mp.y - 5, mp.w, 8);
                    
                    ctx.fillStyle = '#5a3a1a';
                    ctx.beginPath();
                    ctx.arc(mp.x + 10, mp.y + mp.h, 8, 0, Math.PI*2);
                    ctx.arc(mp.x + mp.w - 10, mp.y + mp.h, 8, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // 金币
                for (let coin of coins) {
                    if (!coin.collected) {
                        ctx.shadowColor = 'gold';
                        ctx.shadowBlur = 15;
                        
                        const sparkle = Math.sin(Date.now() * 0.01) * 0.2 + 0.8;
                        
                        ctx.beginPath();
                        ctx.arc(coin.x, coin.y, 12, 0, Math.PI*2);
                        ctx.fillStyle = `rgba(255, 215, 0, ${sparkle})`;
                        ctx.fill();
                        
                        ctx.font = 'bold 16px Arial';
                        ctx.fillStyle = '#b8860b';
                        ctx.shadowBlur = 10;
                        ctx.fillText('🪙', coin.x - 10, coin.y + 6);
                    }
                }
                
                // 敌人
                for (let e of enemies) {
                    if (e.dead) continue;
                    
                    ctx.shadowColor = '#4a2a1a';
                    ctx.shadowBlur = 8;
                    
                    if (e.type === 'slime') {
                        // 史莱姆
                        ctx.fillStyle = '#a55d5d';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 14, 14, 10, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#7a3f3f';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 18, 8, 5, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 10, 3, 0, Math.PI*2);
                        ctx.arc(e.x + 20, e.y + 10, 3, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 9, e.y + 10, 1.5, 0, Math.PI*2);
                        ctx.arc(e.x + 21, e.y + 10, 1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if (e.type === 'mushroom') {
                        // 蘑菇怪
                        ctx.fillStyle = '#c96c3f';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 15, 14, 12, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#a0522d';
                        ctx.fillRect(e.x + 8, e.y - 5, 12, 8);
                        
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 12, 2.5, 0, Math.PI*2);
                        ctx.arc(e.x + 20, e.y + 12, 2.5, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 9, e.y + 12, 1.2, 0, Math.PI*2);
                        ctx.arc(e.x + 21, e.y + 12, 1.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if (e.type === 'turtle') {
                        // 乌龟
                        ctx.fillStyle = '#4a7a4a';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 16, e.y + 14, 16, 10, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#2d5a2d';
                        for (let i = 0; i < 4; i++) {
                            ctx.fillRect(e.x + 4 + i*6, e.y + 6, 4, 8);
                        }
                        
                        ctx.fillStyle = '#f0e6d2';
                        ctx.beginPath();
                        ctx.arc(e.x + 10, e.y + 12, 3, 0, Math.PI*2);
                        ctx.arc(e.x + 22, e.y + 12, 3, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 11, e.y + 12, 1.5, 0, Math.PI*2);
                        ctx.arc(e.x + 23, e.y + 12, 1.5, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if (e.type === 'hedgehog') {
                        // 刺猬
                        ctx.fillStyle = '#8b5a2b';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 12, 14, 8, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#a8753a';
                        for (let i = 0; i < 5; i++) {
                            ctx.beginPath();
                            ctx.moveTo(e.x + 5 + i*5, e.y + 5);
                            ctx.lineTo(e.x + 8 + i*5, e.y - 5);
                            ctx.lineTo(e.x + 11 + i*5, e.y + 5);
                            ctx.fill();
                        }
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 12, 2, 0, Math.PI*2);
                        ctx.arc(e.x + 20, e.y + 12, 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if (e.type === 'bat') {
                        // 蝙蝠
                        ctx.fillStyle = '#3a2a1a';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 15, e.y + 10, 15, 8, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#5a3a2a';
                        ctx.beginPath();
                        ctx.moveTo(e.x, e.y + 5);
                        ctx.lineTo(e.x - 10, e.y + 15);
                        ctx.lineTo(e.x, e.y + 10);
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(e.x + 30, e.y + 5);
                        ctx.lineTo(e.x + 40, e.y + 15);
                        ctx.lineTo(e.x + 30, e.y + 10);
                        ctx.fill();
                        
                        ctx.fillStyle = '#f0e6d2';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 6, 2, 0, Math.PI*2);
                        ctx.arc(e.x + 22, e.y + 6, 2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    else if (e.type === 'flower') {
                        // 食人花
                        ctx.fillStyle = '#d45d5d';
                        ctx.beginPath();
                        ctx.ellipse(e.x + 14, e.y + 16, 14, 16, 0, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#4a7a4a';
                        ctx.fillRect(e.x + 10, e.y + 25, 8, 15);
                        
                        ctx.fillStyle = 'white';
                        ctx.beginPath();
                        ctx.arc(e.x + 8, e.y + 12, 3, 0, Math.PI*2);
                        ctx.arc(e.x + 20, e.y + 12, 3, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = '#1a1a1a';
                        ctx.beginPath();
                        ctx.arc(e.x + 9, e.y + 12, 1.5, 0, Math.PI*2);
                        ctx.arc(e.x + 21, e.y + 12, 1.5, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.fillStyle = 'white';
                        for (let i = 0; i < 6; i++) {
                            ctx.beginPath();
                            ctx.arc(e.x + 5 + i*4, e.y, 2, 0, Math.PI*2);
                            ctx.fillStyle = `hsl(${i*60}, 70%, 60%)`;
                            ctx.fill();
                        }
                    }
                }
                
                // 出口
                if (exit) {
                    ctx.shadowColor = 'gold';
                    ctx.shadowBlur = 20;
                    
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(exit.x + 18, exit.y - 40, 4, 100);
                    
                    ctx.fillStyle = '#f1c40f';
                    ctx.beginPath();
                    ctx.moveTo(exit.x + 20, exit.y - 40);
                    ctx.lineTo(exit.x + 60, exit.y - 30);
                    ctx.lineTo(exit.x + 20, exit.y - 20);
                    ctx.fill();
                }
                
                // 土豆人
                if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }
                
                ctx.shadowColor = '#2d1a0a';
                ctx.shadowBlur = 10;
                ctx.shadowOffsetY = 4;
                
                // 土豆身体
                ctx.fillStyle = '#b07d44';
                ctx.beginPath();
                ctx.ellipse(player.x + 16, player.y + 20, 16, 18, 0, 0, Math.PI*2);
                ctx.fill();
                
                // 眼睛
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(player.x + 10, player.y + 15, 4, 0, Math.PI*2);
                ctx.arc(player.x + 22, player.y + 15, 4, 0, Math.PI*2);
                ctx.fill();
                
                // 瞳孔
                ctx.fillStyle = '#2d1a0a';
                ctx.beginPath();
                ctx.arc(player.x + (player.facing > 0 ? 13 : 9), player.y + 15, 2, 0, Math.PI*2);
                ctx.arc(player.x + (player.facing > 0 ? 25 : 21), player.y + 15, 2, 0, Math.PI*2);
                ctx.fill();
                
                // 嘴巴
                ctx.beginPath();
                ctx.strokeStyle = '#5d3a1a';
                ctx.lineWidth = 2;
                ctx.arc(player.x + 16, player.y + 22, 5, 0.1, Math.PI - 0.1);
                ctx.stroke();
                
                // 土豆芽
                ctx.fillStyle = '#6b8e4b';
                ctx.beginPath();
                ctx.ellipse(player.x + 16, player.y - 5, 5, 8, 0, 0, Math.PI*2);
                ctx.fill();
                
                ctx.globalAlpha = 1;
                ctx.restore();
                
                requestAnimationFrame(gameLoop);
            }
            
            function gameLoop() {
                update();
                draw();
            }
            
            // 初始化
            loadLevel(1);
            gameLoop();
        })();
    </script>
